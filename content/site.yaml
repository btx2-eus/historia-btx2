# Ordered list of all temas (drives navigation, cards, etc.)
temas:
  - { num: 1,  slug: "antzinako-erregimena",       title: "Antzinako Erregimenaren krisia eta Estatu liberalaren eraikuntza", years: "1808 – 1876", short: "Independentzia Gerra, Cadizko Konstituzioa, liberalismoaren garaipena, Seiurteko Demokratikoa eta foru-auzia.", era: 1 }
  - { num: 2,  slug: "berrezarkuntza",             title: "Berrezarkuntzaren sistema",                                          years: "1876 – 1930", short: "Cánovasen sistema, txandakatze politikoa, kazikismoa, 98ko krisia eta erregimenaren gainbehera.", era: 2 }
  - { num: 3,  slug: "euskal-industrializazioa",   title: "Euskal Herriko industrializazioa eta gizarte pluralaren sorrera",   years: "1875 – 1930", short: "Industria-iraultza, langile mugimendua, nazionalismoaren sorrera eta gizarte berriaren eraketa.", era: 3 }
  - { num: 4,  slug: "bigarren-errepublika",       title: "II. Errepublika",                                                    years: "1931 – 1936", short: "Erreforma garaia, bienio ezberdinak, tentsio sozialak eta erradikalizazio politikoa.", era: 4 }
  - { num: 5,  slug: "gerra-zibila",               title: "Gerra Zibila",                                                       years: "1936 – 1939", short: "Altxamendua, bi Espainiak, nazioarteko inplikazioa, gerraren bilakaera eta ondorioak.", era: 5 }
  - { num: 6,  slug: "frankismoa-i",               title: "Diktadura frankista I: Gerraostea eta autarkia",                     years: "1939 – 1959", short: "Errepresioa, nazioarteko isolamendua eta ekonomia autarkikoaren porrota.", era: 6 }
  - { num: 7,  slug: "frankismoa-ii",              title: "Diktadura frankista II: Desarrollismo industriala",                  years: "1959 – 1975", short: "Egonkortze Plana, hazkunde ekonomikoa, gizarte aldaketak eta oposizioaren indartzea.", era: 7 }
  - { num: 8,  slug: "trantsizioa",                title: "Trantsizioa",                                                        years: "1975 – 1982", short: "Diktaduratik demokraziara: 1978ko Konstituzioa eta autonomien estatuaren eraketa.", era: 8 }
  - { num: 9,  slug: "monarkia-parlamentarioa",    title: "Monarkia parlamentarioaren sendotzea",                               years: "1982 – 1996", short: "PSOEren gobernuak, EEEan sartzea eta estatuaren modernizazioa.", era: 9 }
  - { num: 10, slug: "xxi-mendea",                 title: "XXI. mendea",                                                        years: "1996 – 2011", short: "Aznar eta Zapateroren gobernuak, garapen ekonomikoa eta krisiaren hasiera.", era: 10 }

