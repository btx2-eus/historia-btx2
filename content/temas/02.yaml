intro: |-
  1874ko Sagunton emandako estatu kolpeak Lehen Errepublikaren kaosa amaitu eta Borboiak berrezarri zituen Alfonso XII.arekin. <strong>Antonio Cánovas del Castillo</strong> izan zen «sistema kanobistaren» arkitektoa: Erresuma Batuko bipartidismoan inspiratutako eredu liberal-kontserbadorea, egonkortasuna eta ordena soziala lehenesten zituena demokraziaren gainetik. Itxura parlamentarioa zuen, baina <span class="term" data-def="Botoa emateko baldintza ekonomikoak ezartzen zituen sistema. Gizartearen zati handia hauteskundeetatik kanpo uzten zuen.">sufragio zentsitarioan</span>, hauteskunde-iruzurrean (<span class="term" data-def="Tokiko boteredunen («kazikeen») bidez botoak kontrolatzeko sistema. Hauteskunde iruzurraren oinarria zen.">kazikismoan</span>) eta eliteen kontrolean oinarritua.
