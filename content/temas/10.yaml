meta:
  num: 10
  slug: xxi-mendea
  title: XXI. mendea
  years: 1996 – 2011
  source_note: "Gai honen jatorrizko apunterik ez zegoen Drive karpetan. Atal hau ezagutza historiko orokorrean oinarrituta idatzi da, gainerako gaien egitura bera erabiliz. \nBerrikusi eta zure materialarekin osatu/ordeztu\n, beste gaietan bezala."
intro: |-
  XXI. mendearen lehen hamarbost urteek (1996–2011) Espainiako demokrazia helduaren bi ziklo erakusten dituzte: <strong>Aznarren PPren gobernuak</strong> (1996–2004) eta <strong>Zapateroren PSOEren gobernuak</strong> (2004–2011). Aldi honetan, alternantzia politikoa normalizatu zen, Espainia <span class="term" data-def="Europar Batasuneko txanpon bakarra. Espainian 2002an ezarri zen, pezeta ordezkatuz.">euroan</span> sartu zen (2002), eta erreforma sozial sakonak gauzatu ziren; baina terrorismoak, lurralde-auziak eta <strong>2008ko krisi ekonomikoak</strong> garaia markatu zuten.
