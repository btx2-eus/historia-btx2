sections:
- id: g5-1
  number: '5.1'
  title: Altxamendu militarra eta gobernuaren erantzuna
  body: |-
    <p>1936ko uztailaren 17–18ko <span class="term" data-def="Armadaren sektore batek legezko gobernuaren aurka indarrez egindako matxinada. 1936ko altxamenduak II. Errepublika eraistea zuen helburu, baina porrot partzialak gerra zibil luze eta odoltsua eragin zuen.">altxamendu militarra</span> ez zen ustekabeko kolpe bat: aurretik antolatutako konspirazio zabal baten emaitza izan zen, non militarrekin batera monarkikoak ere aritu ziren. <strong>Emilio Mola</strong> (koordinatzaile nagusia Nafarroatik), <strong>José Sanjurjo</strong>, <strong>Francisco Franco</strong>, <strong>Queipo de Llano</strong>, Goded, Cabanellas eta Yagüe Afrikako tropen gidaritzan, errepublikaren aurka egitea erabaki zuten, sistemaren krisi politiko eta sozialak eta Fronte Popularraren garaipenak eragindako beldurrekin uztartuta.</p>

    <h3><span class="h-num">5.1.1</span> Konspirazioa eta altxamenduaren hasiera</h3>
    <p>Altxamenduaren helburua argia zen: II. Errepublika desegitea eta ordena kontserbadore baten bidez estatuaren kontrola berreskuratzea. Hasierako planak, ordea, <strong>porrot partziala</strong> izan zuen: matxinatuek ez zituzten kontrolatu hiri nagusiak — Madril, Bartzelona, Valentzia edo Bilbo — eta herrialdea berehala bi eremutan banatu zen:</p>
    <ul>
      <li><strong>Matxinatuen kontrolpeko lurraldeetan</strong> armadak eta aginte zibil frankistek boterea berehala egituratu zuten, eta errepresioa sistematizatu zuten etsai guztien aurka.</li>
      <li><strong>Errepublikaren aldeko lurraldeetan</strong>, berriz, segurtasun-indarren desegiturak, ezin kontrola mantentzea eta ezkerreko mugimendu iraultzaileak sortutako tentsioek boterearen zatiketa larria eragin zuten.</li>
    </ul>
    <p>Hiru hilabeteko epean, matxinatuek egitura politiko eta militar sendoa lortu zuten. <strong>1936ko urrian Francok aginte gorena eskuratu zuen</strong> (Estatuko Buru eta Jeneralisimo), boterearen zentralizazioa eta matxinatutako bandoaren batasuna bermatuz.</p>

    <h3><span class="h-num">5.1.2</span> Gobernuaren erantzuna eta boterearen berreraketa</h3>
    <p>Errepublikan egonkortasuna askoz zailagoa izan zen. Hasierako Giral gobernua (uztailaren amaieratik irailera arte) Estatuaren kontrola berreskuratzen eta altxamendua zapaltzen saiatu zen, baina segurtasun-indarren zatiketak, erakunde militar profesionalaren ia kolapsoak eta herritarren zati baten armamentu espontaneoak gobernua amore ematera eraman zuten.</p>
    <p><strong>Irailean Largo Caballeroren gobernu antifaxista</strong> sortu zen, 1937ko maiatzera arte iraungo zuena, PSOE, PCE eta CNTren arteko oreka politiko zaila lortzeko ahaleginean. Gobernuak hiru norabide estrategiko hartu zituen:</p>
    <ul>
      <li><span class="term" data-def="Errepublikak milizia politiko eta sindikalak armada erregular batean integratzeko sortu zuen egitura militarra. Helburua defentsa zentralizatzea eta gerra modu eraginkorragoan antolatzea.">Milizia iraultzaileak Armada Popularrean</span> integratzea.</li>
      <li>Industria gerrarako egokitzea.</li>
      <li>Gizartearen mobilizazio zabala sustatzea («¡No pasarán!» sinbolopean).</li>
    </ul>
    <p>Hala ere, barneko zatiketek — CNT, UGT, PCE, POUM eta alderdi errepublikanoen arteko tentsioek — eta boterearen desorekak eragin nabarmena izan zuten errepublikaren defentsaren eraginkortasunean. Hasiera-hasieratik, gerraren izaera ez zen bakarrik nazionala: matxinatuek Alemaniaren eta Italiaren laguntza jaso zuten, eta errepublikanoek Errusia Estalinistaren laguntza konplexua eta mugatua.</p>
    <h3><span class="h-num">5.1.3</span> Ondorioa: bi proiektu politiko eta gatazka luze nazioartekotua</h3>
    <p>Altxamenduaren eta gobernuaren lehen erantzunaren ondorio nagusia <strong>bikoitza</strong> izan zen. Batetik, gatazka ez zen kolpe militar azkar bat izango: bi proiektu politiko eta sozial guztiz kontrajarrik elkarren aurka lehian arituko ziren <strong>gerra zibil luze eta ideologizatua</strong>. Bestetik, hasiera-hasieratik gerraren izaera ez zen bakarrik nazionala: matxinatuek Alemaniaren eta Italiaren laguntza militar zuzena jaso zuten, eta horrek gatazkaren dimentsioa erabat handitu zuen. <strong>Espainia faxismoaren eta antifaxismoaren arteko talkaren lehen eremu nagusietako bat bihurtu zen</strong> — II. Mundu Gerraren entsegu-zelaitzat hartua perspektiban begiratuta.</p>

- id: g5-2
  number: '5.2'
  title: Nazioarteko testuingurua
  body: |-
    <p>Gerra Zibila ez zen Espainiako gatazka isolatua: Europan garatzen ari zen tentsio ideologiko eta geopolitikoaren parte bihurtu zen. 1930eko hamarkadako <span class="term" data-def="Ideologia autoritario, ultranazionalista, antikomunista eta antiliberala. Italian Mussolini (1922tik) eta Alemanian Hitler (1933tik). Gerra Zibilean matxinatuen alde esku hartu zuten.">faxismoaren gorakadak</span> — Mussolini Italian, Hitler Alemanian — eta demokrazia liberalen ahuleziak eragin zuzena izan zuten gatazkan.</p>

    <h3><span class="h-num">5.2.1</span> Potentzia faxisten laguntza matxinatuei</h3>
    <p>Matxinatuek hasieratik jaso zuten laguntza militar eraginkor eta zentralizatua Alemaniaren eta Italiaren aldetik:</p>
    <ul>
      <li><strong><span class="term" data-def="Alemaniako hegazkin-unitate espezializatua, Espainiako Gerra Zibilean matxinatuei lagundu ziena. Gernikako bonbardaketa egin zuen 1937ko apirilean. 'Entsegu-zelaira' erabili zuten arma eta taktika berriak probatzeko.">Condor Legioa</span> (Alemania):</strong> hegazkinak, pilotuak, bonbak, entrenamendua eta laguntza teknikoa. Iparraldeko kanpainan eta populazio zibilaren aurkako bonbardaketetan (Gernika, Durango) erabakigarria izan zen.</li>
      <li><strong>Aviazione Legionaria (Italia):</strong> hegazkinak eta tropa italiarrak (100.000 soldadu inguru). Arma eta taktika berriak probatzeko eta Mendebaldeko potentzien pasibotasuna neurtzeko erabili zuten.</li>
    </ul>
    <p>Atzean zegoen helburua estrategikoa eta ideologikoa zen: erregimen faxisten interesak proban jartzea eta II. Mundu Gerraren aurreko lehia-gunea eskuratzea.</p>

    <h3><span class="h-num">5.2.2</span> Ez-Interbentzio politika eta Errepublikaren isolamendua</h3>
    <p>Aitzitik, Errepublikak <span class="term" data-def="Britainia Handiak eta Frantziak 1936an proposatutako politika, bi aldeei laguntza militarra debekatzeko. Praktikan Errepublika kaltetu zuen, Alemaniak eta Italiak araua sistematikoki urratu baitzuten.">Nazioarteko Ez-Interbentzio politika</span> jasan zuen. Britainia Handiak eta Frantziak — gerra Europan hedatzeko beldurrez eta iraultza komunistaren beldur gehiago zutelako faxismoaren aldean — laguntzarik eman ez zuten. Horrela, Errepublika nazioartean ia isolatuta geratu zen.</p>

    <h3><span class="h-num">5.2.3</span> URSS, Brigada Internazionalak eta gerra mediatikoa</h3>
    <p>Egoera arintzeko:</p>
    <ul>
      <li><strong>Sobietar Batasunak</strong> armak eta aholkulari militarrak bidali zituen — Nazioaren urre-erreserbarekin ordainduak —; aholkulari sobietarren eragina handitu eta PCEren pisu politikoa nabarmen areagotu zen.</li>
      <li><strong><span class="term" data-def="Mundu osoko milaka boluntariok eratutako erakundea, Errepublikaren alde borrokatu zutenak. Konpromiso politiko eta antifaxistak bultzatuta. Nazioarteko solidaritatearen sinbolo.">Brigada Internazionalek</span></strong> mundu osoko milaka boluntariorekin esku hartu zuten, konpromiso politiko eta antifaxistak bultzatuta.</li>
    </ul>
    <p>Laguntza hori, ordea, ez zen nahikoa: matxinatuek jasotako laguntza industrial eta teknikoaren pareko izateko ez zen iritsi. <strong>Nazioarteko laguntzan desoreka erabakiorra</strong> izan zen gerraren emaitzarako.</p>
    <p>Gerra, gainera, <strong>gerra mediatikoa</strong> bihurtu zen: kazetariek, argazkilariek eta artistek (Capa, Chim, Hemingway, Orwell) nazioarteko iritzia mobilizatu zuten. Botere faxistek beren nagusitasun teknologikoa erakutsi zuten, eta demokrazia liberalek beren pasibotasun estrategikoa agerian utzi zuten. Historialari askok Gerra Zibila <span class="term" data-def="Gerra Zibila bigarren mundu-gatazkaren aurrekari eta entsegu-zelai gisa interpretatzen duen ikuspegia. Arma eta taktika berrien proba, eta faxismo-antifaxismo talkaren lehen eszenatoki handia.">II. Mundu Gerraren atari</span> gisa interpretatu dute.</p>

- id: g5-3
  number: '5.3'
  title: Euskal Estatutua
  body: |-
    <p>Lehenengo Euskal Estatutua 1936ko urrian onartu bazen ere, haren sustraiak askoz zaharragoak dira. <span class="term" data-def="1876an Azken Karlistadaren ondoren ezarritako neurriak, euskal lurraldeen foru-eskubideak ezabatu zituena. Autogobernuaren inguruko eztabaida biziagotu zuen XX. mendean.">Foruen abolizioak (1876)</span> estatuarekiko harreman politikoaren aldaketa traumatikoa ekarri zuen, eta horrek autogobernuaren inguruko eztabaida berritu zuen XX. mendearen hasieran.</p>

    <h3><span class="h-num">5.3.1</span> Aurrekariak: Lizarrako proiektuak eta blokeoa</h3>
    <p>1931n II. Errepublika ezarri eta berehala abiatu zen lehen saiakera instituzionala: <strong>Lizarrako Estatutuaren proiektua</strong>. Lau lurraldeak hartzen zituen (Bizkaia, Gipuzkoa, Araba eta Nafarroa). Baina testu hark arazo nagusi bat zuen: izaera <span class="term" data-def="Estatutu katoliko konfesionala izateak Elizari hezkuntzako eta administrazioko lehentasuna emango zion, eta 1931ko Konstituzio laiko eta demokratikoarekin bat ez zetorren.">konfesionala</span> proposatzen zuen, 1931ko Konstituzio laiko eta demokratikoarekin bateraezina. Gorteek blokeatu zuten.</p>
    <p><strong>Nafarroaren auzia</strong> arazo berezia bihurtu zen. Nafarroako eskuin katoliko-kontserbadoreak — bereziki karlistak — autonomia-proiektuarekiko errezeloa handitzen joan zen: haientzat, EAJ eta ezker errepublikarren gainetik egituratutako autogobernuak ez zituen bermatzen haien interes identitario eta sozio-politikoak. Horrela, lurraldeen arteko zatiketak prozesu osoa korapilatu zuen.</p>
    <p>1933–1934 bitarteko bigarren saiakerak, laiko eta aurreratuagoa, ere ez zuen aurrera egin: gobernu erradikal-cedistak ez zuen eztabaidara eraman, autonomia-proiektuekiko mesfidantza handia zeukan. <strong>1936an altxamendua gertatu zenean</strong>, Nafarroa berehala matxinatuen esku geratu zen, eta autonomia-proiektua hiru probintzietara mugatu zen.</p>

    <h3><span class="h-num">5.3.2</span> Euzko Jaurlaritza eta autonomia gerra-garaian</h3>
    <p>Gerra piztutakoan, egoera politiko eta militar bereziak autonomia bizkortu zuen: Errepublikak EAJren leialtasuna bermatu nahi zuen. <strong>1936ko urriko Estatutu laiko eta demokratikoa</strong> onartu zen, eta haren ondorioz:</p>
    <ul>
      <li><strong>Euzko Jaurlaritza</strong> sortu zen urriaren 7an, <strong>Jose Antonio Agirre</strong> lehendakariarekin.</li>
      <li>Koalizio zabala: EAJ, PSOE, PCE, ANV.</li>
      <li>Berehalako helburua: errepublikaren defentsa militarra eta administrazio zibilaren egonkortasuna uztartzea.</li>
    </ul>
    <p>Euzko Jaurlaritzak autogobernu oso zabala garatu zuen:</p>
    <ul>
      <li>Segurtasuna eta ordena publikoa (<strong>Ertzaintzaren</strong> sorrera eta antolaketa).</li>
      <li><strong>Euzko Gudarostearen</strong> egituraketa eta fronteko defentsa.</li>
      <li>Ekonomia eta hornidura-politika, bereziki Bilbo setiatua zen bitartean.</li>
      <li>Zerga eta finantza-kudeaketa, diru-papera propioa antolatuz.</li>
      <li>Atzerriko harremanak (AEB eta Europara bidalitako ordezkari diplomatikoak).</li>
    </ul>
    <div class="callout"><div class="callout-title">«Euskal Oasia»</div>Beste eremu errepublikano askotan ez bezala, Euskal Herriak ordena publikoa eta tolerantzia erlijiosoa mantendu zituen; Elizaren aurkako indarkeria ia ezerezekoa izan zen. EAJren izaera katolikoak, gobernu autonomoaren sendotasunak eta alderdien arteko oreka politikoak eragin zuten desberdintasuna.</div>

    <h3><span class="h-num">5.3.3</span> Bilboren erorketa eta erbesteko jarraipena</h3>
    <p>1937ko ekainaren 19an Bilbo erori zen, <span class="term" data-def="Bilbo defendatzeko eraikitako defentsa-sistema militarra. Ahulezia teknikoak zituen eta informazioa matxinatuen esku iritsi zen. 1937ko ekainean hautsi zuten.">Burdin Hesia</span> hautsia izan ondoren. Bizkaia galtzeak ondorio militar eta ekonomiko larriak ekarri zizkion Errepublikarentzat. Bilbo erori ondoren, euskal indar batzuek errendizio bereizia negoziatu nahi izan zuten italiarrekin <strong>Santoñan</strong> — gudarien bizitza salbatzeko —, baina akordio hori ez zuten onartu ez Errepublikako gobernuak ez frankistek.</p>
    <p>Hala ere, <strong>Agirreren gobernuak erbestean jarraitu zuen</strong>, frankismoaren lau hamarkadetan euskal autogobernuaren legitimotasun politikoa eta historikoa mantenduz, eta nazioartean ordezkaritza sinbolikoa bermatuz. Euskal Estatutuak, beraz, euskal autogobernu garaikidearen lehen egikaritze instituzionala eta etorkizuneko autonomiaren oinarri historikoa bihurtu zen.</p>

- id: g5-4
  number: '5.4'
  title: Gerraren bilakaera (Espainian eta Euskadin)
  body: |-
    <p>1936ko altxamendua porrot partziala izan ondoren, gerra hiru urteko prozesu luzean bilakatu zen. Lau fase nagusitan azal daiteke bere bilakaera.</p>

    <h3><span class="h-num">5.4.1</span> 1936: Madrilen defentsa eta gerra luzearen hasiera</h3>
    <p>1936ko udazkenean, matxinatuen helburu nagusia <strong>Madril hartzea</strong> zen. Franco buru zuen armada hegoaldetik eta mendebaldetik hurbildu zen, Afrikako tropen, erreketeen eta falangisten laguntzarekin. Hala ere, <strong>Madrilek ez zuen amore eman</strong>: gobernua Valentziara lekualdatu zen, baina hirian Defentsa Batzordea antolatu zen, miliziek, herritarren mobilizazioak eta Sobietar Batasunaren lehen laguntza militarrek defentsa ahalbidetu zuten. «<strong>¡No pasarán!</strong>» leloa Madrilen erresistentziaren sinbolo bihurtu zen.</p>
    <p>Madrilgo guduak erakutsi zuen gerra ez zela kolpe militar azkar baten ondorio laburra izango, baizik eta gatazka luze, ideologiko eta nazioartekotua. Matxinatuek Madril ez hartzeak estrategia aldatzera behartu zituen.</p>

    <h3><span class="h-num">5.4.2</span> 1937: Iparraldeko kanpaina eta Euskadiren erorketa</h3>
    <p>1937an Francok erasoaren ardatza Iparraldera eraman zuen, arrazoi militar, ekonomiko eta politikoengatik: Bizkaiko industria, burdingintza eta ontzigintza; portuak; eta Euzko Jaurlaritza. Gipuzkoa 1936ko irailean erori zen (Irun, Donostia irailak 13), Bizkaia isolatuz.</p>
    <p>Iparraldeko kanpainan <span class="term" data-def="Helburu militarrez gain, komunikazioak, industria edo populazio zibilaren morala suntsitzeko egindako aire-erasoa. Gernika eta Durango zibilen aurkako gerra modernoaren adibide lazgarriak dira.">bonbardaketa estrategikoek</span> rol erabakigarria bete zuten:</p>
    <ul>
      <li><strong>Durangoko bonbardaketa</strong> (1937ko martxoak 31): Alemaniako Condor Legioak eta Italiako Aviazione Legionariak egina.</li>
      <li><strong>Gernikako bonbardaketa</strong> (1937ko apirilak 26): mundu mailako ikur bihurtu zen, zibilen aurkako gerra modernoaren adierazpide.</li>
    </ul>
    <p>Bilbo defendatzeko <span class="term" data-def="Bilbo inguruan eraikitako defentsa-sistema militarra. Ahulezia teknikoak zituen, eta bere planoak matxinatuen esku iritsi ziren. 1937ko ekainean hautsi zuten.">Burdin Hesia</span> antolatu zen, baina hautsi egin zuten eta <strong>ekainaren 19an Bilbo erori zen</strong>. 1937ko urrian, Santander eta Gijón eta Avilés hartzean, Iparraldeko frontea desagertu zen guztiz.</p>
    <h3><span class="h-num">5.4.3</span> Errepublikaren barne bilakaera: batasun antifaxista eta Negrínen estrategia</h3>
    <p>Errepublikaren barne bilakaeran ere tentsioa handia zen. 1937ko maiatzeko <strong>Bartzelonako gertakarietan</strong> komunisten, anarkisten eta POUMen arteko liskarrek Largo Caballeroren gobernua ahuldu zuten, eta ondorioz gobernuaren batasun antifaxistak krisi larria pairatu zuen. <strong>Juan Negrín</strong> hartu zuen gobernuburua, zentralizazioa, Armada Popularraren indartzea eta erresistentzia luzearen estrategia bultzatuz.</p>
    <p>Negrínen gobernupean <span class="term" data-def="Sobietar Batasunaren laguntza handitu ahala, bere aholkularien eta PCEren eragin politikoa ere areagotu zen Errepublikan. Armak eta dirua urre-erreserbarekin ordainduak, baina estrategia gero eta gehiago Moskuren interesen mende.">URSSen menpekotasuna eta PCEren pisua</span> nabarmen handitu ziren. POUM organizazioa deuseztatu eta mugimendu anarkistek botere instituzionala galdu zuten. Barne batasuna galduz eta kanpoko isolamendua handituz, errepublikak desabantaila estrategiko eta politiko erabakigarria pairatu zuen.</p>

    <h3><span class="h-num">5.4.4</span> 1938–1939: Ebroko gudua, Kataluniaren erorketa eta gerraren amaiera</h3>
    <p>1938an <strong>Aragoiko ofentsibaren ondoren matxinatuek Mediterraneora iritsi ziren</strong>, Errepublikaren lurraldea bi zatitan banatuaz: Katalunia alde batetik, erdialde-hegoaldekoa bestetik. Aurre egiteko, Errepublikak <span class="term" data-def="1938ko uztailean Errepublikak abiatu zuen ofentsiba militarra, frankisten aurrerapena geldiarazteko eta bi eremu errepublikanoen arteko lotura berreskuratzeko. Errepublikaren azken indar handien erabilera.">Ebroko ofentsiba</span> abiatu zuen (uztaila–azaroa). Hasieran arrakasta taktikoak lortu arren, Alemaniaren eta Italiaren laguntzarekin frankisten kontraeraso gogorra jarraitu zuen. Errepublikak galera militar eta giza galera izugarriak izan zituen; azken gaitasun militar handia agortu zen.</p>
    <p>Ebroko porrotaren ondoren, <strong>Bartzelona 1939ko urtarrilaren 26an erori zen</strong>: milaka errefuxiatuk Frantziako mugara jo zuten. 1939ko otsailean Britainia Handiak eta Frantziak Francoren gobernua aitortu zuten, Errepublikaren nazioarteko isolamendua erabatekoa bihurtuz. <span class="term" data-def="Segismundo Casado koronelak 1939ko martxoan Negrinen gobernuaren aurka emandako kolpea, Francorekin negoziatzeko asmoz. Saiakerak ez zuen helburua lortu: Francok errendizio baldintzagabea exijitu zuen.">Casadoren barne-kolpearen</span> ondoren, Madril erori zen ia borrokarik gabe eta <strong>1939ko apirilaren 1ean Francok gerra amaitutzat eman zuen</strong>. Garaipen militarrak ez zuen bake demokratikorik ekarri: diktadura luze baten hasiera zen.</p>

- id: g5-5
  number: '5.5'
  title: Erretagoardiako indarkeria
  body: |-
    <p>Gerra Zibila ez zen fronteetako borroka militarra bakarrik. <span class="term" data-def="Frontearen atzean dagoen lurraldea, non armada zuzenean borrokan ez dagoen baina gerraren ondorio politiko, sozial eta ekonomikoak bizi diren. Gerra Zibilean hilketen, jazarpenen, bonbardaketen eta beldurraren espazioa.">Erretagoardia</span> ere gatazkaren eremu nagusietako bat bihurtu zen. <strong>Bi aldeetan</strong> egon zen basakeria, baina indarkeriaren izaera, antolaketa, iraupena eta helburua oso desberdinak izan ziren.</p>

    <h3><span class="h-num">5.5.1</span> Matxinatuen eremua: errepresio planifikatua</h3>
    <p>Altxamendutik bertatik, matxinatuek gizartea «garbitu», aurkari politikoak ezabatu eta ordena autoritario berri bat ezarri nahi zuten. <strong>Emilio Molaren aginduek</strong> argi erakusten dute terrorearen erabilera ez zela albo-ondorio hutsa: beldurra zabaltzea estrategia politiko eta militarra zen.</p>
    <p><span class="term" data-def="Matxinatuen eta frankisten eremuan egindako errepresio sistematiko eta planifikatua, aurkari politikoak, sindikalistak, irakasleak eta abertzaleak ezabatzeko edo beldurtzeko politika antolatua. Gerraostean ere luzatu zen.">Terrore zuriaren</span> adierazpideak:</p>
    <ul>
      <li>Epaiketarik gabeko fusilamenduak eta «saca» (espetxeetatik presoen hilketak).</li>
      <li>Alkate eta zinegotzi errepublikanoen jazarpena.</li>
      <li>Irakasleen eta funtzionarioen depurazioa.</li>
      <li>Ondasunen konfiskazioa eta emakumeen aurkako umiliazio publikoak (ilea moztu, beldurra zabaldu).</li>
      <li>Espetxeratze masiboak eta beldur sozialaren hedapena.</li>
    </ul>
    <p>Eliza katolikoaren hierarkiaren zati handi batek altxamenduari babes ideologikoa eman zion, gerra <span class="term" data-def="Erlijioaren defentsaren izenean aurkezten den borroka politiko edo militarra. Frankismoak Gerra Zibila 'gurutzada' gisa aurkeztu zuen, Espainia katolikoa salbatzeko ekintza bezala.">«gurutzada»</span> gisa aurkeztuz. Hala ere, Euskadin egoera bereziagoa zen: EAJ katolikoa Errepublikaren alde zegoenez, frankistek <strong>euskal apaizak ere fusilatu zituzten</strong>, «gurutzada» diskurtsoa erlijioaren defentsa hutsa ez zela erakutsiz. <strong>Kalkulu historikoak: 130.000–150.000 biktima</strong> gerra garaian eta gerraostean frankisten errepresiotik, gerra-kontseiluak eta gerraosteko fusilatuak barne.</p>

    <h3><span class="h-num">5.5.2</span> Errepublikaren eremua: Estatuaren kolapsoa eta indarkeria iraultzailea</h3>
    <p>Errepublikaren aldeko eremuan ere indarkeria oso larria izan zen, batez ere lehen hilabeteetan. <span class="term" data-def="Errepublikaren eremuan, batez ere 1936ko lehen hilabeteetan, gertatutako indarkeria iraultzaile eta antiklerikala. Estatuaren kolapsoarekin, milizien boterearekin eta mendeku-logikekin lotuta.">Terrore gorriaren</span> ezaugarriak:</p>
    <ul>
      <li><strong>Zergatia:</strong> 1936ko uztailean armadaren matxinadak Estatuaren egitura kolokan utzi zuen; gobernuak ez zuen ordena publikoa modu eraginkorrean kontrolatzeko gaitasunik lehen asteetan.</li>
      <li><strong>Botere-hutsunea:</strong> miliziek, komite iraultzaileek eta tokiko talde armatuek indar handia hartu zuten. Eskuineko politikariak, lur-jabeak, apaizak, fraideak, enpresaburuak eta «faxistatzat» hartutako pertsonak jazarri zituzten.</li>
      <li><strong>Elizen aurkako erasoak</strong> eta Paracuellos de Jaramako hilketak (1936ko azaroan, milaka preso Madril inguruan) adibide ezagunak dira.</li>
    </ul>
    <p>Funtsezko ñabardura: Errepublikako gobernuek — Giral, Largo Caballero, Negrin — <strong>indarkeria irregular hori kontrolatzea bilatu zuten</strong>: miliziak militarizatu, justizia erregularra berrezarri eta komiteen boterea mugatu. 1937tik aurrera errepublikar eremuko legez-kanpoko indarkeria nabarmen gutxitu zen. <strong>Kalkulu historikoak: 50.000–60.000 biktima</strong> errepublikar erretagoardian, batez ere 1936an.</p>

    <h3><span class="h-num">5.5.3</span> Euskadiren berezitasuna eta «Euskal Oasia»</h3>
    <p>Euskadin egoera berezia izan zen. Euzko Jaurlaritzak ordena publikoa eta administrazio zibila modu nahiko eraginkorrean antolatu zituen. EAJren izaera katolikoak, gobernu autonomoaren sendotasunak eta alderdien arteko oreka politikoak eragin zuten errepublikaren aldeko euskal eremuan <strong>indarkeria antiklerikala askoz txikiagoa</strong> izatea beste eremu errepublikano batzuekin alderatuta.</p>
    <p>Horregatik erabili izan da «Euskal Oasia» kontzeptua: ez du esan nahi gatazkarik edo indarkeriarik ez zegoenik, baizik eta Euzko Jaurlaritzak ordena hobeto kontrolatu zuela, Elizaren aurkako erasoak oso mugatuak izan zirela eta administrazio autonomoak egonkortasuna mantendu zuela. Hala ere, frankistek euskal lurraldeak hartu ahala, errepresio gogorra ezarri zuten agintarien, militanteen, sindikalisten eta abertzaleen aurka.</p>

    <h3><span class="h-num">5.5.4</span> Ondorio demografikoak eta erbestea</h3>
    <p>Gerraren eta lehen frankismoaren ondorio demografikoak izugarriak izan ziren:</p>
    <ul>
      <li><strong>~500.000 hildako</strong> (fronteak, erretagoardiako errepresioa, bonbardaketak, gosea, gaixotasunak, gerraosteko fusilatuak).</li>
      <li><strong>~450.000 errefuxiatu</strong> 1939an Frantziako mugara, Kataluniaren erorketaren ondoren. Haietako batzuk itzuli ziren, baina milaka pertsonak erbeste luzea bizi izan zuten Frantzian, Mexikon, URSS-en edo Latinoamerikan.</li>
      <li><strong>«Gerraren haurrak»</strong>: milaka adingabe atzerrira bidali zituzten bonbardaketetatik eta errepresiotik babesteko; askok urteak eman zituzten etxetik urrun.</li>
    </ul>
    <p>Gerraosteko Espainia ez zen bakearen sinonimo: espetxeak, beldurra, isiltasuna, depurazioak, gosea, lan behartuak eta galtzaileen bazterketa soziala. <strong>Frankismoak ez zuen adiskidetzerik bilatu: garaipena errepresioaren bidez sendotu zuen</strong>.</p>
    <div class="callout"><div class="callout-title">Ondorioa</div>Bi aldeetan egon zen basakeria, baina ez zen izaera berekoa: errepublikar eremuan, lehen hilabeetako indarkeria Estatuaren kolapsoari eta botere iraultzaile deszentralizatuei lotu zitzaien; matxinatuen eremuan, berriz, errepresioa sistematikoa, planifikatua eta gerraostean luzatua izan zen. Aldea ez dago soilik kopuruekin: indarkeriaren logika politikoarekin eta eraiki nahi zen estatu motarekin du zerikusia.</div>

glossary:
- term: Altxamendu militarra
  def: |-
    Armadaren sektore batek legezko gobernuaren aurka indarrez egindako matxinada. 1936ko uztailak 17–18an hasi zen, II. Errepublika eraisteko asmoz; porrot partzialak Gerra Zibil luze eta odoltsua sortu zuen.
- term: Armada Popularra
  def: |-
    Errepublikak milizia politiko eta sindikalak armada erregular batean integratzeko sortu zuen egitura militarra. Helburua defentsa zentralizatzea eta gerra modu eraginkorragoan antolatzea.
- term: Autonomia
  def: |-
    Lurralde batek estatuaren barruan bere erakunde propioak eta autogobernua izatea. Gerra Zibilean, Euskal Estatutuaren bidez, Euzko Jaurlaritza sortu eta euskal autogobernu garaikidearen lehen esperientzia instituzionala garatu zen.
- term: Bonbardaketa estrategikoa
  def: |-
    Helburu militarrez gain, komunikazioak, industria, hiriak edo populazio zibilaren morala suntsitzeko egindako aire-erasoa. Durango (1937/03/31) eta Gernika (1937/04/26) adibide lazgarriak dira.
- term: Brigada Internazionalak
  def: |-
    Mundu osoko milaka boluntariok eratutako erakundea, Errepublikaren alde borrokatu zutenak. Konpromiso politiko eta antifaxistak bultzatuta; nazioarteko solidaritatearen sinbolo.
- term: Burdin Hesia
  def: |-
    Bilbo defendatzeko eraikitako defentsa-sistema militarra. Ahulezia teknikoak zituen, eta bere planoak matxinatuen esku iritsi ziren. 1937ko ekainean frankistek hautsi eta Bilbo hartu zuten.
- term: Condor Legioa
  def: |-
    Alemaniako hegazkin-unitate espezializatua, Espainiako Gerra Zibilean matxinatuei lagundu ziena. Gernikako bonbardaketa egin zuen. Arma eta taktika berriak probatzeko erabili zuten.
- term: Diktadura
  def: |-
    Boterea pertsona edo talde baten esku kontzentratzen duen sistema autoritarioa, askatasun politikoak eta oposizioa ezabatuz. Francoren garaipenak ia 40 urteko diktadura ekarri zuen (1939-1975).
- term: Ebroko gudua
  def: |-
    1938ko uztailean Errepublikak abiatu zuen ofentsiba militarra, frankisten aurrerapena geldiarazteko. Errepublikaren azken indar handien erabilera; galera izugarrien ondoren, 1938ko azaroan amaitu eta Kataluniaren erorketa ekarri zuen.
- term: Erbestea
  def: |-
    Gerra, jazarpena edo arrazoi politikoengatik norberaren herrialdea uztera behartuta joatea. 1939an ~450.000 errepublikanok Frantziara eta beste herrialde batzuetara ihes egin zuten.
- term: Errepresioa
  def: |-
    Botere politikoak oposizioa, disidentzia edo aurkari sozialak zigortzeko erabiltzen duen indarkeria eta kontrol-mekanismoen multzoa. Frankisten eremuan sistematikoagoa, luzeagoa eta estatu berriaren eraikuntzari lotuagoa.
- term: Erretagoardia
  def: |-
    Frontearen atzean dagoen lurraldea, non gerraren ondorio politiko, sozial eta ekonomikoak bizi diren. Gerra Zibilean hilketen, jazarpenen, bonbardaketen, gosearen eta beldurraren espazioa bihurtu zen.
- term: Estatuaren kolapsoa
  def: |-
    Estatuak ordena publikoa, indarkeria legitimoaren kontrola eta administrazioaren funtzionamendua bermatzeko gaitasuna galtzea. Errepublikaren eremuan, 1936ko lehen hilabeteetan, kolapso horrek milizien eta komiteen boterea handitu zuen.
- term: Euzko Jaurlaritza
  def: |-
    1936ko urrian sortutako Eusko Gobernua, Jose Antonio Agirre lehendakariarekin. EAJ, PSOE, PCE eta ANVk osatua. Ordena publikoa, ekonomia, defentsa eta atzerriko harremanak kudeatuz autogobernu zabala garatu zuen gerra-garaian.
- term: Euskal Oasia
  def: |-
    Historiografian errepublikaren aldeko euskal eremuko egoera berezia izendatzeko erabili izan den kontzeptua. Euzko Jaurlaritzak ordena publikoa hobeto mantendu zuen, Elizaren aurkako indarkeria oso mugatua izan zen, eta administrazioak egonkortasuna lortu zuen.
- term: Ez-Interbentzioa
  def: |-
    Britainia Handiak eta Frantziak 1936an proposatutako politika, bi aldeei laguntza militarra debekatzeko. Praktikan Errepublika kaltetu zuen, Alemaniak eta Italiak araua sistematikoki urratu baitzuten.
- term: Faxismoa
  def: |-
    Ideologia autoritario, ultranazionalista, antikomunista eta antiliberala, lidergo sendoa, indarkeria politikoa eta demokraziaren aurkako jarrera defendatzen dituena. Alemania naziak eta Italia faxistak matxinatuen alde ekin zuten.
- term: Frontea
  def: |-
    Bi armaden arteko borroka-eremua. Gerra Zibilean hainbat fronte egon ziren: Madrilgoa, Iparraldekoa, Aragoikoa, Ebrokoa eta Kataluniakoa.
- term: Gerraren nazioartekotzea
  def: |-
    Hasierako barne-gatazka batek kanpoko potentzien laguntza, interes eta esku-hartzearen ondorioz nazioarteko dimentsioa hartzea. Gerra Zibilean Alemaniak eta Italiak matxinatuei lagundu zieten; Sobietar Batasunak eta Brigadek Errepublikari.
- term: Gurutzada
  def: |-
    Erlijioaren defentsaren izenean aurkezten den borroka politiko edo militarra. Frankismoak Gerra Zibila «gurutzada» gisa aurkeztu zuen, altxamendua Espainia katolikoa salbatzeko ekintza bezala legitimizatzeko.
- term: Indarkeria politikoa
  def: |-
    Helburu politikoak lortzeko, aurkaria ezabatzeko edo gizartea beldurtzeko erabiltzen den indarkeria. Fusilamenduak, atentatuak, errepresioa, bonbardaketak eta jazarpen soziala.
- term: Militarizazioa
  def: |-
    Egitura zibil edo irregularrak diziplina eta aginte militar baten menpe jartzeko prozesua. Errepublikak miliziak militarizatu nahi izan zituen Armada Popularra sortuz.
- term: Milizia
  def: |-
    Alderdi, sindikatu edo talde politiko batek antolatutako indar armatu irregularra. Gerraren hasieran miliziek garrantzi handia izan zuten Errepublikaren defentsan.
- term: Propaganda
  def: |-
    Herria mobilizatzeko, aurkaria deslegitimatzeko edo norberaren kausa justifikatzeko erabiltzen den komunikazio politikoa. Bi aldeek propaganda erabili zuten; nazioartean ere gatazkaren irudia eraikitzeko tresna nagusia.
- term: Santoñako errendizio saiakera
  def: |-
    1937an, Bilbo erori ondoren, EAJren inguruko euskal agintari eta unitateek italiarrekin negoziatu zuten errendizio bereiziari egindako saiakera, gudarien bizitza salbatzeko. Ez zuen funtzionatu: ez Errepublikak ez frankistek onartu.
- term: Terrore gorria
  def: |-
    Historiografian Errepublikaren aldeko eremuan, batez ere 1936ko lehen hilabeteetan, gertatutako indarkeria iraultzaile eta antiklerikalari emandako izena. Estatuaren kolapsoarekin eta milizien boterearekin lotuta.
- term: Terrore zuria
  def: |-
    Historiografian matxinatuen eta frankisten eremuan egindako errepresio sistematikoari emandako izena. Aurkari politikoak, sindikalistak, errepublikanoak, irakasleak eta disidenteak ezabatzeko politika antolatua; gerraostean luzatu zen.
