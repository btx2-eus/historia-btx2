intro: |-
  <strong>Gerra Zibila</strong> XX. mendeko Espainiako gatazka politiko eta sozialik sakonena izan zen. Ez zen bat-bateko talka: Errestaurazioaren amaieratik eta <span class="term" data-def="II. Errepublikan (1931-1936) ezkerra eta eskuina gero eta urrunago kokatu ziren, akordioa ezinezko bihurtuz. Gerra Zibilaren funtsezko aurrekari politikoa.">II. Errepublikako polarizaziotik</span> zetorren estatuaren narriadura, eta 1936ko uztailaren 17–18ko altxamendu militarrak porrot partziala jasan ondoren, herrialdea bi bandotan zatitu zuen eta gatazka zibil eta internazionalizatuan bihurtu zen.
  Gerra ez zen soilik Espainiako gatazka: <strong>faxismoaren eta antifaxismoaren arteko talkaren erdigune</strong> bilakatu zen. Alemaniak eta Italiak matxinatuei laguntza militarra eman zieten, eta URSSek eta Brigada Internazionalek Errepublikaren alde esku hartu zuten. Bi Mundu Gerraren prologo edo «entsegu-zelaia» izango zen. Euskal Herriak bere berezitasuna izan zuen: 1936ko urriko Euskal Estatutua larrialdi egoeran onartu zen, eta <strong>Jose Antonio Agirreren Euzko Jaurlaritza</strong> eratu zen, ordena publikoa, erlijio-askatasuna eta autonomia zabalak uztartuz, «Euskal Oasia» osatuz. Gerra 1939ko apirilaren 1ean amaitu zen Francoren garaipenarekin, eta haren ondorioak — heriotzak, erbestea, gosea, beldurra eta diktadura luzea — belaunaldi askotan iraun zuten.

