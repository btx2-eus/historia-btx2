intro: |-
  Gerra Zibila XX. mendeko Espainiako gatazka politiko eta sozialik sakonena izan zen. Ez zen bat-bateko talka: Errestaurazioaren narriaduratik eta II. Errepublikako polarizaziotik zetorren. <strong>1936ko uztailaren 17–18ko <span class="term" data-def="Armadaren sektore batek legezko gobernuaren aurka indarrez egindako matxinada. 1936ko altxamenduak II. Errepublika eraistea zuen helburu.">altxamendu militarrak</span></strong> porrot partziala izan zuen, eta herrialdea bi bandotan zatitu zuen. Faxismoaren eta antifaxismoaren arteko talkaren erdigune bilakatu zen: II. Mundu Gerraren «entsegu-zelaia».
