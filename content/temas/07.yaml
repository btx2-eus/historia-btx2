sections:
- id: g7-1
  number: '7.1'
  title: Garapen ekonomikoa eta gizarte-eraldaketa
  body: |-
    <h3>Autarkiaren porrota eta norabide-aldaketa</h3>
    <p>1940–50eko <span class="term" data-def="Kanpoarekiko mendekotasuna murriztu eta ekonomia barrurantz antolatzeko politika. Frankismoaren lehen etapako eredu nagusia; porrot handia eragin zuen: eskasia, dibisa falta eta hazkunde motela.">autarkiak</span> porrot egin zuen: produktibitate baxua, eskasia kronikoa eta dibisen falta ziren ekonomia itotzen zutenak. <strong>1959ko Egonkortze Planak</strong> norabidea aldatu zuen: inflazioa eta defizita kontrolatu, pezetaren balioa egokitu, kredituaren hedapena mugatu eta ekonomia kanpora irekitzen hasi. Helburua argia zen: ekonomia «normalizatzea» eta Espainia nazioarteko kapitalismoan txertatzea, erregimena arriskuan jarri gabe.</p>
    <p>Norabide-aldaketaren aurpegi politiko-administratiboa <span class="term" data-def="Ekonomian eta administrazioan trebatutako kargudunak, askotan Opus Dei inguruko sareetatik. Helburua erregimena eraginkorrago kudeatzea, ez demokratizatzea.">teknokraten</span> gorakada izan zen. 1957tik aurrera indartu ziren, Opus Dei inguruko sare profesionaletatik askotan; autarkiaren «epika falangistatik» «egonkortasuna, inbertsioa eta produktibitatea» helburuetara pasa ziren, ondorengo <span class="term" data-def="1960ko hamarkadako plangintza ekonomikoak: industria-poloak, azpiegiturak. Hazkunde azkarra bideratu zuten baina lurralde-desorekak areagotu.">Garapen Planen</span> logika bultzatuz.</p>
    <h3>«Mirari ekonomikoaren» hiru zutabeak</h3>
    <p>60ko hamarkadako hazkunde azkarra hiru faktorek elikatu zuten:</p>
    <ul>
    <li><strong>Atzerriko kapitala eta teknologia-transferentzia:</strong> industria adar berriak, modernizazioa eta enpresa handien hedapena.</li>
    <li><strong><span class="term" data-def="1960ko hamarkadako turista-hazkunde azkarra Espainian; dibisa-iturri nagusia eta kostaldeko eraldaketa handia.">Turismoaren boom-a:</span></strong> dibisa-iturri erabakigarria; zerbitzu-sektorea bultzatu zuen kostaldean.</li>
    <li><strong>Emigrazioa eta diru-bidalketak:</strong> Europan lan egitera joandakoek dibisak ekarri zituzten; <span class="term" data-def="Landa-eremuetatik industria-guneetara (Katalunia, Madril, Euskal Herria) egindako biztanleria-mugimendua. Urbanizazioa ekarri zuen.">barne-migrazioek</span> landa-eremuetako biztanleria industria-guneetara eraman zuten.</li>
    </ul>
    <p>Estatuak ere pisua izan zuen: <span class="term" data-def="Instituto Nacional de Industria: Estatuaren tresna industria estrategikoak bultzatzeko (SEAT, Endesa, Iberia, Pegaso, ENSIDESA). Frankismoaren industrializazio-politikan paper garrantzitsua.">INIren</span> enpresa publiko ugari sortu edo indartu ziren (SEAT, Endesa, Iberia, Pegaso), eta azpiegitura handiak eraiki ziren. Desarrollismoa ez zen soilik turismo eta kapital atzerritarren emaitza: estatuak gidatutako industrializazio zati garrantzitsu bat ere bazen.</p>
    <h3>Gizarte-eraldaketa eta kontraesan nabarmenak</h3>
    <p>Garapen ekonomikoak gizartea errotik eraldatu zuen. Lehen ondorioa <span class="term" data-def="Biztanleria hirietan kontzentratzeko prozesua; askotan planifikazio eskasarekin (periferia desordenatuak, zerbitzu publikoen gabezia).">urbanizazio</span> azkarra eta migrazio masiboa izan zen: auzo berriak, periferia zabalak eta planifikazio eskaseko hazkundea. Bigarrena lan-munduaren eraldaketa: soldata-lana hedatu eta gizarte-egitura berria finkatu zen (langile masa eta <span class="term" data-def="Garapenaren eta zerbitzuen hazkundeak sortutako gizarte-taldeak; kontsumo-eredu berriak garatu zituzten.">klase ertain berriak</span>). Hirugarrena <span class="term" data-def="Ondasunen kontsumoa eguneroko bizitzaren osagai nagusi bihurtzen den eredua (autoa, telebista, etxetresnak, oporrak).">kontsumo-gizarterako</span> jauzia: autoa, telebista, oporrak…</p>
    <div class="callout">Paradoxa: gizartea modernizatzen zen heinean, askatasun-nahia eta erregimenaren aurkako tentsioak handitzen joan ziren. Frankismoak hazkundea erabili zuen sendotzeko, baina hazkunde berak elikatu zituen frankismo berantiarraren krisiaren oinarriak.</div>
    <p>Garapenak muga eta kontraesan nabarmenak izan zituen: <strong>lurraldeen arteko desorekak</strong> handitu ziren; lan-segurtasun eskasa, zerbitzu publikoen gabezia eta auzo periferikoen prekarieta; <strong>sindikatu askeak eta greba-eskubidea</strong> ukatuta zeuden; eta emakumeen mugak mantendu ziren moral- eta lege-murriketa ugari bidez.</p>

- id: g7-2
  number: '7.2'
  title: Eliteak eta euskarri instituzionala
  body: |-
    <h3>Frankismoaren eliteen koalizioa</h3>
    <p>Ekonomia modernizatu arren, botere-egitura ez zen inola ere demokratizatu. Frankismoa ez zen «Franco bakarrik»: interes eta «familia» desberdinek osatutako botere-sarea zen, baina Francoren berezitasuna sare hori bere pertsonaren inguruan lotzea zen, orekak bilatuz eta azken erabakia beti bere esku utziz. Bost elite-zutabe nagusi:</p>
    <ul>
    <li><strong>Armada:</strong> Gerra Zibilaren ordenaren bermatzaile; botere politikoan presentzia handia.</li>
    <li><strong>Mugimendu Nazionalaren aparatua:</strong> gobernu-administrazioan eta kontrol sozialerako sareetan txertatua.</li>
    <li><strong>Elizaren sektore zabal bat:</strong> legitimitate morala, hezkuntzaren kontrola eta balioen transmisioa (60ko hamarkadan urruntzen hasi arte).</li>
    <li><strong>Teknokratak:</strong> 50eko amaieratik, ekonomia eraginkorrago kudeatu eta erregimena legitimatu hazkunde bidez.</li>
    <li><strong>Elite ekonomikoak</strong> (bankuak, industria-taldeak): desarrollismoak etekin handiak ekarri zizkien; trukean, egonkortasun autoritarioa «segurtasun-esparru» gisa onartu zuten.</li>
    </ul>
    <h3>Demokrazia organikoaren itxura, baina benetako kontrolarekin</h3>
    <p>Frankismoak bere burua <span class="term" data-def="Frankismoak demokrazia liberalaren ordezko gisa aurkeztu zuen ordezkaritza-eredua: herritarrak familia, udalerria eta sindikatuaren bidez ordezkatuak, ez alderdien bidez. Praktikan, sistema autoritarioa eta kontrolatua.">demokrazia organiko</span> gisa aurkezten zuen. Francok boterearen goi-mailak metatzen zituen; Gorteek edo Estatuko Kontseiluak ez zuten herri-subiranotasuna ordezkatzen: erabakiak zilegitasunez janzteko balio zuten. <span class="term" data-def="Frankismoaren antolaketa politiko eta ideologiko osoa: alderdi bakarra, sindikatu bertikala, propaganda-sareak. Erregimenaren masa-oinarria eta kontrol soziala.">Mugimendu Nazionalak</span> administrazioa eta kontrol soziala antolatzen zituen, eta <strong>Sindikatu Bertikalek</strong> (enpresari eta langileak egitura berean) lan-mundua kontrolatzen zuten, greba-eskubiderik gabe.</p>
    <h3>Instituzionalizazioa: «Franco gabeko frankismoa» prestatu</h3>
    <p>Frankismo berantiarrean, <span class="term" data-def="Erregimenak bere boterea lege eta erakundeen bidez egonkortzea. «Franco gabeko frankismoa» prestatzeko: Oinarrizko Legeak, Juan Carlosen izendapena, Carrero Blanco.">instituzionalizazioa</span> bultzatu zen. Tresna nagusiak:</p>
    <ul>
    <li><span class="term" data-def="Konstituziorik gabe erregimenaren egitura juridikoa antolatzeko lege-multzoa (1967ko Lege Organikoa, besteak beste).">Oinarrizko Legeak</span> — konstituzio baten ordezko gisa.</li>
    <li><strong>1967ko Estatuaren Lege Organikoa</strong> — botere-arkitektura findu eta errelebu-mekanismoak zehaztu.</li>
    <li><strong>1969an Juan Carlosen izendapena</strong> «a título de Rey» gisa — Frankok ez zuen Don Juan aukeratu («naturalagoa» zena), baizik Juan Carlos, erregimenaren barruan hezia, «kontrolagarriagoa» zena: jarraipen-plana.</li>
    </ul>
    <p>Azken pieza politiko handia <strong>Carrero Blanco</strong> izan zen: Francoren konfiantzazko gizona, 1973an Gobernuko Presidente izendatua. Helburua: monarkia-forma (Juan Carlos) bai, baina edukia frankista izaten jarraitzea. <strong>Carreroren hilketak</strong> (ETAren atentatua, 1973ko abendua) jarraipen hori kolokan jarri eta erregimenaren barne-tentsioak areagotu zituen.</p>

- id: g7-3
  number: '7.3'
  title: Babesa, indiferentzia eta oposizioa
  body: |-
    <h3>Triangelua: babesa, egokitzapena, oposizioa</h3>
    <p>Gizarteak ez zion frankismoari modu bakarrean erantzun. Ulertzeko modurik onena triangelu bat da: babesa, indiferentzia/egokitzapena eta oposizioa, hiruak batera existitu zirenak. Pertsona batek denboran zehar posizioz alda zezakeen: norbaitek «indiferente» bizi zezakeen 1962an, eta 1970ean greba batean parte hartu.</p>
    <p><strong>a) Babesa:</strong> Erregimenak babes sozial eta politiko erreal bat izan zuen. Garaileen Espainia (militarrak, administrazio frankista, jabetza-sareak); antikomunismoaren eta «ordena»ren diskurtsoa Gerra Hotzan; eta 60ko hamarkadako hobekuntza materialak sektore batzuei «ongizate-sentsazioa» eman zien. <span class="term" data-def="Gizartearen zati batek erregimenari ematen dion atxikimendua. Garaileen memorian, antikomunismoan, ordenaren diskurtsoan eta 1960ko hamarkadako hobekuntza materialean oinarritua.">Babes soziala</span> aktiboa eta pragmatikoa biak existitu ziren.</p>
    <p><strong>b) Indiferentzia edo <span class="term" data-def="Diktaduraren barruan bizirauteko jarrera praktikoa, frankista aktibo izan gabe eta oposizioan sartu gabe. Beldurrak, nekeak eta hobekuntza materialak eraginda.">egokitzapena</span>:</strong> Gizartearen zati handi baten jarrera ez zen militanteki frankista, baina ezta oposiziokoa ere. Arrazoiak: Gerra Zibilaren trauma, errepresioaren beldurra, politikarekiko nekea, eguneroko hobekuntza. Estrategia: ez sartzea, «ez ikustea», barruan moldatzea. Frankismoaren «egonkortasun» handia ez da soilik poliziaren ondorioa: gizarte zati handiak ez-sartzea aukeratu zuen.</p>
    <h3>Oposizioa: anitza eta gero eta zabalagoa</h3>
    <p><strong>c) Oposizioa:</strong> Garapen ekonomikoak eta gizarte-eraldaketak oposizioa elikatu zuten. Ez zen bloke bakarra:</p>
    <ul>
    <li><strong>Langile mugimendua:</strong> <span class="term" data-def="Langileen eskubideak defendatzeko mobilizazioa. CCOO eta grebak frankismoaren aurkako oposizio sozial nagusietako bat.">Comisiones Obreras (CCOO)</span> eta beste egitura paraleloak fabrika-barruko ordezkaritza «legala» aprobetxatuz eta grebak antolatuz. Asturias, Euskal Herria, Katalunia, Madril.</li>
    <li><strong>Ikasle mugimendua:</strong> hezkuntzaren hedapenarekin, unibertsitatea kontrolaren aurkako espazio esanguratsua bihurtu zen; asambleak, manifestazioak, grebak.</li>
    <li><strong>Oposizio politiko klasikoa:</strong> PCE (indartsua langile mugimenduan), PSOE (berregituratzen), talde demokratiko/errepublikarrak, erbestetik eta klandestinitatetik.</li>
    <li><strong><span class="term" data-def="Estatu zentralaren aurrean nazio-identitate, hizkuntza eta autogobernua defendatzen dituzten mugimenduak (Katalunia, Euskal Herria). Frankismoaren zentralismoaren eta zapalkuntza kulturalaren aurkako erantzun gisa indartu ziren.">Nazionalismo periferikoak:</span></strong> Katalunian eta Euskal Herrian, identitate nazionala eta hizkuntza-zapalkuntza.</li>
    <li><strong>Elizaren zati bat:</strong> 60ko hamarkadatik, langile-pastorala, apaiz gazteak eta kristau progresistak eskubide sozialak defendatzen hasi ziren.</li>
    </ul>
    <h3>ETA: oposizio berezi baina ez osoa</h3>
    <p><span class="term" data-def="1959an sortutako euskal erakunde nazionalista; 1960ko hamarkadan erradikalizatu eta bide armatua hartu zuen. Ez oposizio osoaren sinonimo.">ETA</span> 1959an sortu zen, EAJren jarrera moderatuarekin etsita zeuden gazte nazionalistez osatua; hasieran euskal identitate eta autogobernuaren aldeko. 60ko hamarkadan erradikalizatu eta bide armatua hartu: 1968an lehen hilketa, 1970ean <strong>Burgosko Prozesua</strong> (heriotza-zigorrak konmutatu), 1973an Carrero Blancoren hilketa. ETAk ez zeukan oposizio osoaren ordezkaritza, baina erregimenaren erantzun errepresiboa gogortu eta gizartearen polarizazioa handitu zuen.</p>
    <div class="callout">60ko hamarkadan hazkunde ekonomikoak erregimenari airea eman zion; baina aldi berean, gizartea modernizatu ahala, askatasun-nahia, gatazka soziala eta oposizioaren antolaketa indartu ziren.</div>

- id: g7-4
  number: '7.4'
  title: Frankismo berantiarraren krisia
  body: |-
    <h3>Hiru dimentsiotako krisia</h3>
    <p>Frankismo berantiarraren krisia ez da «azken urteetako arazo txiki bat»: pilatutako kontraesan askoren eztanda izan zen. Krisiak hiru dimentsio nagusi zituen:</p>
    <h3>1. Krisi ekonomikoa (1973)</h3>
    <p><strong>1973ko petrolio-krisiak</strong> Espainiako ekonomiari gogor jo zion: energia garestitu, ekoizpen-kostuak handitu, langabeziaren arriskuak agertu. Desarrollismoak sortutako «ongizatearen promesa» higatzen hasi zen. Gatazka soziala areagotu: soldaten defentsa, lan-baldintzak eta grebak ugaritu; langile mugimenduak indar handiagoa hartu.</p>
    <h3>2. Krisi politiko-instituzionala</h3>
    <p>Francoren pertsonaren inguruan eraikitako sistemak ezinbestean jasaten zuen krisia liderra ahultzen zenean. <strong>Carrero Blancoren hilketak</strong> (1973ko abendua) jarraipenaren zutabe nagusia apurtu zuen: ordutik erregimena barrutik gehiago zatitu zen, <span class="term" data-def="Frankismoaren barruko sektore immobilista eta gogorra; aldaketa oro mehatxutzat hartzen zuena.">«bunkerraren»</span> eta <span class="term" data-def="Frankismoaren barruan erreforma mugatu eta kontrolatuak egitearen aldeko jarrera, demokrazia osorik gabe.">aperturismoaren</span> arteko borroka ageriagoa bihurtuz. <strong>Arias Navarro</strong> izendatu zuten Carrero ordezkatzeko; «irekiera» diskurtsoa (otsailaren 12ko espiritua), baina neurriak oso mugatuak: aparatu frankistak ez zuen benetako pluralismorik onartu.</p>
    <h3>3. Krisi soziala eta nazioartekoa</h3>
    <p>Oposizioa gero eta antolatuagoa zen: langileak, ikasleak, nazionalismo periferikoak, prentsa kritikoa, Elizaren sektore bat. Indarkeria politikoa areagotu: ETAren atentatuak eta beste talde batzuenak (FRAP, GRAPO) tentsioa eta erregimenaren erreakzio errepresiboa gogortu zuten; eskuineko ekintza terroristak barne (Guerrilleros de Cristo Rey).</p>
    <p>Nazioarteko testuingurua erabakigarria: <strong>Portugalen 1974ko Krabelinen Iraultzak</strong> eta Greziako demokratizazioak erakutsi zuten aldaketa posible zela. Frankismoa gero eta «anomalia» handiagoa zen Mendebaldeko Europan; Europako Erkidego Ekonomikoan ez zen inoiz onartua izan.</p>
    <div class="callout">1975eko irailaren 27ko azken fusilamenduak (ETA 2, FRAP 3) nazioarteko gaitzespen izugarria sortu zuten eta erregimenaren deslegitimazioa azkartu zuten.</div>
    <p><strong>1975eko azaroaren 20an Franco hil zen.</strong> Bi egun geroago <strong>Juan Carlos I.a</strong> errege proklamatu zuten. Jarraipenerako sortutako tresna batzuk (monarkia bera) aldaketarako bide bihurtu ziren Trantsizioan.</p>

- id: g7-5
  number: '7.5'
  title: Errepresio politiko eta soziala
  body: |-
    <h3>Legalitate-itxuraz jantzitako errepresioa</h3>
    <p>Frankismoan «ordena» ez zen eslogan hutsa: boterearen funtsezko tresna zen. 1959–1975ean ekonomia modernizatzen ari zen bitartean, oposizioa hazten zen heinean errepresioa ez zen desagertu; sofistikatu eta gogortu egin zen. Errepresio hori bi mailatan ulertu behar da: politikoa eta soziala.</p>
    <p>Errepresio juridikoa legalitate-itxuraz jantzi zen:</p>
    <ul>
    <li><strong><span class="term" data-def="1959ko legea, erregimenak protestak eta grebak kontrolatzeko. Salbuespen-egoerak ezartzeko aukera ematen zuen.">1959ko Ordena Publikoaren Legea</span></strong> — <span class="term" data-def="Estatuak ordena publikoa arriskuan dagoela argudiatuz eskubideak murrizteko ezartzen duen egoera berezia. Frankismoak behin baino gehiagotan erabili zuen Euskal Herrian.">salbuespen-egoerak</span> «legalizatu».</li>
    <li><strong><span class="term" data-def="1963ko auzitegi berezia, delitu politikoak epaitzeko; oposizioa, grebalariak eta ikasleak zigortzeko tresna.">1963ko Tribunal de Orden Público (TOP)</span></strong> — delitu politikoak epaitzeko organo berezia.</li>
    <li><strong>1966ko Prentsa eta Inprenta Legea</strong> (Fraga Iribarnek bultzatua) — zentsura-mekanismoak berrantolatu.</li>
    </ul>
    <h3>Aparatu errepresiboa eta espetxe-sarea</h3>
    <p>Legeek bidea ematen zuten; polizia-aparatuak gauzatzen zuen. Frankismoaren «bihotz» errepresiboena <span class="term" data-def="Frankismoaren polizia politiko nagusia: zaintza, atxiloketak, infiltrazioa eta tortura-salaketa ugari historigrafian.">Brigada Político-Social (BPS)</span> izan zen. Horri gehitu: espetxe- eta zigor-sistema, erbesteratzea, isunak, lanpostu-galerak, eta oposizioko jendeari «bizitza izorratzeko» administrazio-neurri ugari. Salbuespen-egoerek (estatu osoan 1969an, Euskal Herrian behin baino gehiagotan) eskubide-murrizketa orokortu zuten.</p>
    <h3>Errepresioa gatazka sozialaren aurrean</h3>
    <p>60–70ko hamarkadetan, grebak, ikasle-mugimendua eta nazionalismo periferikoen aktibazioa handitu ahala, erregimenak tresna klasikoak erabili zituen: atxiloketa selektiboak, epaiketa eredugarriak, salbuespen-egoerak. <strong>1970eko Burgosko Prozesua</strong> (ETAko 16 kideren aurkako epaiketa militarra): sei heriotza-zigor, baina presio sozial eta diplomatikoak konmutatu eginak. Errepresioa «mezu» politiko bihurtzen denean nazioartea ere aktibatzen da.</p>
    <h3>Errepresio soziala eta azken gogortzea</h3>
    <p>Errepresioa ez zen beti politikoki antolatutakoen aurka bakarrik. <strong>1970eko Peligrosidad y Rehabilitación Social Legeak</strong> «arriskutsutzat» jotakoak zigortu zituen: homosexualak, prostituzioarekin lotutako emakumeak, eskaleak, «bizimodu desbideratutzat» jotakoak. Nazional-katolizismoaren moral-kontrolaren adierazle juridiko nagusia.</p>
    <p>Azken fasean (1974–1975) errepresioaren dimentsio bereziki bortitza: <strong>1974an Puig Antich</strong> anarkista gaztea «garrote vil»en bidez akatu; <strong>1975eko irailaren 27ko azken bost fusilamenduak</strong> (ETAko 2, FRAPeko 3). Nazioarteko gaitzespen zabala, protestak hiriburutan, erregimenaren deslegitimazioa azkartu. Frankismoa ez zen erreforma adostu batez amaitu, Francoren heriotzarekin baizik.</p>
    <div class="callout">1975eko azaroaren 20an Franco hil zen. Bi egun geroago, Juan Carlos I.a errege proklamatu zuten. Trantsizioa hasi zen: diktaduratik demokraziarako prozesu zaila, gatazka, negoziazio eta erreforma bidez.</div>
glossary:
- term: Aperturismoa
  def: |-
    Frankismoaren barruan erreforma mugatu eta kontrolatuak egitearen aldeko jarrera. «Bunker» immobilistarekin talka egin zuen frankismo berantiarrean.
- term: Atzerriko kapitala
  def: |-
    Kanpoko enpresa edo inbertitzaileek herrialdean egiten duten inbertsioa. Desarrollismoan funtsezkoa, baina menpekotasuna ere areagotu zuen.
- term: Azken fusilamenduak (1975)
  def: |-
    Irailaren 27an ETAko bi eta FRAPeko hiru kide fusilatu zituzten. Nazioarteko gaitzespena eta erregimenaren azken krisiaren sinboloa.
- term: Babes soziala
  def: |-
    Gizartearen zati batek erregimenari ematen dion atxikimendua. Garaileen memorian, antikomunismoan eta hobekuntza materialean oinarritua.
- term: Barne-migrazioa
  def: |-
    Landa-eremuetatik industria-guneetara (Katalunia, Madril, Euskal Herria) egindako biztanleria-mugimendua. Urbanizazioa ekarri zuen.
- term: Brigada Político-Social (BPS)
  def: |-
    Frankismoaren polizia politiko nagusia: zaintza, atxiloketak, infiltrazioa eta tortura-salaketak.
- term: Bunkerra
  def: |-
    Frankismoaren sektore immobilista eta gogorra; aldaketa oro mehatxutzat hartzen zuena. Aperturismoarekin talka egiten zuen.
- term: Burgosko Prozesua (1970)
  def: |-
    ETAko kideen aurkako epaiketa militarra. Heriotza-zigorrek protesta handia eragin zuten eta konmutatu egin ziren. Nazioarteko oihartzun handia.
- term: Carrero Blanco
  def: |-
    Francoren konfiantzazko gizona eta jarraipenaren giltzarria. 1973an Gobernuko Presidente; ETAk hil zuen urte berean. Hilketak jarraipen-plana astindu zuen.
- term: CCOO (Comisiones Obreras)
  def: |-
    Frankismo berantiarrean sortutako langile-ordezkaritza egitura; fabrika-barruko «legalitatea» aprobetxatuz, greba eta negoziazio bidez erregimenaren aurkako oposizio sozial nagusia.
- term: Desarrollismoa
  def: |-
    1959tik aurrera frankismoak bultzatutako hazkunde ekonomiko azkarra: industria, turismoa, kapitala eta kontsumoa. Autoritarioa eta desorekatua.
- term: Egonkortze Plana (1959)
  def: |-
    Autarkia gainditu eta ekonomia irekitzeko neurriak: inflazioa kontrolatu, pezeta egokitu, kanpo-kapitala erakarri. Desarrollismoaren abiapuntua.
- term: Egokitzapena
  def: |-
    Diktaduraren barruan bizirauteko jarrera praktikoa, frankista aktibo izan gabe eta oposizioan sartu gabe. Beldurrak, nekeak eta hobekuntza materialak eraginda.
- term: ETA
  def: |-
    1959an sortutako euskal erakunde nazionalista; 1960ko hamarkadan erradikalizatu eta bide armatua hartu zuen. Ez oposizio osoaren sinonimo.
- term: Frankismo berantiarra
  def: |-
    Frankismoaren azken etapa (1960ko amaieratik 1975era): modernizazioa askatasunik gabe, oposizioaren hazkundea eta azken krisia.
- term: Garapen Planak
  def: |-
    1960ko hamarkadako plangintza ekonomikoak: industria-poloak eta azpiegiturak. Hazkunde azkarra bideratu baina lurralde-desorekak areagotu zituzten.
- term: INI
  def: |-
    Instituto Nacional de Industria: Estatuaren tresna industria estrategikoak bultzatzeko (energia, siderurgia, automobilgintza: SEAT, Endesa, Iberia).
- term: Instituzionalizazioa
  def: |-
    Erregimenak boterea lege eta erakundeen bidez egonkortzea. «Franco gabeko frankismoa» prestatzeko: Oinarrizko Legeak, Juan Carlosen izendapena.
- term: Klase ertain berriak
  def: |-
    Garapenaren eta zerbitzuen hazkundeak sortutako gizarte-taldeak; kontsumo-eredu berriak garatu zituzten.
- term: Kontsumo-gizartea
  def: |-
    Ondasunen kontsumoa eguneroko bizitzaren osagai nagusi bihurtzen den eredua (autoa, telebista, oporrak). Frankismoak legitimaziorako erabili zuen.
- term: Krisi ekonomikoa (1973)
  def: |-
    Petrolio-krisiak Espainiako ekonomia ahuldu zuen: inflazioa, langabezia. Frankismoaren ahultzea azkartu zuen.
- term: Langile-mugimendua
  def: |-
    Langileen eskubideak defendatzeko mobilizazioa. CCOO eta grebak frankismoaren aurkako oposizio sozial nagusietako bat.
- term: Mugimendu Nazionala
  def: |-
    Frankismoaren antolaketa politiko eta ideologiko osoa: alderdi bakarra, sindikatu bertikala, propaganda-sareak eta erregimenarekiko atxikimendu politikoaren egiturak.
- term: Nazionalismo periferikoak
  def: |-
    Nazio-identitate, hizkuntza eta autogobernua defendatzen dituzten mugimenduak (Katalunia, Euskal Herria). Frankismoaren zentralismoaren aurkako erantzun gisa indartu ziren.
- term: Oinarrizko Legeak
  def: |-
    Konstituziorik gabe erregimenaren egitura juridikoa antolatzeko lege-multzoa (1967ko Lege Organikoa, besteak beste).
- term: Ordena Publikoaren Legea (1959)
  def: |-
    Protestak eta grebak kontrolatzeko legea; salbuespen-egoerak ezartzeko aukera ematen zuen.
- term: Salbuespen-egoera
  def: |-
    Eskubideak murrizteko eta kontrola gogortzeko ezarritako egoera berezia. Frankismoak Euskal Herrian behin baino gehiagotan erabili zuen.
- term: Teknokratak
  def: |-
    Ekonomia eta administrazioa modu pragmatikoan kudeatu zuten eliteak (Opus Dei inguruan). Ez demokratizatu, eraginkorrago egin nahi.
- term: Tribunal de Orden Público (TOP)
  def: |-
    1963ko auzitegi berezia, delitu politikoak epaitzeko; oposizioa zigortzeko tresna nagusia.
- term: Turismoaren boom-a
  def: |-
    1960ko hamarkadako turista-hazkunde azkarra; dibisa-iturri nagusia eta gizarte-aldaketen eragilea.
- term: Urbanizazioa
  def: |-
    Biztanleria hirietan kontzentratzeko prozesua; askotan planifikazio eskasarekin (periferia desordenatuak, zerbitzu falta).
