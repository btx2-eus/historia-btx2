intro: |-
  Frankismoaren bigarren etapa (1959–1975) <span class="term" data-def="1959ko Egonkortze Planaren ondoren etorritako hazkunde ekonomiko azkarra: industrializazioa, atzerriko kapitala, turismoa eta kontsumoaren hedapena. Autoritarioa eta desorekatua izan zen.">desarrollismoaren</span> garaia izan zen: 1959ko Egonkortze Planaren ondoren, Espainia nazioarteko kapitalismoan txertatu zen, eta «mirari ekonomikoa» gertatu zen. Baina <strong>modernizazio ekonomikoa ez zen modernizazio politikoarekin etorri</strong>: frankismoak garapena legitimazio gisa erabili zuen, baina askatasunak ukatu eta errepresioz mantendu zuen ordena. <div class="callout">«Hazkundea bai, askatasunik gabe» — frankismoaren bigarren etaparen paradoxa nagusia.</div>
