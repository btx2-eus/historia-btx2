intro: |-
  1975ean Franco hil zenean, diktadura amaitu zen, baina haren botere-egitura, beldur kulturala eta interes-sareak ez ziren berez desegin. Trantsizioa ez zen ate bat irekitzea izan, «korridore estu bat zeharkatzea» baizik: askatasuna negoziatzen zen bitartean, <strong>kolpe-beldurra ere negoziatzen zen</strong>. Aurrerapauso erraldoia (alderdiak legalizatu, hauteskundeak, Konstituzioa, autonomiak) eta jarraitutasuna (aparatu frankistak egokitu egin ziren) batera gertatu ziren.
