sections:
- id: g8-1
  number: '8.1'
  title: Erreforma politikoa eta oposizioa
  body: |-
    <h3>Frankismoaren instituzioak bizirik: abiapuntua</h3>
    <p>Franco hil eta bi egunera, <strong>Juan Carlos I.a</strong> errege izendatu zuten (1975eko azaroaren 22a). Baina diktadorea hiltzeak ez zuen automatikoki sistema desegin: frankismoaren instituzioak eta botere-aparatua (administrazioa, epaileak, polizia, armada, sindikatu bertikala) bere horretan zeuden. Bi logika lehian zeuden: <span class="term" data-def="Frankismoaren sektore immobilista, aldaketa demokratikoaren aurka eta ordena frankista mantentzearen alde.">«bunkerra»</span> (aldaketa arriskutsua da, ordena mantendu) eta <strong>erreformismoa</strong> (aldaketa beharrezkoa da, baina kontrolatuta, kolpea saihesteko).</p>
    <h3>Suárezen estrategia: «legez lege» demokraziara</h3>
    <p>Arias Navarroren motelkeriaren ondoren, erregeak <strong>Adolfo Suárez</strong> izendatu zuen gobernuburu (1976ko uztaila). Suárez frankismoaren aparatuan hezia zen, baina bere misioa zehatza zen: <span class="term" data-def="Diktaduraren legalitatea erabiliz, legeen bidez, demokraziarantz egindako aldaketa. Suárezen estrategiaren oinarria: frankismoaren legalitatearen barrutik irteten joatea.">erreforma politikoa</span>, frankismoaren legalitatearen barrutik egina. Trantsizioak paradoxa handi bat zuen: demokraziara iristeko, lehen fasean, diktadurak eraikitako legalitate eta instituzioak erabili ziren. Abantaila: estatu-aparatuari ez zela haustura iraultzaile bat adierazi zitzaion. Kostu: prozesua jarraitutasunaren logikak markatu zuen.</p>
    <p>Tresna nagusia <strong><span class="term" data-def="1976an onartutako legea: frankismoaren Gorteek sistema demokratikorako bidea irekitzeko baliatu zutena. Lehen giltza juridiko-politikoa.">Erreforma Politikoaren Legea (1976ko azaroa)</span></strong> izan zen: frankismoaren Gorteetan lege bat onartu zuten hauteskunde libreetarako bidea irekitzen zuena. Gorte-prokuradore askok ikusi zuten presio soziala (mobilizazioak, grebak) eta nazioarteko isolamendua handitzen ari zirela eta «irtenbide kontrolatu» bat hobetsi zuten kolapsoa saihesteko. 1976ko abenduaren 15ean erreferendumez berretsia.</p>
    <h3>Oposizioa: presioa kaletik, kalkulua agintetik</h3>
    <p>Oposizioa ez zen talde bakarra: PSOE, PCE, sindikatuak (CCOO, UGT), nazionalismo periferikoak. Aldarrikapenak: askatasun politikoak, <span class="term" data-def="Delitu edo zigor politikoak barkatzeko neurri juridikoa. 1977ko Amnistiaren Legeak aurrera egiteko bidea ireki zuen, baina frankismoaren erantzukizunak bigarren planoan utzi zituen.">amnistia</span>, hauteskunde libreak. Indar nagusia hasieran ez zen parlamentuan (ez baitzegoen), kalean baizik: grebak, mobilizazioak, legitimazio morala.</p>
    <p>Oposizioak kalkulu bat egin behar izan zuen ere: armadaren sektore batzuk demokraziaren aurka zeuden, eta «muga gainditzen zela» argudiatuta esku har zezaketen. «Haustura demokratiko osoa»ren diskurtsoak negoziazioaren logikarekin talka egin zuen.</p>
    <p>Mugarri kritikoa: <strong>1977ko apirilaren 9an PCE legalizatu zen</strong> — ezinezkoa zen benetazko hauteskunderik antolatu PCErik gabe, baina estatu kolpea bul ekar zezakeen. Arriskua benetakoa zen; pauso hark «joko-zelaia» demokratikoa zabaldu zuen. <strong>1977ko urriaren 15eko Amnistiaren Legeak</strong> preso politikoak askatzen lagundu zuen, baina «aurrera begiratzeko» logika horrek frankismoaren erantzukizunen auzia bigarren planoan utzi zuen.</p>
    <div class="callout">Trantsizioaren lehen fasea ulertzeko gakoa: erreformak «goitik» diseinatu ziren baina «behetik» bultzatu, estatuaren aparatu zaharrak oraindik indarrean zirenean.</div>

- id: g8-2
  number: '8.2'
  title: Hauteskunde orokorrak eta autonomikoak
  body: |-
    <h3>1977ko ekainaren 15a: lehen hauteskunde demokratikoak</h3>
    <p>Prozesua <span class="term" data-def="Indar politiko desberdinen arteko akordio zabala, gatazkak saihestu eta sistema egonkortzeko. Konstituzioa eta Moncloako Itunak adosteko funtsezkoa.">kontsentsuaren</span> logikak markatu zuen. Hiru figura erabakigarri:</p>
    <ul>
    <li><strong>Adolfo Suárez (UCD):</strong> zentro politikoa antolatu eta irabazi zuen; erreformaren bide pragmatikoak babes soziala izan zuen.</li>
    <li><strong>Felipe González (PSOE):</strong> oposizio demokratikoaren ardatz nagusi bihurtu zen; kontsentsua ahalbidetu zuen gobernuari «elkarrizketarako solaskide» serio bat emanez.</li>
    <li><strong>Santiago Carrillo (PCE):</strong> monarkia eta bandera onartu, «adostasun konstituzionalera» hurbildu. Atochako sarraskiaren ondorengo erantzukizun publikoak PCEren integrazioa erraztu zuen.</li>
    </ul>
    <p>Sistema elektoral berria: ordezkaritza proportzionala baina <span class="term" data-def="Eserlekuak banatzeko formula proportzionala. Probintzia barrutiekin batera, alderdi handiei mesede egiteko joera du; gobernagarritasuna bilatzeko asmoz.">D'Hondt metodoa</span> eta probintzia-barrutiak, gobernagarritasuna bilatzeko: parlamentua hamarnaka indarren mozaiko ezegonkor bihurtu gabe.</p>
    <h3>1979tik aurrera: desenkantoa eta UCDren higadura</h3>
    <p>1979ko hauteskundeen ondoren <span class="term" data-def="Trantsizioaren lehen ilusioen ondorengo frustrazio soziala: krisi ekonomikoa, langabezia eta indarkeriak itxaropenak zapuztu zituzten.">desenkantoa</span> zabaldu zen. «Demokrazia etorri eta dena konponduko da» itxaropen sinplea talka egin zuen errealitatearekin: inflazioa, langabezia, indarkeria. UCDk 1979an irabazi arren, barne-lerroak urratzen hasi ziren eta koalizio zabalaren higadura azkartu zen.</p>
    <h3>Autonomia-eredua: bi bideen logika</h3>
    <p>1978ko Konstituzioak bi bide ezarri zituen autonomietarako:</p>
    <ul>
    <li><strong>143. artikulua</strong> — «bide arrunta»: eskumenak pixkanaka, autonomia gehienentzat.</li>
    <li><strong>151. artikulua</strong> — «bide azkarra»: eskumen zabalagoak hasieratik, autogobernu-eskaera historiko eta politiko sendoa zutenei (Katalunia, Euskal Herria).</li>
    </ul>
    <p>Bi bideen logika: autogobernu-eskaerak kanalizatzea (gatazka ez lehertzeko) eta estatua modu mailakatuan eraldatzea. Horrela «<span class="term" data-def="1978ko Konstituzioaren lurralde-eredua: erkidegoei eskumenak eta erakunde propioak, baina estatuaren batasuna mantenduz.">autonomien estatua</span>» eraiki zen pixkanaka.</p>

- id: g8-3
  number: '8.3'
  title: 1978ko Konstituzioa eta 1979ko Gernikako Estatutua
  body: |-
    <h3>Konstituzioa: oreka-dokumentu kontsentsuduna</h3>
    <p><span class="term" data-def="Estatuaren oinarrizko legea: erakundeak, eskubideak, botereen banaketa eta lurralde-eredua. 1978koak Espainia estatu sozial eta demokratiko gisa definitu zuen.">1978ko Konstituzioa</span> kontsentsuz idatzi zen (UCD, PSOE, PCE). Krisi ekonomikoa, kale-gatazka eta indarkeria politikoa etengabeko presio gisa zeuden, eta armadaren mehatxua erreala zen: Konstituzioa oreka-dokumentua da, denek irabazi eta denek irentsi. Lau ardatz nagusi:</p>
    <ul>
    <li><strong>Estatu sozial eta demokratikoa:</strong> subiranotasun popularra eta ardura soziala; ez estatua liberal neutro hutsa.</li>
    <li><strong>Eskubide eta askatasunen sistema:</strong> adierazpen-askatasuna, sindikatu eta alderdi politikoak, epaileen independentzia; frankismoaren oinarri juridikoa apurtu.</li>
    <li><strong><span class="term" data-def="Erregea estatu-buru, baina botere politikoa parlamentuaren eta gobernu demokratikoaren bidez gauzatzen da. Juan Carlos I.a estatu-buru; Konstituzioaren pakete institutuzionalaren barruan onartu zen.">Monarkia parlamentarioa:</span></strong> estatuaren aparatu zaharraren erreakzioa leuntzeko «euste-pieza»; erreferendum bereizi batean bozkatu gabe, Konstituzioaren pakete osoaren barruan.</li>
    <li><strong>Lurralde-eredua («autonomien estatua»):</strong> Espainia ez zentralismo frankistaren jarraipen hutsa, baina estatuaren batasuna mantenduz.</li>
    </ul>
    <p>Herritarrek berretsi zuten <strong>1978ko abenduaren 6an</strong>. Euskal Herrian, ordea, irakurketa berezia: EAJren abstentzioak eta ezker abertzalearen jarrerak «itxiera» hori modu desberdinean bizi arazi zuen.</p>
    <h3>Gernikako Estatutua (1979): autogobernuaren edukia</h3>
    <p><strong>1979ko Gernikako Estatutuak</strong> Konstituzioak irekitako autonomia-atea edukiz bete zuen EAErako. Negoziazio-prozesua testuinguru oso gogorrean: ETAk eta estatuaren biolentziak protagonismo handia. Bidea: Euskal Kontseilu Nagusia (aurreautonomia-egitura) laguntzarekin. <strong>1979ko urriaren 25eko erreferendumean</strong> herritarrek berretsi zuten, boto baliodunen artean oso nagusi. Hortik aurrera, autogobernua «promesa» izateari utzi zion: <strong>1980an lehen Eusko Jaurlaritza</strong> eratu zen, <strong>Garaikoetxea</strong> (EAJ) lehendakari.</p>
    <div class="callout">Konstituzioak «markoa» ezarri zuen; Gernikako Estatutuak, Euskal Herrian, marko horren barruan autogobernuaren edukia zehaztu zuen. Gatazkak ez zituzten desagerrarazi, baina arauetan kokatu zituzten.</div>

- id: g8-4
  number: '8.4'
  title: 'Berunezko urteak: terrorismoa eta biolentzia politikoa'
  body: |-
    <h3>Norabide anitzeko indarkeria</h3>
    <p>«Adostasunaren garaia» irudia zati bat baino ez da: 1975–1982 artean indarkeria oso presente egon zen, eta horrek prozesu demokratikoa baldintzatu zuen. Indarkeria norabide anitzekoa:</p>
    <ul>
    <li><strong>ETA eta GRAPO:</strong> jarduera armatu jarraitua. <strong>1980an ETAk ia 100 hildako eragin zituen</strong> (inoizko gehien). Atentatu bakoitzak erantzun politiko eta polizial bat eskatzen zuen; gizartea polarizatu zuen.</li>
    <li><strong>Eskuin muturra:</strong> <strong>Atochako sarraskia (1977-01-24)</strong> — abokatu laboralisten bulego komunista erasotu, oposizioa probokatzeko eta prozesua desegonkortzeko. Montejurrako gertakariak (1976): karlisten bilkuran tiroketa, bi hildako. Demokrazia aldaketa ez zen «denek onartutako» proiektua.</li>
    <li><strong>Estatu-indarkeria:</strong> <strong>Gasteizko 1976-03-03ko gertakariak</strong> (langile greban bost hildako), Sanferminak 1978 (hildakoa, zauritu ugari). Frankismoaren segurtasun-kulturak <span class="term" data-def="Erregimen zaharreko pertsona, erakunde eta praktikak sistema berrira egokituta mantentzea. Administrazio, epailetza, polizia eta armada frankistaren zati handia ez zen desegin.">jarraitutasun</span> nabarmena erakutsi zuen.</li>
    </ul>
    <h3>Ondorio politikoak: kontsentsua beharrezkoago</h3>
    <p>Berunezko giro horrek ondorio politiko argiak izan zituen: alderdi nagusiek kontsentsuaren bidea indartu zuten maiz, prozesua lehertzeko arriskua oso erreala zelako. Indarkeria politikoak «marra gorriak» sortzen zituen eta egonkortasuna lehenestera bultzatzen zuen. 1979tik aurrera krisia eta indarkeria jarraitu ahala, gizartean desenkantoa hedatu zen, eta UCDren higadura azkartu.</p>

- id: g8-5
  number: '8.5'
  title: Krisi ekonomikoa eta gizarte-gatazkak
  body: |-
    <h3>Petrolio-krisiaren kolpea eta gizartearen tirabirak</h3>
    <p>1973ko eta 1979ko petrolio-krisiek inflazioa, langabezia eta industria-krisia eragin zituzten. Espainian efektua bereziki gogorra: energia-mendekotasun handia eta egitura ekonomikoaren ahulezia (industria tradizional astuna, produktibitate arazoak). Demokrazia eraikitzea testuinguru ekonomiko gogor batean gertatu zen: jendeak askatasunak nahi zituen, baina ekonomiak ez zuen laguntzen.</p>
    <h3>Moncloako Itunak (1977): kontsentsuaren prezioa</h3>
    <p><strong><span class="term" data-def="1977an gobernuak eta alderdi nagusiek sinatutako akordio politiko-ekonomikoak, krisiari aurre egiteko eta egonkortasuna bermatzeko. Langileentzat sakrifizioak ere ekarri zituzten.">Moncloako Itunak (1977ko urria)</span></strong> Trantsizioaren pieza politiko nagusietako bat dira: gobernuak (Suárez) eta alderdi nagusiek (PSOE, PCE) akordio bat egin zuten krisiari aurre egiteko, inflazioa jaisteko eta gatazka soziala «bideratzeko». Baina kontsentsuak prezio bat zuen: langile askorentzat neurri gogorrak (soldata-hazkundea mugatzea, diziplina ekonomikoa). Kalkulu politikoa: gatazka soziala lehertzen bazen, Trantsizioa bera arriskuan jar zitekeen.</p>
    <h3>Mugimendu sozialak: demokrazia kalean ere</h3>
    <p>Langile-mugimenduak (CCOO, UGT) protagonismo handia hartu zuen, baina mugimendu sozial berriak ere indartu ziren:</p>
    <ul>
    <li><strong>Auzo-elkarteak:</strong> hirigintzaren, etxebizitzaren, zerbitzu publikoen inguruan.</li>
    <li><strong>Emakumeen mugimendua:</strong> berdintasun juridiko eta soziala (familia-zuzenbidea, lan-eskubideak).</li>
    <li><strong>Mugimendu ekologistak:</strong> industrializazioaren ondorioak eta energia-eredua zalantzan.</li>
    </ul>
    <div class="callout">Demokrazia ez zen soilik hauteskundeak eta Konstituzioa: gizarte-mugimenduek erakutsi zuten demokrazia kalean ere egiten zela, eskubideak eta bizimodu duina aldarrikatuz.</div>

- id: g8-6
  number: '8.6'
  title: 1981eko estatu-kolpe saiakera (23-F)
  body: |-
    <h3>Testuingurua: ahultasun pilatua</h3>
    <p>UCDren desegitea, Suárezen dimisioa (1981eko urtarrila), krisi ekonomikoa eta indarkeria politikoa batera: 1979tik aurrera gobernagarritasuna ahultzen joan zen. Armadaren sektore batzuetan frankismoan hezitako «ordena» eta «batasun» diskurtsoak indar handia zuen oraindik.</p>
    <h3>1981eko otsailaren 23a: Kongresuaren bahiketa</h3>
    <p><strong>Teniente koronel Antonio Tejerok</strong> eta gizon armatu talde batek Kongresua hartu zuten inbestidura saioa martxan zegoela. Ikusgarria eta bortitza: tiroak sabaira, diputatuak lurrean, instituzio demokratikoaren bihotza bahituta. Baina 23-F ez da «ekintza isolatu» bat: atzean proiektu zabalago bat zegoen.</p>
    <ul>
    <li><strong>Alfonso Armada jenerala:</strong> «irtenbide politikoa» ematen saiatu — gobernu «salbazio nazional» bat, alderdi nagusiekin, kolpeari konstituzionaltasunaren itxura emanez.</li>
    <li><strong>Milans del Bosch (Valentzia):</strong> tankeak kalera atera zituen, arrikua benetakoa zela erakutsiz.</li>
    </ul>
    <h3>Kolpearen porrota eta ondorioak</h3>
    <p>Gauean <strong>Juan Carlos I.ak</strong> telebistan agertu eta konstituzio-ordena babestu zuen, kolpearen aurka argi jarriz. Legitimitate instituzionala moztu zion kolpeari, eta armadaren goi-aginte askok ez bat egiteak kolpearen hedapena geldiarazi zuen. 23-Fren hiru ondorio nagusi:</p>
    <ul>
    <li><strong>Demokraziaren hauskortasuna agerian:</strong> «Trantsizioa atzeraezina» ez zen egia.</li>
    <li><strong>Monarkiaren papera indartua:</strong> erregea konstituzioaren bermatzaile gisa finkatu zen.</li>
    <li><strong>«Egonkortasunaren» diskurtsoa piztu:</strong> instituzioak sendotzeko premia bizkortu.</li>
    </ul>
    <p><strong>1982ko PSOEren garaipenak</strong> ziklo bat itxi zuen: alternantzia politiko normalizatuak Trantsizioaren amaierako fasea sendotu zuen. Demokrazia egiazki egonkortu zen orduan.</p>
    <div class="callout">23-F ez da pasarte bitxi bat Trantsizioaren amaieran: Trantsizioaren barruan bertan dagoen gakoa da, erakusten duelako zergatik izan ziren kontsentsua eta gobernagarritasuna hain zentralak.</div>
glossary:
- term: Amnistia
  def: |-
    Delitu edo zigor politikoak barkatzeko neurri juridikoa. 1977ko Legeak aurrera egiteko bidea ireki zuen, baina frankismoaren erantzukizunen auzia bigarren planoan utzi zuen.
- term: Autonomia
  def: |-
    Lurralde batek estatuaren barruan bere erakunde propioak eta autogobernua izatea. Gernikako Estatutuak (1979) garatu zuen EAEn.
- term: Autonomien estatua
  def: |-
    1978ko Konstituzioaren lurralde-eredua: erkidegoei eskumenak eta erakunde propioak, baina estatuaren batasuna mantenduz.
- term: Bunkerra
  def: |-
    Frankismoaren sektore immobilista, aldaketa demokratikoaren aurka eta ordena frankista mantentzearen alde.
- term: Demokrazia parlamentarioa
  def: |-
    Hauteskunde libreetan oinarritutako sistema, non gobernuak parlamentuaren konfiantza behar duen.
- term: Desenkantoa
  def: |-
    Trantsizioaren lehen ilusioen ondorengo frustrazioa: krisiak, langabeziak eta indarkeriak itxaropenak zapuztu zituzten.
- term: D'Hondt sistema
  def: |-
    Eserlekuak banatzeko formula proportzionala; probintzia barrutiekin batera, alderdi handiei mesede egiteko joera.
- term: Erreforma politikoa
  def: |-
    Diktaduraren legalitatea erabiliz, legeen bidez demokraziarantz egindako aldaketa. Suárezen estrategia nagusia.
- term: Erreforma Politikoaren Legea (1976)
  def: |-
    Frankismoaren Gorteek hauteskunde libreetarako bidea irekitzeko onartu zuten legea. Lehen giltza juridiko-politikoa.
- term: Estatu-kolpea (23-F)
  def: |-
    Boterea legez kanpo eta indarrez eskuratzeko saiakera. 1981eko otsailaren 23an erakutsi zuen demokrazia hauskorra zela.
- term: Gernikako Estatutua (1979)
  def: |-
    Euskal Autonomia Erkidegoaren autonomia-estatutua: Eusko Legebiltzarra, Jaurlaritza eta eskumenak.
- term: Gobernagarritasuna
  def: |-
    Sistema politiko batek erabakiak hartu eta egonkortasuna mantentzeko gaitasuna. Trantsizioaren obsesio nagusietakoa.
- term: Hauteskunde orokorrak (1977)
  def: |-
    Frankismo ondorengo lehen hauteskunde demokratikoak (ekainaren 15a). UCDren garaipena; PSOE oposizio nagusi.
- term: Indarkeria politikoa
  def: |-
    Helburu politikoak lortzeko indarkeria: ETA, GRAPO, eskuin muturra eta polizia-gehiegikeriak.
- term: Jarraitutasuna
  def: |-
    Erregimen zaharreko pertsona, erakunde eta praktikak sistema berrira egokituta mantentzea.
- term: Konstituzioa (1978)
  def: |-
    Estatuaren oinarrizko legea: estatu sozial eta demokratikoa, monarkia parlamentarioa eta autonomien estatua.
- term: Kontsentsua
  def: |-
    Indar politikoen arteko akordio zabala, gatazkak saihestu eta sistema egonkortzeko. Gai sakon batzuk bigarren planoan utzi zituen.
- term: Krisi ekonomikoa
  def: |-
    1973ko eta 1979ko petrolio-krisiek eragindako inflazioa, langabezia eta industria-krisia.
- term: Legalizazioa
  def: |-
    Debekatutako alderdi eta sindikatuak legez onartzea. PCEren legalizazioa (1977ko apirila) bereziki arriskutsua eta erabakigarria.
- term: Moncloako Itunak (1977)
  def: |-
    Gobernuaren eta alderdien akordioak krisiari aurre egiteko; langileentzat sakrifizioak ere ekarri zituzten.
- term: Monarkia parlamentarioa
  def: |-
    Erregea estatu-buru, baina botere politikoa parlamentuaren eta gobernuaren bidez. Juan Carlos I.a.
- term: Oposizio demokratikoa
  def: |-
    Askatasunen, amnistiaren eta hauteskunde libreen alde jardun zuten alderdi, sindikatu eta mugimenduak.
- term: Subiranotasun popularra
  def: |-
    Botere politikoaren iturria herritarren borondatea dela dioen printzipioa. 1978ko Konstituzioak herriarengan kokatu zuen.
- term: Terrorismoa
  def: |-
    Helburu politikoak lortzeko indarkeria sistematikoa eta beldur soziala. Trantsizioan ETA eta GRAPOren jarduna.
- term: Trantsizioa
  def: |-
    Frankismotik demokrazia parlamentariora igarotzeko prozesua (1975–1982): erreforma, kontsentsua, krisia eta indarkeria.
- term: 23-F (1981)
  def: |-
    Otsailaren 23ko estatu-kolpe saiakera (Tejero, Milans del Bosch). Juan Carlos I.aren esku-hartzeak desaktibatu zuen.
