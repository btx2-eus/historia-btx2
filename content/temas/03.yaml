sections:
- id: g3-1
  number: '3.1'
  title: Industrializazioaren testuingurua Espainian
  body: |-
    <p>XIX. mendeko industrializazioa Espainian <strong>berandu, motel eta modu desorekatuan</strong> garatu zen. Europako beste herrialde batzuekin alderatuta, nekazaritzaren pisu handiak, barne-merkatu ahulak, kapital faltak eta ezegonkortasun politikoak modernizazioa mugatu zuten. Estatuak arantzelak, trenbideak, finantza-erreformak eta lehen legedi soziala bultzatu zituen, baina industrializazioa lurralde gutxi batzuetan pilatu zen: Katalunian, Euskal Herrian eta Asturiasen.</p>

    <h3><span class="h-num">3.1.1</span> Espainiaren atzerapen historikoa Europan</h3>
    <p>XIX. mendeko Industria Iraultzak Britainia Handia, Frantzia eta Alemania errotik aldatu zituen bitartean, Espainiako industrializazioa hiru ezaugarrik markatu zuten: <strong>berantiarra</strong> (mende erditik atzeratuagoa), <strong>motela</strong> (erritmo apala) eta <strong>desorekatua</strong> (lurralde gutxitan kontzentratua). XIX. mendearen amaieran, Espainian populazioaren %60–70 oraindik landa-eremuetan bizi zen.</p>
    <p>Atzerapenaren arrazoi nagusiak: kapital ezarekiko mendekotasuna (atzerriko inbertsioak nagusi meatzaritzan eta trenbideetan, irabaziak kanpora eramanez), barne-merkatu ahula (familien diru-sarrera txikiak), giza kapitalaren mugak (alfabetatze-tasa baxua), eta egoera politiko ezegonkorra (XIX. mende osoko gerra zibilak eta matxinada militarrak).</p>

    <h3><span class="h-num">3.1.2</span> Nekazaritzaren egitura: industrializazioa baldintzatzen duen oinarria</h3>
    <p>Espainiako lurraren banaketa oso desorekatua zen, eta ekoizpen-erritmo eta gizarte-tentsioak nabarmen baldintzatu zituen:</p>
    <ul>
      <li><span class="term" data-def="Lurraren jabetza handiak familia gutxi batzuen esku. Andaluzian, Extremaduran eta Gaztela hegoaldean nagusi. Produktibitate baxua eta jornalarien zapalkuntza.">Latifundismoa</span>: nobleziaren, Elizaren eta burgesia aberatsaren esku zeuden lur-jabetza handiak. Produktibitate baxua eta jornalarien zapalkuntza eragin zituzten.</li>
      <li><span class="term" data-def="Ustiapen txikiak, autokontsumora bideratuak, soberakin merkaturagarri gutxikoak. Galizian eta ipar-mendebaldean ohikoa. Modernizaziorako kapitalik gabe.">Minifundismoa</span>: ustiapen txikiak, autokontsumora bideratuak. Galizian, Asturiasen eta ipar-mendebaldeko eskualde menditsuetan ohikoa.</li>
      <li>Ustiapen ertain mistoak: errendimendu hobea, hiri- eta industria-guneetara loturik. Ebro arroan, Gaztela iparraldean eta Nafarroan agertzen zen.</li>
    </ul>
    <p>Ondorioz, barne-merkatu industriala oso ahula zen, eta lan-baldintza gogorrek <span class="term" data-def="Jornalarien antolaketa sindikala nekazari-eremuetan. Batez ere Andaluzian errotu zen, 1930eko hamarkadan bortizki lehertuko zena.">sindikalismo agrarioa</span> elikatu zuten, errepresio ziklikoarekin txandakatuz.</p>

    <h3><span class="h-num">3.1.3</span> Estatuaren politika ekonomikoak (1875–1930)</h3>
    <p>Berrezarpenaren lehen hamarkadetan ez zegoen "plan industrial" koherenterik, baina bost ardatzeko politika-multzo batek industrializazio selektiboa elikatu zuen:</p>
    <ul>
      <li><strong>a) <span class="term" data-def="Inportazioei ezarritako kanpo-zerga, barne-industriari merkatu babestua emateko. 1891ko eta 1906ko arantzelek Espainiako industria-poloak indartu zituzten.">Babes-arantzelak</span>:</strong> 1891ko arantzelatik aurrera, kanpoko lehiari hesi fiskala jarri zitzaion. Kataluniako ehungintzak, Bizkaiko siderurgiak eta Asturiasko ikatzak merkatu-segurtasuna eskuratu zuten. Alde negatiboa: barne-kontsumitzaileek prezio altuak ordaintzen zituzten eta berrikuntzarako pizgarriak ahuldu egin ziren.</li>
      <li><strong>b) Azpiegiturak — trenbideak eta portuak:</strong> 1855eko Trenbide Lege Orokorrarekin abiatu zen sare-eraikuntza, eta 1875etik aurrera sare erradiala finkatu zen — Madril erdigune, kostaldera eta mugaldera adarrak. Portuetan inbertsio publiko handia egin zen (Bilbo, Bartzelona, Pasaia, Cádiz).</li>
      <li><strong>c) Energia eta komunikazioak:</strong> Ikatzaren erreserba nagusiak Asturiasen zeuden. 1920ko hamarkadan jauzi kualitatiboa: Konfederazio Hidrografikoak (1926tik) urtegiak antolatzeko; <strong>CAMPSA</strong> (1927) petrolio-monopolioa estatuaren eskuetan; <strong>CTNE</strong> (1924) telefonia-sare bakar nazionala.</li>
      <li><strong>d) Finantza-kapitala:</strong> Banco de España (1874 monopolio-emisorea) finantza-egonkortasunaren oinarri. 1885eko Merkataritza Kodeak sozietate anonimoen erregimen modernoa ezarri zuen. Atzerriko kapitala (britainiarra, frantsesa) meatzaritzan eta trenbideetan agertu zen.</li>
      <li><strong>e) Legedi soziala:</strong> Auzi sozialaren presioak Estatua arautzera bultzatu zuen: 1900ko Lan-Istripuen Legea (kalte-ordain betebeharra); 1903ko Gizarte Erreformen Institutua (lan-ikuskaritza); 1908ko Aurreikuspen Nazionala Institutua (pentsio-kultura); 1919ko 8 orduko lanaldia; eta 1919ko <span class="term" data-def="1919an ezarritako derrigorrezko erretiro-pentsioen sistema goiztiarra langileentzat. Gizarte-segurantzaren aurrekari nagusietako bat.">Retiro Obrero</span>.</li>
    </ul>

    <h3><span class="h-num">3.1.4</span> Lurralde-guneak: bi abiadurako herrialdea</h3>
    <ul>
      <li><strong>Katalunia:</strong> ehungintza-industriak merkatu nazional babestua aurkitu zuen. Pirinioetako zentral hidroelektrikoek goiz elektrifikatu zuten Bartzelonako inguru metropolitarra. Sindikalismo bortitza eta enpresa-elkarte indartsuak sortu ziren.</li>
      <li><strong>Euskal Herria:</strong> burdin-meatzaritzak siderurgia eta ontzigintza modernoaren oinarria eman zuen Bizkaian, eta ETE espezializatuen sare bat (makina-erreminta, papergintza, armagintza) Gipuzkoan.</li>
      <li><strong>Asturias:</strong> ikatzaren ekoizpenak meategi-eskualdeetan "enpresa-hiri" sistema sortu zuen. Tokiko menpekotasun handia eta sindikalismo sozialistaren bastioi nagusietako bat.</li>
      <li><strong>Madril:</strong> administrazio eta zerbitzuak motorra; industria arina eta inprimategiak, baina ez industria astun handirik.</li>
    </ul>
    <div class="callout"><div class="callout-title">Bi abiadurako herrialdea</div>Industrializazioa "lurralde-uharte" gisa agertu zen: polo sendo batzuk, baina sare nazional koherenterik gabe. Honek lurralde-polarizazioa (ipar-ekialde industriala vs. hego nekazaria), kanpo-kapitalarekiko menpekotasuna eta tentsio sozial iraunkorra sortu zituen. 1930ean polo industrialak modernizazio aurreratuan zeuden, baina egitura-desorekak eta giza kapitalaren ahuleziak sistema auskorra utzi zuten 1929ko mundu-krisiaren aurrean.</div>

- id: g3-2
  number: '3.2'
  title: 'Industrializazioa Euskal Herrian: eszenatoki bereiziak'
  body: |-
    <p>Euskal Herriko industrializazioa ez zen lurralde guztietan berdin garatu. Bizkaian industria astuna nagusitu zen, burdin-meategien, siderurgiaren eta ontzigintzaren inguruan; Gipuzkoan, berriz, enpresa txiki eta ertain espezializatuen sare trinkoa sortu zen; Araban eta Nafarroan industrializazioa motelagoa eta agroindustria zein logistikari lotuagoa izan zen. Lau fasetan garatu zen garai osoan zehar.</p>

    <h3><span class="h-num">3.2.1</span> Faseak eta erritmoa (1876–1930)</h3>
    <p><strong>Lehen jauzia (1876–1890): meatzaritza-esportazioa eta lehen siderurgia.</strong> Hirugarren Karlistadaren amaieraren ondoren giro politiko egonkorragoa eta kapital atzerritarra iritsi ziren. Bizkaiko Somorrostro-Meatzaldeko burdin-mea esportatzen hasi zen Erresuma Batura (Bessemer prozesuak silizio-gutxiko mineral hori eskatzen zuen). 1873an <strong>Orconera Iron Ore Company Ltd.</strong> sortu zen, kapital britainiar eta espainol nahasiarekin. Bilboko itsasadarrean lehen <span class="term" data-def="Burdin mea kokea erabiliz altzairu bihurtzeko instalazio handiak. Bizkaiko industria astunaren oinarria. Lehen modernoa Sestaon 1880an.">labe garai modernoak</span> agertu ziren ("San Francisco", 1880an Sestaon). Gipuzkoan tailer mekanikoak eta papergintza indartu ziren, ibai-energiari esker; Araban irin-ekoizpena eta logistika sendotu ziren Gasteizen.</p>
    <p><strong>Sendotzea eta dibertsifikazioa (1890–1913).</strong> Bizkaiko siderurgia heldu zen: 1902an hiru enpresa nagusiren bateratzeak <span class="term" data-def="1902an sortutako Espainiako industria-enpresa handiena. Labe garaiak, laminazio-trenak eta ontzigintza integratuak biltzen zituen.">Altos Hornos de Vizcaya (AHV)</span> sortu zuen. Gipuzkoan ETE espezializatuen sare trinkoa zabaldu zen (makina-erreminta Deba-Urola-Oria haranetan, armagintza Eibarren, papergintza Tolosan, tren-materiala Beasainen). Hidroelektrizitatea tailerretara iritsi zen. Hiri-hazkunde bizia: Bilboko Zabalgunea, Donostia-Pasaia ardatza, haran-hiri linealak.</p>
    <p><strong>Lehen Mundu Gerra (1914–1920).</strong> Espainiaren neutraltasunak kanpo-eskaera leherrarazi zuen — bereziki altzairua, ontzigintza, papera eta makineria. AHV-ren irabaziak biderkatu egin ziren, eta fortuna handiak sortu ziren (Sota familia, Olaso, Aznar…). Halere, inflazioak soldata-igoerak jan zituen langile-klasean, eta gerraosteko doikuntzak gatazka soziala areagotu zuen.</p>
    <p><strong>Diktaduraren pizgarriak (1923–1930).</strong> Primo de Riverak azpiegitura-plan handia abiatu zuen (errepideak, urtegiak, elektrifikazioa) eta <span class="term" data-def="Kanpoko lehiari hesi ekonomikoa jartzea, barne-industria babesteko.">arantzel protekzionista</span> berriak ezarri zituen. Industria-jarduera egonkortu egin zen, baina barne-merkatu txikia eta kanpo-menpekotasuna mantendu ziren. 1929ko mundu-krisiak ate-joka zegoen diktaduraren amaieran.</p>

    <h3><span class="h-num">3.2.2</span> Lurralde-ereduak: triangelu osagarria</h3>
    <p><strong>Bizkaia</strong> izan zen industrializazioaren erdigune nagusia, burdinaren inguruan antolatua. Meatzaldeko burdin-meategiek lehengaia ematen zuten, eta itsasadarraren inguruan labe garaiak, laminazio-fabrikak eta ontzigintza garatu ziren: burdina ateratzetik altzairua ekoiztera, altzairua lantzera eta ontziak edo industria-ekipamenduak eraikitzera arteko kate osoa. Garapen horrek kapital handia behar zuen, eta horregatik sendotu zen finantza-sare propioa: Banco de Bilbao, Banco de Vizcaya eta Bilboko Burtsa (1890ean berreratua). Bankuek, industriak eta merkataritzak elkar elikatu zuten.</p>
    <p><strong>Gipuzkoaren eredua</strong> bestelakoa izan zen. Ez zuen Bizkaiaren industria astun erraldoirik, baina bai enpresa txiki eta ertainen sare espezializatua. Eibar eta Elgoibar inguruan armagintza, Deba-Urola-Oria haranetan makina-erreminta, Tolosa-Oria bailaran papergintza eta Beasainen tren-materiala garatu ziren. Formula laburrean: <em>Bizkaia fabrika erraldoien eta altzairuaren lurraldea; Gipuzkoa tailer espezializatuen eta jakintza teknikoaren lurraldea.</em> Hidroelektrizitateak industria sakabanatuagoa eta espezializatuagoa posible egin zuen; familia-enpresak, langile kualifikatuak eta tokiko ekintzailetza oinarri nagusiak. Adibide nagusiak: Papelera Española (Errenteria, 1901), Unión Cerrajera (Arrasate, 1906), CAF (Beasain, 1917).</p>
    <p><strong>Araban</strong> industrializazioaren pisua txikiagoa izan zen. Gasteizek tren-gurutze eta administrazio-zentro funtzioa hartu zuen, eta inguruan irin-errotak, elikagaigintza, zurgintza eta metal arina garatu ziren. Bere balioa ez zen industria handian egon, baizik eta Gaztela, Errioxa eta Frantziarako lotura logistikoan.</p>
    <p><strong>Nafarroan</strong>, industria nagusiki agroindustriari lotuta egon zen: irin-errotak, kontserbak, ardoa eta oliba-olioa. Tudelako kontserba-industria eta Castejón-Iruñea tren-ardatza garrantzitsuak izan ziren barne-merkatuarekin eta Frantziarako bideekin lotzeko.</p>

    <h3><span class="h-num">3.2.3</span> Azpiegitura, kapitala eta teknologia</h3>
    <p>Bilboko itsasadarra modernizatu egin zen: bokalearen kanalizazioa (1880-1890), sakonera handitu (zama handiko itsasontziak onartzeko), kai luzeak eraiki ziren. Trenbidean, ardatz nagusiak XIX. mende amaieran finkatu ziren: Bilbo-Tudela (1863), Iruñea-Altsasu, Madril-Frantzia ardatza Beasaintik. Bilboko bankuek kreditu luze eta egonkorra eman zioten meatzaritza-siderurgia-ontzigintzari. Atzerriko kapitala hasierako jauzia bizkortzeko funtsezkoa izan zen. Gipuzkoan, Banco Guipuzcoano (1899) eta aurrezki-kutxek ETEei eutsi zieten.</p>
    <p>Teknologiari dagokionez, Bizkaiko altzairutegiek labe garai modernoak eta <strong>Siemens-Martin prozesua</strong> txertatu zituzten. Euskalduna eta La Naval ontzigintzak itsasontzi metaliko handiak egin zituzten. Gipuzkoan, <span class="term" data-def="Ur-energia bidezko elektrizitate-sorkuntza. Gipuzkoako tailer-sarea goiz elektrifikatzeko gakoa. Hidroeléctrica Ibérica (1901) konpainia nagusia.">hidroelektrizitateak</span> motorra eraman zuen tailerretara, eta jakintza-sareak sortu ziren: Bilboko Ingenieritza Eskola (1897), Eibarko Armeriaren Eskola (1913).</p>

    <h3><span class="h-num">3.2.4</span> Hiri- eta paisaia industriala</h3>
    <p>Industrializazioak euskal lurraldearen paisaia eta hiri-egitura eraldatu zituen. <strong>Bilbo eta Nerbioi-Ibaizabal itsasadarra</strong> Espainiako bihotz industrialetako bat bilakatu ziren. Itsasadarraren ertzetan hiru espazio sozial banatu agertu ziren: Abando-Indautxuko Zabalgunea (burgesia, bankuak, merkataritza), itsasadarraren goiko aldea (ingeniari eta buruzagiak) eta ezkerraldea (<span class="term" data-def="Industria-hirietako etxebizitza-eremua, langile-familiez betea, zerbitzu eskasekin. Sindikalismo eta antolaketa sozialaren sorlekua.">langile-auzo trinkoak</span>: Lutxana, Sestao, Portugalete, Barakaldo). Bilboko biztanleria: 62.000 biztanle 1877an → 304.000 biztanle 1930ean.</p>
    <p>Donostia-Pasaia ardatzean, banaketa argia sortu zen: Donostia zerbitzu/erakustaldi-hiria; Pasaia portu eta kai-industria. Barnealdean, haran-hiri linealak garatu ziren (Eibar-Elgoibar-Arrasate; Zumaia-Azpeitia-Zumarraga), askotan "etxe-tailer" ereduan antolatuta. Ingurumen-paisaian eragin handikoa izan zen: meatzaldeko mozte irekiek mendien profila aldatu zuten, eskoria-isurkinak haranak modelatu, eta itsasadarrak kutsadura industrial larria jasan zuen.</p>

- id: g3-3
  number: '3.3'
  title: Aniztasun politikoa Errestaurazioan
  body: |-
    <p>Errestaurazioaren garaian, Euskal Herriko politika ez zen Madrilgo turnismoaren kopia hutsa izan. <span class="term" data-def="1876ko abolizioaren ondoren, Diputazioekin adostutako zerga-akordioa: kupo bat ordaintzen zaio Madrili eta gainerakoa bertan kudeatzen da. Autonomia fiskal praktikoa.">Foruen abolizioak eta Kontzertu Ekonomikoak</span> marko berezi bat sortu zuten: autonomia fiskal praktiko bat bai, baina autonomia politikorik ez. Horren gainean, lurralde bakoitzak bere bilakaera izan zuen.</p>

    <h3><span class="h-num">3.3.1</span> Marko juridikoa: foru-abolizioa eta Kontzertu Ekonomikoa</h3>
    <p>Hirugarren Karlistadaren amaieraren ondoren, 1876ko uztailaren 21eko Cánovasen Foruen Legeak ezabatu zituen Bizkaiko, Gipuzkoako eta Arabako lurraldeetako foruak — zerga-bilketa propioa, ohiturazko lege-sistema eta soldadutza-salbuespena barne. Foru-galerak euskal gizartearen sektore zabalean <strong>traizio historikotzat</strong> hartu zuen, eta foru-defentsa identitate-sentimendu iraunkor bihurtu zen — hori da euskal nazionalismo modernoaren oinarri ideologikoetako bat.</p>
    <p>1878ko otsailaren 28an, Diputazio berriekin negoziatu ondoren, <strong>Kontzertu Ekonomikoa</strong> ezarri zen: hiru Diputazioek (Bizkaia, Gipuzkoa, Araba) zerga zuzenak bilduko zituzten, kupo bat ordaindu zioten Madrili, eta gainerakoa beren kabuz administratu zuten. Sistema horrek autonomia praktiko apala eman zuen fiskalitatean eta azpiegitura-inbertsioetan. 1925ean Primo de Riverak Kontzertua mantendu zuen Bizkaian eta Gipuzkoan.</p>

    <h3><span class="h-num">3.3.2</span> Kazikismoa eta encasilladoa euskal probintzietan</h3>
    <p>Errestaurazioko sistema politikoa estatu-mailan <span class="term" data-def="Hauteskunde-iruzurraren mekanika: encasillado = aulkien banaketa Madrildik, kazikismoa = tokiko boteredunek (kazikeak) bermatzen zituzten emaitzak.">kazikismoaren eta encasilladoaren</span> bidez funtzionatzen zen. Euskal probintzietan, hala ere, sistema horrek mugak izan zituen:</p>
    <ul>
      <li>Bilbon eta inguruko hiri industrialetan, langile-auzoen mobilizazio sozialak eta sindikatuek kazikismoaren indarra ahuldu egin zuten 1900etik aurrera bereziki.</li>
      <li>Landa-eremuetan eta hiri ertainetan (Araba, Nafarroa, Gipuzkoako herri batzuk) kazikismoa indartsuagoa zen, sare familiar eta klientelar tradizionalei lotuta.</li>
      <li>Diputazio Foralek (Kontzertuari esker) zerga-bilketa eta kontratazio publikoa kontrolatzen zituzten — horrek tokiko botere-egitura propio bat sortu zuen, Madrilgo sare politikoetatik nahiko aldendua.</li>
    </ul>

    <h3><span class="h-num">3.3.3</span> Indar politikoen mapa: lurralde-triangelua</h3>
    <p>1876–1923 bitartean, Euskal Herrian aldi berean lehiatzen ziren bost indar politiko nagusi: alderdi dinastikoak (kontserbadorea eta liberala), karlismoa, errepublikanismoa, sozialismoa eta abertzaletasuna.</p>
    <p><strong>Bizkaia: industriaren mapa politikoa.</strong> Industria astunaren paisaiak bi indar handi sortu zituen: <strong>Sozialismoa (PSOE-UGT)</strong>, auzo proletario trinkoetan oinarritua — Indalecio Prietoren agintaritzapean, Bilbon eta inguruko meatze- eta industria-herrietan presentzia handia lortu zuen 1910etik aurrera; eta <strong>Abertzaletasun katolikoa (EAJ-PNV)</strong>, Bizkaiko burgesia txiki eta ertain katolikoaren artean errotua, 1917an Kongresurako lehen diputatua lortuz (Manuel Egileor).</p>
    <p><strong>Gipuzkoa: aniztasun moderatuagoa.</strong> ETE-en saretik datorren gizarte sozialki egonkorragoan, indar politikoen banaketa orekatuagoa zen: alderdi dinastikoek pisu handiagoa zuten herri ertainetan; abertzaletasunak presentzia garatzen ari zen Donostian, Tolosan, Eibarren; karlismoak landa-eremuetan eutsi zion indarrari; eta sozialismoak/anarkosindikalismoak Pasaian eta lantegi handietan errotu zen 1910etik aurrera.</p>
    <p><strong>Araba eta Nafarroa: tradizionalismoa nagusi nekazaritza-eremuetan.</strong> Lurralde hauetan ekonomia agraria mantendu zen nagusi, eta horrek karlismo eta integrismo katolikoen hegemonia luzatu zuen landa-eremuetan. Hiri-guneetan (Gasteiz, Iruñea), aldiz, joera liberal-errepublikanoa pixkanaka zabaldu zen.</p>

    <h3><span class="h-num">3.3.4</span> Sufragio-sistema eta bilakaera</h3>
    <p>Hauteskunde-sistemak bi etapa nagusi izan zituen: <strong>1876–1890</strong> bitartean sufragio zentsitarioa indarrean (errenta jakin bat zuten gizonezkoek bakarrik bozkatu zezaketen — gizon helduen %5 inguru), eta <strong>1890–1923</strong> bitartean Sagastaren gobernuak <span class="term" data-def="1890eko ekainaren 26ko legea: 25 urtetik gorako gizon guztiek bozkatzeko eskubidea. Euskal Herrian mobilizazio politikoa areagotu zuen.">sufragio unibertsal gizonezkoa</span> ezarri zuen. Diktaduran (1923–1930), Primo de Riverak Gorteak desegin eta hauteskunde guztiak suspenditu zituen — euskal Diputazio Foralak izendatuak izan ziren, baina Kontzertu Ekonomikoa formalki mantendu zen.</p>

    <h3><span class="h-num">3.3.5</span> Diktaduraren etena eta amaiera (1923–1930)</h3>
    <p>Primo de Riveraren diktadurak alderdi politiko guztien jarduera suspenditu zuen. Egoera horretan, indar politikoek bi estrategia hartu zituzten: alderdi gisa erdi-isilean jardun, baina kultura-, sindikalismo- edo karitate-elkarteen bidez sare-egitura mantendu (batzokiak kultura-elkarte bezala, Casa del Pueblo-ak hezkuntza-zentro bezala); eta autonomia politikoaren defentsa intelektuala bultzatu.</p>
    <p>1930eko urtarrilean Primo de Riverak dimisioa eman ondoren, trantsizio demokratikoa ezin lortu zen. 1931ko apirilaren 12ko udal-hauteskundeetan euskal hiriburuetan (Bilbo, Donostia, Gasteiz, Iruñea) errepublikar eta sozialista indarrek emaitza nabarmenak lortu zituzten, eta bi egun beranduago <strong>II. Errepublika aldarrikatu zen</strong> Madrilen. EAJk ez zuen <span class="term" data-def="1930eko abuztuan errepublikar, sozialista eta katalanismoaren ordezkarien arteko akordioa, monarkia eraisteko. EAJk ez zuen sinatu, Itunak ez zituelako euskal estatutuak bermatzen modu argian.">Donostiako Ituna (1930)</span> sinatu.</p>

- id: g3-4
  number: '3.4'
  title: Langile-mugimendua eta gizarte-gatazka
  body: |-
    <p>Industrializazioak aberastasuna sortu zuen, baina langile askorentzat eguneroko bizitza oso gogorra izan zen: lanaldi luzeak, soldata eskasak, arrisku handia eta etxebizitza kaskarrak. Egoera horren aurrean, langileak antolatzen hasi ziren sindikatuetan, grebetan eta elkartasun-sareetan. Langile-mugimendua hiru eredu ezberdinetara banatu zen.</p>

    <h3><span class="h-num">3.4.1</span> Lan-baldintzak: lantegia, soldata eta etxebizitza</h3>
    <p>1919ko 8 orduko lanaldia lortu arte, ohikoak ziren <strong>10–12 orduko lanaldiak</strong>, 6 egunez astean. Bizkaiko meatze eta siderurgian arriskua eta neke fisikoa ikaragarriak ziren; lan-istripuek heriotza edo ezintasun iraunkorrak eragiten zituzten ohiko moduan. Emakumeek presentzia handia zuten ehungintza eta papergintzan, baina soldata askoz baxuagoarekin (gizonezkoen %50–60 inguru). Adin txikikoek ere lan egiten zuten, 13–14 urtetik gora. Kontratuak sasoikakoak edo eguneko-egunekoak ziren maiz, eta horrek negoziazio-indarra asko murrizten zuen.</p>
    <p>Bizkaiko itsasadarraren ezkerraldean, <span class="term" data-def="Industria-hirietako etxebizitza-eremua, langile-familiez betea, zerbitzu eskasekin. Sindikalismo eta antolaketa sozialaren sorlekua.">langile-auzo trinkoak</span> sortu ziren (Lutxana, Sestao, Portugalete, Barakaldo): pisu-etxebizitza pilaketa handiak, zerbitzu eskasak, gaixotasun infekziosoen presentzia kronikoa (tuberkulosia, kolera-uhinak). Meatzaldean barrakoiak eta etxe xumeak. Enpresa batzuek <span class="term" data-def="Enpresak langileei eskaintzen zien 'babes-pakete' osoa: ekonomatoa, kolonia-etxebizitza, eskola, kapilautza. Itxura sozialaren atzean kontrol soziala.">paternalismo enpresariala</span> ezarri zuten (ekonomatoak, kolonia-etxebizitzak), baina sarritan kontrol sozial estuagoa ekartzen zuten.</p>
    <p>Lantegiek diziplina-egitura zorrotzak ezarri zituzten: txirrinak, atzerapenen zigorrak, ordainketarik gabeko egunak. <span class="term" data-def="Patronalek elkartrukatzen zituzten sindikatu-antolatzaileen edo grebariaren zerrendak, berriz ez kontratatzeko.">Zerrenda beltzak</span> eta espioitza enpresarialak ohiko tresnak ziren. Erantzun gisa, langileek autodefentsa-sare propioa eraiki zuten: <span class="term" data-def="Langileek antolatutako gaixotasun-, istripu- eta hil-osteko laguntzen elkartea. Sindikatu guztien tresna komuna.">mutualitateak</span>, aurrezki-kutxak, ikastaro tekniko kooperatiboak eta auzoko kultura-sareak.</p>

    <h3><span class="h-num">3.4.2</span> Sindikatuen jarduera-eredua</h3>
    <p>Hiru sindikatu nagusik antolatu zuten Euskal Herriko langileria:</p>
    <p><strong><span class="term" data-def="1888an Bartzelonan sortutako sindikatu sozialista, PSOErekin lotura organikoa. Bizkaiko meatzaritza, siderurgia eta ontzigintzan errotua. Itun kolektiboak eta sektore-mailako negoziazioa estrategia nagusia.">UGT (Unión General de Trabajadores, 1888)</span> — Bizkaian indartsuena.</strong> Jarduera-eredua: itun kolektiboak, sektore-mailako negoziazioa, lan-orduen eta segurtasun-neurrien eskaria. Greba egitura formal batekin antolatzen zen (eskaera-zerrenda, batzar nagusiak, negoziazio-batzordeak). Antolaketa-gunea <span class="term" data-def="PSOE/UGTren auzo-egoitzak: hezkuntza-zentro, mutualitate, liburutegi, kultura-aretoak eta sindikatu-bulegoa biltzen zituen.">Casa del Pueblo (Herriko Etxea)</span> sare zabalak ziren. Indalecio Prietoren lidergotza Bilbon.</p>
    <p><strong><span class="term" data-def="1910ean Bartzelonan sortutako sindikatu anarkista. Ekintza zuzena eta sindikatu bakarra. Pasaian eta Eibarren presentzia. Diktaduran klandestinitatean.">CNT (Confederación Nacional del Trabajo, 1910)</span> — Gipuzkoan eta portuetan.</strong> Jarduera-eredua: <span class="term" data-def="CNTren ekintza-eredua: grebak, boikotak, piketeak negoziazio formalik gabe. Estatu-bidea eta alderdi politikoa baztertzen ditu.">akzio zuzena</span> (grebak, boikotak, piketeak, sabotai puntualak). Antolaketa-egitura berezia: lanbide guztiak elkarte berean, erabakiak asanblada bidez behe-mailatik gora. Presentzia nagusia Gipuzkoako Pasaia portuan, Eibarko metalgintzan eta Bizkaiko tailer batzuetan.</p>
    <p><strong><span class="term" data-def="1911n Bilbon sortutako sindikalismo katoliko-abertzalea. Mutualismoa, bitartekaritza, Rerum Novarum-en doktrina sozial-kristaua. EAJtik hurbil.">ELA-STV (Solidaridad de Trabajadores Vascos, 1911)</span> — Gipuzkoan eta langile katoliko-abertzaleen artean.</strong> Jarduera-eredua: bitartekaritza, mutualismoa eta negoziazio baketsua. Tresna praktikoak: mutualitateak, aurrezki-kutxak, kooperatibak, hezkuntza-zentroak. <span class="term" data-def="Leon XIII.aren entziklika (1891): jabetza pribatua baina jabeen erantzukizun soziala; klase-borroka ez bide naturala; langileen eskubideak defendatu. ELA-STVren oinarri doktrinala.">Rerum Novarum</span> doktrinan oinarritua; elizaren erantzuna ezker sindikatuen aurrean.</p>

    <h3><span class="h-num">3.4.3</span> Greba-zikloak eta gatazka nagusiak</h3>
    <p>1880tik 1923ra arteko gatazka-historiak erritmiko-ziklikoa izan zen. Mugarri nagusiak:</p>
    <ul>
      <li><strong>1890–1892:</strong> Bizkaiko meatzarien greba handiak. Antolakuntza-kultura finkatu zen, eta lehen hobekuntza praktikoak lortu ziren (lanaldi-mugak, soldata-igoerak). Greba hauek PSOE/UGTren errotzea ahalbidetu zuten Bizkaian.</li>
      <li><strong>1903:</strong> Greba orokor zabala Bilbon eta Bizkaian, soldata-eskaerekin. Gobernuak Guardia Zibila eta tropak bidali zituen; hainbat hildako eta atxilotu.</li>
      <li><strong>1910–1913:</strong> Anarkosindikalismoaren hedapena Pasaia eta Eibarren; greba esporadikoak ondoz ondo.</li>
      <li><strong>1917 (abuztua):</strong> Espainia osoko greba orokorra, UGT eta CNTk batera deitua. Helburu bikoitza: soldata-eskaerak (inflazio-aurkako defentsa) eta sistema politikoaren demokratizazioa. Gobernuak bortizki zapaldu zuen eta buruzagiak atxilotu zituzten. Bizkaian eta Asturiasen errepresio bereziki gogorra.</li>
      <li><strong>1919:</strong> 8 orduko lanaldia errege dekretu bidez, Bartzelonako La Canadienseko grebaren ondorioz. Mugarri sinboliko eta praktikoa.</li>
      <li><strong>1919–1920:</strong> Gerraosteko krisi ekonomikoa: kanpo-eskaera jaitsi, stockak handitu, plantillak murriztu. Gatazka soziala areagotu zen berriz.</li>
    </ul>

    <h3><span class="h-num">3.4.4</span> Estatuaren eta patronalaren erantzuna</h3>
    <p>Greba handietan gobernadore zibilek salbuespen-egoera ezartzen zuten: Guardia Zibila lantegietan sartu, kale bilerak debekatu, prentsa zentsuratu. Patronalak <span class="term" data-def="Patronalaren tresna: lantegia ixtea langileen aurkako presio gisa, grebaren erantzun bezala.">lockout</span> erabili zuen presio-tresna nagusi gisa, eta zerrenda beltzen bitartez antolatzaileak baztertu. Estatuak, gatazkek bultzatuta, legedi soziala pixkanaka ezarri zuen: 1900eko Lan-Istripuen Legea, 1903ko lan-ikuskaritza, 1919ko 8 orduko lanaldia eta Retiro Obrero.</p>
    <p>Errepresio eta legediaren artean, hirugarren bide bat ere agertu zen: <span class="term" data-def="Enpresak langileei eskaintzen zien 'babes-pakete' osoa: ekonomatoa, kolonia-etxebizitza, eskola, kapilautza. Itxura sozialaren atzean kontrol soziala.">paternalismo enpresariala</span>. Enpresa handi batzuek ekonomatoak, kolonia-etxebizitzak, eskolak eta laguntza-elkarteak antolatu zituzten langileentzat, baina kontrol sozial estuagoa ekarri zuten.</p>

    <h3><span class="h-num">3.4.5</span> Diktadura eta Batzorde Paritarioak (1923–1930)</h3>
    <p>Primo de Riveraren diktadurak alderdi politikoen eta sindikatu askeen jarduera mugatu zuen, baina harreman-eredu berri bat saiatu zuen ezartzen: korporatibismoa. 1926tik aurrera, <span class="term" data-def="Primo de Riveraren diktadurak ezarritako gatazka-bitartekaritza korporatiboa: enpresa-ordezkariak eta langile-ordezkariak mahai berean, estatua bitartekari.">Batzorde Paritarioek</span> langile-ordezkariak eta enpresa-ordezkariak mahai berean jarri zituzten. Eredu honek bi ondorio izan zituen:</p>
    <ul>
      <li>UGTk eta ELA-STVk Batzorde Paritarioetan parte hartu zuten, negoziazio-eremu instituzionala eskuratuz.</li>
      <li>CNTk Batzordeak baztertu egin zituen (estatuarekin akordioa egitea kontraesankorra zen anarkismoarentzat), eta horrek erakunde anarkista ahuldu eta klandestinitatera eraman zuen.</li>
    </ul>
    <p>Auzo-sareek (mutualitateak, hezkuntza-zentroak, batzokiak, Casa del Pueblo-ak), nahiz politikoki indargabetauak, kultura zibil eta elkartasun-egiturak bizirik mantendu zituzten — horri esker, 1930ean mobilizazioa berehala berpiztu zen.</p>

- id: g3-5
  number: '3.5'
  title: Lehen nazionalismoa eta ideologien aniztasuna
  body: |-
    <p>XIX. mendearen amaieratik XX. mendearen lehen herenera arte, Euskal Herria ez zen soilik ekonomikoki aldatu; sozialki, politikoki eta kulturalki ere sakon eraldatu zen. Industrializazioak langile-klase berri bat sortu zuen, immigrazioak gizartea pluralago eta gatazkatsuago bihurtu zuen, eta 1876ko foru-galerak euskal lurraldeen etorkizun politikoari buruzko eztabaida berpiztu zuen. Aldaketa horien aurrean, gizarte-talde guztiek ez zuten erantzun bera eman, eta horrela paisaia ideologiko anitz bat sortu zen.</p>

    <h3><span class="h-num">3.5.1</span> Ideologien sorrera-baldintzak</h3>
    <p>1875–1930 artean Euskal Herrian gertatutako industrializazioak, immigrazioak eta foru-galerak gizarte-aldaketa sakona ekarri zuten. Aldaketa horrek, ordea, ez zituen herritarrak modu uniformean ukitu: batzuek euskal nortasunaren defentsan jarri zuten arreta; beste batzuek langile-klasearen eskubideetan; beste batzuek erlijio katolikoaren eta tradizioaren babesean; eta beste batzuek Estatuaren eta botere-egitura guztien aurkako jarrera erradikalean. Aldi honetan Europako pentsamendu-korronteak ere iritsi ziren: marxismoa, anarkismoa, nazionalismo erromantikoa eta doktrina sozial-kristaua.</p>

    <h3><span class="h-num">3.5.2</span> Sabino Aranaren pentsamendua: euskal nazionalismoaren oinarri ideologikoa</h3>
    <p><span class="term" data-def="XIX. amaierako euskal nazionalismoa: euskararen eta identitatearen defentsa katoliko-soziala eta autogobernu/independentziaren aldarrikapena. 1895ean Sabino Aranak EAJ sortu zuen.">Sabino Arana Goirik</span> (1865–1903) formulatu zuen lehen aldiz euskal abertzaletasuna diskurtso politiko moderno gisa, garai hartako Europako nazionalismo erromantiko-erlijiosoaren ildoan. Bere diskurtsoaren bost ardatz nagusiak:</p>
    <ul>
      <li><strong>Nazio-kontzeptua:</strong> euskaldunak "beste nazio bat" osatzen zutela — Espainiatik guztiz ezberdina, hizkuntza, arraza, ohitura, fede eta foru-tradizio propioak zituztenak.</li>
      <li><strong>Erlijio katolikoa nazioaren oinarri:</strong> fede katolikoa euskalduntasunaren parte bereizezina zen. Espainiako liberalismoa, sekularizazioa eta laizismoa euskal izaeraren mehatxutzat hartu zituen.</li>
      <li><strong>Foru-tradizioaren defentsa:</strong> foruak ez ziren soilik egitura administratibo galdu bat, euskal nazioaren eskubide naturalaren froga historikoa ziren. "Jaungoikoa eta Lagi-Zarra" lemak horixe formulatu zuen.</li>
      <li><strong>Anti-espainolismoa eta anti-industrializazioa:</strong> immigrazioa euskal hizkuntza, fede eta ohituren higadura zekarren; burgesia industrial liberala kosmopolita eta laikoa zen, Aranaren ikuspegitik euskaldun-itxurakoa baina ez benetakoa.</li>
      <li><strong>Euzkadi: estatu-proiektua.</strong> Aranak "Euzkadi" terminoa sortu zuen (1896 inguruan), zazpi probintzia historikoak batzen zituen nazio-marko berria izendatzeko. Era berean, <span class="term" data-def="EAJren bandera, Sabino Aranak 1894an sortua.">ikurrina</span> (1894), Aberri Eguna (uztailak 25) eta <strong>EAJ-PNV</strong> (1895) sortu zituen sinbolo eta egitura politiko-organikoekin. Helburu politikoa: euskal nazioaren independentzia erabatekoa.</li>
    </ul>

    <h3><span class="h-num">3.5.3</span> Aranismoaren bilakaera ideologikoa</h3>
    <p>1903an Sabino Arana hil zenean (38 urterekin), bere lehengo dizipuluek egokitzapen estrategikoaren beharra ikusi zuten. Aranismoak hiru fase nagusi izan zituen:</p>
    <ul>
      <li><strong>1895–1903 (Aranaren lehen sorrera):</strong> oinarri ideologikoaren ezarpena. Diskurtso erradikala eta erromantikoa, gizarte-talde mugatuetara hedatua.</li>
      <li><strong>1903–1917 (pragmatismoa):</strong> alderdiaren "errealistek" Aranaren ardatz nagusiak mantentzen, baina helburu politiko praktikoagoetara doituta: independentzia atzeratu, foru-berreskuratzea + autonomia indartu lehentasun gisa. Burgesia katoliko ertain eta langile katoliko-abertzaleen artean errotu zen.</li>
      <li><strong>1921 (Aberri/CNV zatiketa):</strong> EAJ barne-zatiketa bizi izan zuen 1921ean. <span class="term" data-def="Comunión Nacionalista Vasca (1921): EAJren adar pragmatiko/kontserbadoreagoa.">Comunión Nacionalista Vasca (CNV)</span> sektore moderatua zen; <strong>Aberri</strong> gazte intelektualen taldea, Aranaren independentzia-aldarrikapen erradikalera itzulia. Bi adarrak <strong>1930ean berriz batu ziren</strong> EAJ-ren barruan, II. Errepublikari aurre egiteko prestakuntzan.</li>
    </ul>

    <h3><span class="h-num">3.5.4</span> Sozialismoaren oinarri doktrinala Euskal Herrian</h3>
    <p>Sozialismoa Espainian Pablo Iglesiasen eskutik garatu zen 1879tik aurrera (PSOE), eta Euskal Herrian Bizkaiko meatze eta industria-eremuan errotu zen, Facundo Perezagua eta Tomás Meaberen lehen bultzada ondoren. <strong>Indalecio Prietok</strong> (1883–1962) liderazgo nagusia hartu zuen XX. mendeko lehen hamarkadetan.</p>
    <p>Espainiako sozialismoa <span class="term" data-def="Marxen analisiaren onarpena, baina iraultza bortitzaren ordez bide elektoral-erreformistari ekitea. Espainiako sozialismoaren (PSOE-Iglesias) ardatza.">marxismo moderatua</span> zen: kapitalismoaren errealitatea (klase-arteko esplotazioa, plusbalia) onartzen zen, baina iraultza bortitzaren ordez bide elektoral-erreformista hautatu zen — "gradualismoa": sufragio unibertsalaren bidez Estatuan ordezkapena lortu, eta hortik gizartea eraldatu.</p>
    <p>Programa nagusiaren bost ardatzak: sufragio unibertsala eta erreforma demokratiko sakonak; lan-erreformak (8 orduko lanaldia, gizarte-segurantza, hezkuntza laikoa); Eliza-Estatu bereizketa; ekoizpen-bideen sozializazio progresiboa; eta internazionalismoa. PSOE-k abertzaletasunarekin tentsio gogorra izan zuen: sozialismoaren ikuspegitik, abertzaletasuna burgesia tokiko baten tresna zen <strong>klase-borroka</strong> zapuzteko.</p>

    <h3><span class="h-num">3.5.5</span> Anarkismoaren oinarri filosofikoa</h3>
    <p><span class="term" data-def="Estatu eta autoritate ororen aurkako ideologia, gizabanakoaren askatasun osoa eta ekoizpen-bideen autogestioa defendatzen dituena. Espainian CNT (1910) sindikatuaren bidez antolatua.">Anarkismoa</span> Bakunin eta Proudhon-en pentsamenduaren emaitza da, eta XIX. mende-amaieratik aurrera Espainian indar nabarmena hartu zuen, batez ere Katalunian eta Andaluzian. Euskal Herrian neurri txikiagoan, baina Pasaian, Eibarren eta Bizkaiko zenbait gunetan indarra izan zuen.</p>
    <p>Hiru oinarri filosofikoak: (i) <strong>Estatu-arbuioa</strong> — estatua, hierarkia-egitura ororekin batera (Eliza, armada, alderdi politikoa), zapalkuntza-tresna da, suntsitu behar dena; (ii) <span class="term" data-def="Langileek ekoizpenaren gaineko kontrol zuzena edukitzearen ideia. Sindikatu bakarra: lanbide guztiak elkarte berean, asanblada bidezko erabakiak.">Autogestioa</span> — gizarteak, hierarkiarik gabe, kontsumo- eta ekoizpen-elkarteen bidez antolatu behar du bere burua; (iii) <strong>Akzio zuzena</strong> — ez bide instituzionalei (bozketa, parlamentua), baizik eta langile-klasearen presio zuzena (greba, boikota, sabotaia, asanblada).</p>

    <h3><span class="h-num">3.5.6</span> Sindikalismo katoliko-abertzalea: ELA-STVren oinarri doktrinala</h3>
    <p>XIX. mendearen amaieran Elizak ikusi zuen "auzi sozialari" erantzun behar ziola. Testuinguru horretan ulertu behar da <span class="term" data-def="Leon XIII.aren entziklika (1891): jabetza pribatua baina jabeen erantzukizun soziala; klase-borrokarik ez; langileen eskubideak. ELA-STVren oinarri doktrinala.">Rerum Novarum entziklika (1891)</span>: Elizaren saiakera kapitalismo liberal basatiaren eta sozialismo iraultzailearen artean hirugarren bide bat proposatzeko. Ez zuen jabetza pribatua ukatu, baina jabeen erantzukizun soziala azpimarratu zuen; ez zuen klase-borroka onartu, baina langileen eskubideak defendatu zituen.</p>
    <p>1911ko <strong>ELA-STV (Solidaridad de Trabajadores Vascos)</strong> Rerum Novarum-en aplikazio zuzena zen euskal testuinguru abertzalean. Bere proiektu intelektualaren ardatzak: lan-duintasuna eskubide moral natural gisa; elkartasuna klase-borrokaren ordez; identitate-defentsa (kristautasuna eta euskal nortasuna lan-eremuan balio funtsezko gisa); eta aldaketa pausatua, ez bortizkeriaz. ELA aranismo-katolizismo-sindikalismoaren hirukotearen sintesi praktikoa zen, eta burgesia katolikoaren eta langile katoliko abertzaleen arteko zubi sozial bilakatu zen.</p>

    <h3><span class="h-num">3.5.7</span> Karlismoaren ideologia 1876 ondoren</h3>
    <p>Hirugarren Karlistadaren porrotaren ondoren (1876), <span class="term" data-def="Karlos VII.aren eta ondorengoen dinastia legitimista defendatzen duen mugimendu politiko-katoliko-tradizionala. Indartsua Nafarroan eta Araban.">karlismoak</span> armak utzi eta mugimendu politiko eta intelektual gisa berrantolatu zen. Bere ideologiaren ardatzak: monarkia katoliko-tradizionala (Borbon-Madrildarren alternatiba); konfesionaltasun zorrotza (liberalismoaren laizismoaren aurka); foru-defentsa (tokiko autonomia historikoa, baina katolizismo-tradizioaren marko orokorrean); eta anti-modernismoa (liberalismoaren, sozialismoaren eta sekularizazioaren aurka). 1888an <strong>Integrismoaren zatiketa</strong> gertatu zen sektore zorrotzago batek Karlos VII. ere liberal samar zelakoan, fede katolikoaren defentsa hutsean zentratuz. Karlismoak XX. mendean nagusiki landa-eremuetan eutsi zion indarrari, bereziki Nafarroan eta Araban.</p>

    <h3><span class="h-num">3.5.8</span> Ideologien arteko polemika intelektuala</h3>
    <p>Garai honetako euskal aniztasun ideologikoaren funtsa ez da indarren koexistentzia hutsa, baizik eta haien arteko polemika sakona bost ardatz nagusitan:</p>
    <ul>
      <li><strong>Nazioa vs. klasea:</strong> abertzaleek euskal nazioa kontzeptu "natural" gisa defendatzen zuten; sozialista eta anarkistek klase-mailako batasuna lehenesten zuten. Polemika praktikoa: zertarako antolatu — nazio-defentsa edo klase-batasuna?</li>
      <li><strong>Sekularizazioa vs. konfesionaltasuna:</strong> PSOEk eta CNTk Eliza Estatuaren tresna gisa salatzen zuten. EAJk eta karlismoak fede katolikoa nortasunaren oinarri kontsideratzen zuten.</li>
      <li><strong>Estatu-suntsiketa vs. estatu-instrumentalizazioa vs. estatu-eraikuntza:</strong> anarkismoak Estatua suntsitu nahi zuen; sozialismoak Estatu demokratikoa sozializatuz erabili; abertzaletasunak euskal Estatu propio bat eraiki nahi zuen.</li>
      <li><strong>Iraultza vs. erreforma vs. tradizio-defentsa:</strong> anarkismoak akzio zuzena; sozialismoak negoziazio-instituzionala greba antolatuekin; abertzaletasunak bide elektoral-instituzionala; karlismoak eragin politiko eta kulturala.</li>
      <li><strong>Internazionalismoa vs. herri-defentsa:</strong> anarkismoa eta sozialismoa internazionalismoan; abertzaletasuna eta karlismoa herri-mailako kokapenean.</li>
    </ul>
    <div class="callout"><div class="callout-title">Polemika hau eguneroko bizitza markatu zuen</div>Auzo, lantegi eta jaietako eguneroko bizitza markatu zuen tentsio etengabean, baina baita aliantza puntualetan ere (1917ko greba orokorra UGT eta CNT-ren artean; 1930eko Donostiako Itunak hainbat indarren artean). Aniztasun ideologiko hori 1936ko gerra zibilean lehertuko da muturreraino.</div>

glossary:
- term: Aberri (1921)
  def: EAJren barne-zatiketako gazte intelektualen taldea, Aranaren independentzia-aldarrikapen erradikalaren aldekoa. 1930ean berriz CNV-rekin batu zen.
- term: Abertzaletasuna (EAJ/PNV)
  def: XIX. amaierako euskal nazionalismoa. Euskararen eta identitatearen defentsa katoliko-soziala eta autogobernu/independentziaren aldarrikapena. 1895ean Sabino Aranak EAJ sortu zuen.
- term: Akzio zuzena
  def: 'CNTren taktika: grebak, boikotak eta piketeak, negoziazio formalik gabe. Estatu-bidea eta alderdi politikoa baztertzen ditu.'
- term: Altos Hornos de Vizcaya (AHV)
  def: 1902an hiru enpresa bizkaitar batzean sortutako siderurgia-erraldoia. Espainiako industria-enpresa handiena garai batez. Labe garaiak, laminazio-trenak eta ontzigintza integratua.
- term: Anarkismoa
  def: Estatu eta autoritate ororen aurkako ideologia, gizabanakoaren askatasun osoa eta ekoizpen-bideen autogestioa defendatzen dituena. Espainian CNT (1910) eta FAI (1927) sindikatuen bidez antolatua.
- term: Anarkosindikalismoa (CNT)
  def: Anarkismoaren ezarpen sindikala. Estatua eta hierarkiak ukatzea, langileen autogestioa eta sindikatu bakarra (lanbide guztiak elkarte berean).
- term: Arantzela / Protekzionismoa
  def: Kanpoko lehiari hesi ekonomikoa jartzea, barne-industria babesteko. 1891ko eta 1906ko Cambó arantzelek Espainiako industria-poloak indartu zituzten.
- term: Auzi soziala
  def: Industrializazioak sortutako klase-arteko gatazka eta lan-baldintzen larritasunaren multzoa. Euskal Herrian 1890etik aurrera intentsitate handiarekin agertu zen.
- term: Auzo proletarioa
  def: Industria-hirietako etxebizitza-eremua, langile-familiez betea, zerbitzu eskasekin. Sindikalismo eta antolaketa sozialaren sorlekua.
- term: Batzokia
  def: EAJren kultura- eta politika-elkartearen egoitza fisikoa. Lehena 1894an Bilbon. Diktaduran (1923-1930) kultura-elkarte gisa eutsi zion jarduerari.
- term: Batzorde Paritarioak (1926tik)
  def: Primo de Riveraren diktadurak ezarritako gatazka-bitartekaritza korporatiboa. Enpresa-ordezkariak eta langile-ordezkariak mahai berean, estatua bitartekari. UGTk eta ELAk parte hartu zuten; CNTk baztertu egin zituen.
- term: CAMPSA (1927)
  def: Compañía Arrendataria del Monopolio de Petróleos. Estatuak ezarritako petrolio-monopolioa, Primo de Riveraren garaian.
- term: Casa del Pueblo (Herriko Etxea)
  def: PSOE/UGTren auzo-egoitzak. Hezkuntza-zentro, mutualitate, liburutegi, kultura-aretoak eta sindikatu-bulegoa biltzen zituen. Sozialismoaren eraikuntza komunitarioa.
- term: CNT (Confederación Nacional del Trabajo)
  def: 1910ean Bartzelonan sortutako sindikatu anarkista. Ekintza zuzena eta sindikatu bakarra. Pasaian eta Eibarren presentzia. Diktaduran klandestinitatean.
- term: CNV (Comunión Nacionalista Vasca, 1921)
  def: EAJren sektore moderatu eta gradualistaren izen ofiziala 1921eko zatiketan. Espainiako sisteman autonomia bilatzea defendatzen zuen. 1930ean berriz batu zen Aberri-rekin.
- term: Donostiako Ituna (1930)
  def: 1930eko abuztuan errepublikar, sozialista eta katalanismoaren ordezkarien akordioa, monarkia eraisteko eta II. Errepublika ezartzeko. EAJk ez zuen sinatu.
- term: ELA-STV
  def: 1911n Bilbon sortutako sindikalismo katoliko-abertzalea. Mutualismoa, bitartekaritza, Rerum Novarum-en doktrina sozial-kristaua. EAJtik hurbil.
- term: Enpresa txiki eta ertainak (ETE)
  def: 'Gipuzkoako eredua: espezializazioa, kalitatea eta esportazioa. Familia-enpresak, langile kualifikatuak eta tokiko ekintzailetza.'
- term: Herriko Etxea (Casa del Pueblo)
  def: UGT/PSOEren gune sozialak. Hezkuntza, mutualitateak, kultur jarduna eta sindikalgintza biltzen zituzten.
- term: Hidroelektrizitatea
  def: Ur-energia bidezko elektrizitate-sorkuntza. Gipuzkoako tailer-sarea goiz elektrifikatzeko gakoa. Hidroeléctrica Ibérica (1901) konpainia nagusia.
- term: Immigrazio barnekoa
  def: Gaztela, Galizia, Errioxa, Asturias… Bizkaiko auzo proletarioak bete zituzten olatuak. Bilbo 62.000 biztanle (1877) → 304.000 biztanle (1930).
- term: Industria astuna
  def: Siderurgia, ontzigintza, tren-materiala. Eskala handiko inbertsioa eta kapital intentsiboa eskatzen du. AHV (1902) Euskal Herriko adibide nagusia.
- term: Integrismoa
  def: 1888an Karlismotik banandutako sektore katolikoa (Ramon Nocedal). Karlos VII. liberal-bideratua zelakoan, fede katolikoaren defentsa zorrotzagoan zentratua.
- term: Karlismoa / integrismoa
  def: Eskuina tradizionala; landa-eremuetan indartsua (Araba, Nafarroa). Hirugarren Karlistadaren ondoren mugimendu politiko bilakatu zen.
- term: Kazikismoa / Enkasilatua
  def: Errestaurazioan hauteskundeak kontrolatzeko sare klientelarrak. Encasillado = aulki-banaketa Madrildik; kazikeak emaitzak bermatzen zituzteten tokian tokian.
- term: Kontzertu Ekonomikoa (1878)
  def: Foru-abolizioaren ondoren, Diputazioekin adostutako zerga-akordioa. Kupo bat Madrilera, gainerakoa bertan kudeatzeko. Autonomia fiskal praktikoa. Indarrean gaur arte.
- term: Kooperatibismoa
  def: Kontsumo/ekoizpen elkarteak. Mutualismoarekin lotua, langile-klasearen autolaguntza-sarearen parte.
- term: Labe garaiak
  def: Burdin mea kokea erabiliz altzairu bihurtzeko instalazio handiak. Bizkaiko industria astunaren oinarria. Lehen modernoa Sestaon (1880).
- term: Latifundismoa
  def: Lurraren jabetza handien pilaketa familia gutxi batzuen esku. Andaluzian, Extremaduran eta Gaztela hegoaldean nagusi. Auzi sozialaren erro nekazaria.
- term: Lockout
  def: Patronalaren tresna. Lantegia ixtea langileen aurkako presio gisa, grebaren erantzun bezala.
- term: Marxismo moderatua
  def: Marxen analisiaren onarpena, baina iraultza bortitzaren ordez bide elektoral-erreformistari ekitea. Espainiako sozialismoaren (PSOE-Iglesias) ardatza.
- term: Minifundismoa
  def: Ustiapen txikiak, autokontsumora bideratuak. Galizian, Asturiasen eta ipar-mendebaldeko eskualde menditsuetan ohikoa. Modernizaziorako kapitalik gabe.
- term: Mutualitateak
  def: Langileek antolatutako gaixotasun-, istripu- eta hil-osteko laguntzen elkartea. Sindikatu guztien tresna komuna (UGT, CNT, ELA), gizarte-segurantza ofizialaren aurrekaria.
- term: Nazionalismo abertzalea
  def: EAJ/PNV-ren ideologia. Euskal nazioaren defentsa, fede katolikoa, hizkuntza, foruak eta autodeterminazioaren aldarrikapena. Sabino Aranak 1895ean formulatua eta egituratua.
- term: Paternalismo enpresariala
  def: "Enpresak langileei eskaintzen zien 'babes-pakete' osoa: ekonomatoa, kolonia-etxebizitza, eskola, kapilautza. Itxura sozialaren atzean kontrol soziala."
- term: Polo industriala
  def: Industria-jarduera intentsibo bat lurralde mugatu batean kontzentratua. Espainian hiru polo nagusi. Katalunia (ehungintza), Euskal Herria (siderurgia + ETE), Asturias (ikatza).
- term: PSOE (Partido Socialista Obrero Español)
  def: 1879an Pablo Iglesiasek sortutako alderdi sozialista. Marxismo moderatua. Euskal Herrian Bizkaian errotua, Indalecio Prieto liderazgo nagusia. UGT sindikatuarekin lotura organikoa (1888tik).
- term: Rerum Novarum (1891)
  def: Leon XIII.aren entziklika, Elizaren auzi sozialari buruzko lehen dokumentu sistematikoa. Jabetza pribatua baina jabeen erantzukizun soziala; klase-bakea; langileen babesa. ELA-STVren oinarri doktrinala.
- term: Retiro Obrero (1919)
  def: Errege dekretu bidez ezarritako derrigorrezko erretiro-pentsioen sistema goiztiarra langileentzat. Gizarte-segurantzaren aurrekari nagusietako bat.
- term: Sabino Arana (1865–1903)
  def: Euskal nazionalismo modernoaren sortzailea. EAJ-PNV fundatu zuen 1895ean Bilbon. Ikurrina (1894), "Euzkadi" terminoa eta "Jaungoikoa eta Lagi-Zarra" lema sortu zituen.
- term: Siderurgia
  def: Altzairu ekoizpena. Funtsezkoa Bizkaiko industrializazioan. AHV (1902) Espainiako enpresarik handiena.
- term: Sindikatu bakarra
  def: CNTren antolakuntza-printzipioa. Sektore eta lanbide guztiak elkarte berean (ez sindikatu bana sektore bakoitzeko). Asanblada bidezko erabakiak.
- term: Sozialismoa
  def: Klase-arteko esplotazioa salatu, langileen baldintzak hobetu eta ekoizpen-bideak sozializatzea proposatzen duen ideologia. Espainian PSOE (1879) eta UGT (1888) erakunde nagusiak.
- term: Sufragio unibertsal gizonezkoa (1890)
  def: Sagastaren gobernuak emandako legea. 25 urtetik gorako gizon guztiek bozkatzeko eskubidea. Euskal Herrian mobilizazio politikoa areagotu zuen.
- term: Sufragio zentsitarioa
  def: 1878ko legearen arabera, errenta jakin bat zuten gizonezkoek bakarrik bozkatu zezaketen — gizon helduen %5 inguru. 1890era arte indarrean.
- term: Triangelu industrial euskalduna
  def: "Lau lurraldeen industria-eredu osagarriak: Bizkaia (industria astuna integratua), Gipuzkoa (ETE espezializatuak), Araba (logistika eta industria arina), Nafarroa (agroindustria)."
- term: UGT (Unión General de Trabajadores)
  def: 1888an Bartzelonan sortutako sindikatu sozialista, PSOErekin lotura organikoa. Bizkaiko meatzaritza, siderurgia eta ontzigintzan errotua. Itun kolektiboak eta sektore-mailako negoziazioa estrategia nagusia.
- term: Zerrenda beltzak
  def: Patronalek elkartrukatzen zituzten sindikatu-antolatzaileen edo grebariaren zerrendak, berriz ez kontratatzeko. Langile-mugimenduaren kontrol-tresna ohikoa.
- term: Ziklo ekonomikoa
  def: Goraldia/krisia txandan. Lehen Mundu Gerrak goraldia ekarri zuen (1914-1918); gerraosteak krisia (1919-1920). Lan-gatazken erritmoa baldintzatzen zuen.
