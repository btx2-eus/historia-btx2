intro: |-
  1875ean Borboien Errestaurazioarekin Espainiako Estatuak egonkortasun politikoa lortu zuen, Antonio Cánovas del Castilloren turnismoaren sistemaren bidez. Hala ere, lurralde bakoitzaren errealitate ekonomiko-soziala oso ezberdina zen: Estatua, oro har, atzeratua Europa mailan, industrializazio motela eta lurraldez desorekatua guztiz. Ardatz industrial nagusiak Katalunian (ehungintza), Asturiasen (ikatza) eta Euskal Herrian (siderurgia, ontzigintza eta ETE espezializatuak) kokatzen ziren; gainerako eremuak nekazaritzan oinarritutako ekonomia atzeratuetan jarraitzen zuten.
  Hirugarren Karlistadaren amaieraren ondoren, <strong>1876ko foruen abolizioak</strong> eta <strong>1878ko Kontzertu Ekonomikoaren</strong> ezarpenak euskal lurraldeen marko juridiko-administratibo berria itxuratu zuten. Marko horretan, Bizkaiko meategiak eta portuak abian jarri ziren kanpora esportatzeko, eta hortik abiatuta <span class="term" data-def="Manufaktura eta industria-jardueraren hedapena. Euskal Herrian meatzaritzan eta siderurgian oinarritua; gizarte-eraldaketa sakona ekarri zuen.">industrializazio-prozesu bizia</span> hedatu zen, bereziki Bizkaian (industria astuna) eta Gipuzkoan (enpresa txiki-ertain espezializatuen sarea). Industrializazioak ez zuen eragin ekonomiko hutsa izan: immigrazio masiboak, klase-gatazkek eta ideologien ugaritzeak <strong>gizarte plural eta konplexua</strong> ekarri zuten, non liberalismoa, karlismoa, sozialismoa eta abertzaletasuna elkarrekin bizi ziren, sarri tentsioan.

