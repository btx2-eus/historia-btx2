sections:
- id: g1-1
  number: '1.1'
  title: 'Independentzia Gerra eta Jose I.aren gobernua: frantsestuak'
  body: |-
    <p>Frantziako Iraultzak sortutako ezegonkortasunaren testuinguruan, Napoleon Bonapartek boterea hartu eta Inperioa ezarri zuen. 1808an Frantziak Espainia inbaditu eta 1814ra arte menpean eduki zuen. Independentzia Gerra ez zen soilik inbasioaren aurkako borroka izan: Antzinako Erregimenaren oinarriak zalantzan jarri zituen eta Estatu liberalaren eraikuntza prozesua martxan jarri zuen.</p><h3><span class="h-num">1.1.1</span> Frantziako inbasioa eta Baionako Abdikazioak (1808)</h3><p>Espainiako monarkia egoera ahulean zegoen: Karlos IV.ak ez zuen herritarren konfiantza, eta haren ministro nagusia, Manuel Godoy, gatazka politikoen erdian zegoen. 1807an, <strong>Fontainebleauko Ituna</strong> sinatu zuten Frantziak eta Espainiak Portugal inbaditzeko, baina Napoleonen benetako asmoa Espainia menderatzea zen.</p><p>1808ko martxoan <strong>Aranjuezeko matxinada</strong> piztu zen: Godoy atxilotu zuten eta Karlos IV.a abdikatzera behartu, Fernando VII.aren mesedetan. Apirilean, Napoleonek bi erregeak Baionara deitu zituen, eta presio politikoaren bidez biak abdikatzera behartu zituen (<span class="term" data-def="Napoleonek Fernando VII.a eta Karlos IV.a abdikatzera behartu zituen (1808), eta Jose I.a izendatu zuen errege.">Baionako Abdikazioak</span>). Napoleonek bere anaia <span class="term" data-def="Napoleonen anaia. Espainiako errege izan zen 1808–1813 artean, frantsesen babesarekin.">Jose Bonaparte</span> izendatu zuen Espainiako errege.</p><h3><span class="h-num">1.1.2</span> Jose I.aren gobernua eta Baionako Estatutua (1808)</h3><p>1808ko ekainean, Napoleonek <span class="term" data-def="Jose I.ak ezarritako testua (1808): konstituzio itxura zuen, baina ez zen demokratikoa ezta herritarren ordezkariek onartutakoa ere.">Baionako Estatutua</span> aldarrikatu zuen. Konstituzio itxura izan arren, ez zen benetako konstituzioa: ez zuen subiranotasun nazionalik aitortzen, eta inposatutako agiri bat zen. Zenbait ideia liberal jasotzen zituen (inprenta askatasuna, zergen berdintasuna, habeas corpus-aren printzipioa), baina ia ez ziren praktikara eraman.</p><p>Jose I.aren gobernuan zenbait espainiar ilustratuk eta burokratak hartu zuten parte: <span class="term" data-def="Frantsesen alde egin zuten espainiar ilustratuak eta funtzionarioak. Jose I.aren gobernuan parte hartu zuten, eta askok erbestea hartu behar izan zuten.">frantsestuak</span>. Batzuek Espainia modernizatzeko aukera ikusi zuten; gerra amaitzean, ordea, askok traidoretzat hartu zituzten.</p><h3><span class="h-num">1.1.3</span> Gerra pizten da: Madrilgo altxamendua (1808-05-02)</h3><p>1808ko maiatzaren 2an, Madrilgo herritarrek altxamendua hasi zuten frantsesen aurka. Murat jeneralaren tropek gogor erantzun zuten, eta hurrengo egunean fusilamendu masiboak burutu zituzten —Francisco de Goyaren margolanetan betiko irudikatuak—. Hainbat hiritan Junta probintzialak osatu ziren botere hutsunea betetzeko, eta horiek koordinatzeko <span class="term" data-def="Inbasioaren aurka botere politiko eta militar nazionala koordinatu zuen erakundea, erregearen ausentzian.">Junta Zentral Gorena</span> sortu zen.</p><h3><span class="h-num">1.1.4</span> Gerraren faseak (1808–1814)</h3><ul>
    <li><strong>Lehen fasea (1808):</strong> inbasioa eta erresistentzia. Uztailean, <strong>Bailengo guduan</strong> Espainiak Frantziaren aurkako lehen garaipen handia lortu zuen, eta Jose I.ak Madril utzi behar izan zuen.</li>
    <li><strong>Bigarren fasea (1809–1812):</strong> Napoleonen interbentzioa. 150.000 soldadurekin lurralde ia osoa okupatu zuen, baina ez zuen kontrol eraginkorrik lortu. <strong>Gerrillak</strong> eta Britainia Handiko <strong>Wellington</strong> jeneralaren armada funtsezko bihurtu ziren. Cadiz izan zen okupatu gabeko hiri nagusia.</li>
    <li><strong>Hirugarren fasea (1812–1814):</strong> frantsesen atzerakada. Napoleonek tropak Errusiara eraman zituen; aliatuek garaipen erabakigarriak lortu zituzten (Arapiles, Gasteiz 1813). 1814an frantsesek alde egin zuten eta Fernando VII.a tronura itzuli zen.</li>
    </ul><h3><span class="h-num">1.1.5</span> Euskal Herrian: okupazioa, erresistentzia eta foruen auzia</h3><p>Frantses tropak azkar sartu ziren lurraldean, eta tokiko elite batzuen hasierako kolaborazioa jaso zuten, foruak babesteko itxaropenarekin. Hala ere, zentralizazio administratiboa ezarri nahian, foru-erakunde historikoak indargabetu zituzten. Horrek tokiko erresistentzia bizkortu zuen eta foruen defentsaren inguruko sentiberatasuna indartu. 1813an, tropa anglo-portugesek <strong>Donostia</strong> setiatu eta suntsitu egin zuten, frantsesen eskuetatik askatu ondoren.</p><h3><span class="h-num">1.1.6</span> Gerraren ondorioak</h3><p>Suntsiketa izugarria izan zen (500.000 hildako baino gehiago, azpiegituren hondamena, gosetea). Espainiaren nazioarteko ospea jaitsi zen, bigarren mailako potentzia bilakatuz. Aldi berean:</p><ul>
    <li>Nazio-sentimendua nabarmen areagotu zen, etsaiaren aurka.</li>
    <li>Liberalismoaren ideiak azkar zabaldu ziren, absolutismoaren zilegitasuna kolokan jarriz.</li>
    <li>Liberalen eta kontserbadoreen arteko lehia hasi zen, XIX. mende osokoa.</li>
    <li>Burgesiaren gorakada geldiezina bilakatu zen, gizarte estamentala ezin zen berregin.</li>
    <li>Amerikako kolonien independentzia prozesuak piztu ziren (1898ra arte).</li>
    </ul>
- id: g1-2
  number: '1.2'
  title: Cadizko Gorteen lan iraultzailea eta 1812ko Konstituzioa
  body: |-
    <p>Gerra garaian, lurralde zabala frantsesen menpe egon zen bitartean, Cadizek askatasuna mantendu zuen, erresistentziaren eta legitimitate politikoaren erdigune bilakatuz. 1810ean, Junta Zentral Gorenak <span class="term" data-def="1810–1814 artean Cadizen bildutako ordezkariek osatutako gorteak. Espainiako lehen konstituzioa (1812) onartu zuten.">Cadizko Gorteak</span> deitu zituen.</p><h3><span class="h-num">1.2.1</span> Testuingurua eta Gorteen osaera</h3><p>Fernando VII.a Frantzian preso zegoela, Cadizko Gorteek subiranotasunaren ordezkaritza hartu zuten. Hiru joera nagusi bereizi ziren:</p><ul>
    <li><strong>Liberalak:</strong> subiranotasun nazionala, botere banaketa eta konstituzio bidezko estatua.</li>
    <li><strong>Moderatuak:</strong> erreformismo ilustratua, monarkiaren egitura nagusiak mantenduz.</li>
    <li><strong>Absolutistak:</strong> Antzinako Erregimena babesten zuten.</li>
    </ul><p>Gerra-egoerak eta Cadizen izaera liberalak Gorteek erritmo bizian eta joera liberalean lan egitea ahalbidetu zuten. Amerikako probintziek ere ordezkaritza izan zuten.</p><h3><span class="h-num">1.2.3</span> 1812ko Konstituzioa: «La Pepa»</h3><p>1812ko martxoaren 19an, Gorteek <span class="term" data-def="1812ko Konstituzioa, «La Pepa». Espainiako lehen konstituzioa eta bere garaian Europako liberalenetakoa.">Espainiako historiako lehen konstituzioa</span> onartu zuten. Oinarri nagusiak:</p><ul>
    <li><span class="term" data-def="Boterea herriaren edo nazioaren esku dago, ez erregearena. Gorteen bidez gauzatzen da.">Subiranotasun nazionala</span>: boterea herriarena.</li>
    <li>Botere banaketa: legegilea (Gorteak), betearazlea (erregea), judiziala (epaileak).</li>
    <li>Gizonezkoen sufragio unibertsala.</li>
    <li>Eskubide zibilak: inprenta askatasuna, legearen aurreko berdintasuna, jabetza pribatua.</li>
    <li>Monarkia konstituzionala: erregearen boterea mugatua.</li>
    <li>Eliza katolikoa erlijio ofiziala, baina Inkisizioa desegin zen.</li>
    </ul><h3><span class="h-num">1.2.4</span> Eragina eta mugak</h3><p>Gorteek lege ugari onartu zituzten (desamortizazioak, jaurerriak ezabatzea), baina aplikazioa mugatua izan zen, lurraldea frantsesen esku baitzegoen. Fernando VII.a 1814an itzuli zenean, Konstituzioa bertan behera utzi eta absolutismoa berrezarri zuen. Hala ere, 1812ko Konstituzioa mugarri historikoa izan zen: lehen aldiz Estatu liberal baten oinarriak ezarri ziren, eta ondorengo belaunaldietan eragin sakona izan zuen.</p><div class="callout"><div class="callout-title">Laburbilduz</div>Cadizko Gorteak eta 1812ko Konstituzioa Antzinako Erregimenaren krisiari emandako lehen erantzun politiko koherentea izan ziren, eta hurrengo urteetako gatazkaren oinarria jarri zuten: <em>absolutismoa ala liberalismoa, tradizioa ala eraldaketa</em>.</div>
- id: g1-3
  number: '1.3'
  title: 'Liberalismoaren garaipena: Estatuaren egituraren eraikuntza'
  body: |-
    <p>1814an <span class="term" data-def="Espainiako erregea. Absolutismoa berrezarri zuen 1814an eta liberalismoaren aurka jardun zuen.">Fernando VII.a</span> Espainiara itzuli zenean, Cadizko Gorteek onartutako obra politikoa bertan behera utzi eta absolutismoa berrezarri zuen. Hala ere, Independentzia Gerrak eta Cadizko esperientziak agerian utzi zuten Antzinako Erregimena ez zela lehengo sendotasunarekin mantentzeko modukoa. Ordutik aurrera, Espainiako XIX. mendeko politika gatazka handi batek markatuko zuen: <span class="term" data-def="Subiranotasun nazionala, eskubide zibilak, konstituzioa eta ekonomia askearen defentsan oinarritutako ideologia.">absolutismoaren eta liberalismoaren arteko borrokak</span>. Ez zen eztabaida teoriko hutsa: boterearen jatorria, herritarren eskubideak, Elizaren papera eta administrazioaren egitura zeuden jokoan.</p>
    <h3><span class="h-num">1.3.1</span> 1814–1840: absolutismoaren eta liberalismoaren arteko borroka</h3>
    <p>Fernando VII.aren lehen urteetan absolutismoa berriz ezarri zen. Erregeak 1812ko Konstituzioa indargabetu eta liberalen aurkako errepresioa abiatu zuen. Hala ere, liberalismoa ez zen desagertu: armadan, hiri batzuetan eta elite ilustratuen artean bizirik mantendu zen. 1820an <strong>Rafael del Riegoren altxamenduak</strong> arrakasta izan zuen eta <span class="term" data-def="1820–1823 arteko aldia: Riegoren altxamenduaren ondoren 1812ko Konstituzioa berriro ezarri zen, baina Europako monarkiek itzultzearen Frantziako inbasioaz bertan behera utzi zuten.">Hirurteko Liberala</span> hasi zen. Fernando VII.ak, nahi gabe bada ere, 1812ko Konstituzioa onartu behar izan zuen. Hala ere, esperientzia laburra izan zen: «<strong>San Luisen Ehun Mila Semeen</strong>» sarrerarekin absolutismoa 1823an berrezarri zen.</p>
    <p>1833an Fernando VII.a hil zenean, oinordetza arazoak gatazka areagotu zuen. Isabel II.a izendatu zuten oinordeko, baina <strong>Karlos Maria Isidrok</strong> aurka egin zuen. <span class="term" data-def="Absolutisten eta liberalen arteko gerra zibilak. Lehen Karlistaldia (1833–1840) Euskal Herrian foruen defentsarekin bat egin zuen.">Lehen Karlistada</span> hasi zen: karlisten aldean absolutismo tradizionala, Elizaren defentsa eta, Euskal Herrian eta Nafarroan bereziki, foruen babesa. Isabeldarren aldean, liberalismoa eta estatu konstituzional zentralizatuaren eraikuntza. Isabeldarrak garaile atera ziren, eta horrek liberalismoari boterea eskuratzeko bidea eman zion.</p>
    <div class="callout">Karlistadek argi erakutsi zuten liberalismoaren garaipena ez zela prozesu baketsu eta adostu baten ondorio, baizik eta gerra zibilaren bidez finkatutako bilakaera historikoa. Bi estatu-eredu zeuden aurrez aurre.</div>
    <h3><span class="h-num">1.3.2</span> Estatu liberal berriaren oinarri politikoak eta administratiboak</h3>
    <p>Liberalismoak nagusitasuna lortzean, bere helburu nagusia estatu berri bat eraikitzea izan zen. Antzinako Erregimeneko egitura zaharrak desegin eta lege, erakunde eta administrazio bateratuen bidez antolatutako estatu <span class="term" data-def="Boterea erdigunean biltzen duen sistema politiko eta administratiboa. Tokiko autonomiak baztertzen ditu.">zentralizatu</span> bat sortu nahi izan zen. <strong>1833ko probintzia-banaketak</strong> mugarri handia jarri zuen: Espainia probintzietan antolatu zen, eta <span class="term" data-def="Estatu zentralaren ordezkari nagusiak probintzietan. 1833tik aurrera sistematizatu ziren.">gobernadore zibilen</span> bidez gobernu zentralaren kontrola indartu zen.</p>
    <p>Ordena publikoa bermatzeko eta estatuaren presentzia lurralde osoan indartzeko tresnak sortu ziren: <span class="term" data-def="Estatuak sortutako indar armatua (1844). Ordena publikoa bermatzea zuen helburu, batez ere landa eremuetan.">Guardia Zibila</span> (1844) adibide nagusia. Justiziaren eta administrazioaren arloetan ere uniformetasuna bilatu zen: kode juridiko komunen eta egitura zentralizatuen bidez estatu liberala ez zen ideien munduan bakarrik eraiki; eguneroko bizitza arautzeko administrazio sare baten bidez finkatu zen.</p>
    <h3><span class="h-num">1.3.3</span> Konstituzioak eta liberalismoaren joera nagusiak</h3>
    <p>Estatu liberalaren eraikuntza ez zen modu bakarrean egin, liberalismoaren barruan bi joera nagusi finkatu baitziren:</p>
    <ul>
    <li><strong>Moderatuak:</strong> ordena, zentralismoa eta monarkiaren indarra lehenesten zituzten; subiranotasun partekatua eta <span class="term" data-def="Botoa emateko baldintza ekonomikoak (errenta, jabetza) ezartzen dira. Herritarren zati handi bat kanpoan geratzen da.">sufragio zentsitarioa</span>.</li>
    <li><strong>Progresistak:</strong> ordezkaritza zabalagoa, udal autonomia handiagoa eta erreforma sakonagoak; subiranotasun nazionala eta sufragio zabalagoa.</li>
    </ul>
    <p><strong>1834ko Errege Estatutua</strong> trantsiziozko pauso bat izan zen, benetako konstituzio liberala ez zena. <strong>1837ko Konstituzioa</strong> (progresista): subiranotasun nazionala, eskubide zibil batzuk eta monarkia konstituzionalaren oinarriak. <strong>1845eko Konstituzioa</strong> (moderatua): subiranotasun partekatua aldarrikatu zuen erregearen eta Gorteen artean, sufragioa gehiago murriztu eta Elizaren posizioa indartu zen. Isabel II.aren agintaldian moderatuak nagusitu ziren, eta sistema liberala izaera elitista eta zentralizatua hartuz joan zen.</p>
    <h3><span class="h-num">1.3.4</span> Eraldaketa ekonomikoak eta sozialak</h3>
    <p>Estatu liberal berriak ez zuen soilik antolaketa politikoa aldatu; ekonomiaren oinarriak ere eraldatu nahi izan zituen. <span class="term" data-def="Estatuak Elizaren eta herriaren jabetzak saldu zituen jabetza pribatua sustatzeko. Nekazarien egoera okertu eta latifundismoa areagotu zuen.">Desamortizazioek</span> garrantzi handia izan zuten: <strong>Mendizabalen (1836)</strong> eta <strong>Madozen (1855)</strong> bidez, Elizaren eta herri-lurren zati handi bat saldu zen estatuaren finantzak hobetzeko asmoz. Praktikan, lur horiek ez ziren nekazarien artean modu orekatuan banatu; gehienetan kapitala zuten sektoreek eskuratu zituzten, eta horrek aberastasunaren kontzentrazioa handitu eta latifundismoa areagotu zuen.</p>
    <p>Kapitalismo industrialaren lehen urratsak eman ziren: garraio sareak (trenbidea), finantza erakundeak (bankuak, burtsak) eta merkatu nazional bateratuago bat, nahiz eta Espainia oraindik nekazaritza ekonomiaren menpe egon nagusiki. Industrializazioa lurralde eta sektore jakin batzuetan agertu zen (Katalunia, Euskal Herria). Gizartean ere aldaketak gertatu ziren: estamentu-egitura zaharra ahulduz joan zen, burgesiaren protagonismoa handitu zen, eta jabetzarik gabeko sektore zabalak — langileak eta nekazari pobreak — sistema berriaren onuretatik kanpo geratu ziren maiz.</p>
    <h3><span class="h-num">1.3.5</span> Liberalismoaren kontraesanak eta sistemaren higadura</h3>
    <p>Liberalismoak aurrerapen handiak ekarri zituen Antzinako Erregimenarekin alderatuta: konstituzioak, botere banaketaren printzipioa, eskubide zibilen aitortza eta estatu modernoago baten sorrera. Baina kontraesan handiak ere bai: sufragioa oso mugatua zen, hauteskundeak maiz manipulatzen ziren, eta estatuaren boterea elite ekonomiko eta politikoen esku geratzen zen. Emakumeak, langileak eta nekazari gehienak ez ziren benetako parte-hartzaile politiko bihurtu.</p>
    <p>1850eko hamarkadatik aurrera, Isabel II.aren erregimen moderatuak bere kontraesanak gero eta argiago erakutsi zituen: ustelkeria eta klientelismoa zabalduak ziren, faboritismoak monarkiaren zilegitasuna higatu zuen, eta gizarte-desadostasunak handitu ziren. Egoera horretan, progresistak, demokratak, errepublikanoak eta langile mugimenduaren lehen adierazpenak indartzen hasi ziren. 1868an, <span class="term" data-def="Isabel II.aren aurkako altxamendu militarra (1868). Monarkia amaitu eta Seiurteko Demokratikoari bide eman zion.">«La Gloriosa»</span> iraultzak Isabel II.a tronutik kendu eta Seiurteko Demokratikoari bide eman zion.</p>
- id: g1-4
  number: '1.4'
  title: Seiurteko Demokratikoa
  body: |-
    <p><span class="term" data-def="Isabel II.a kendu eta erregimen demokratikoagoa ezartzeko saiakera (1868–1874): 1869ko Konstituzioa, Amadeoren monarkia eta Lehen Errepublika barne.">Seiurteko Demokratikoa</span> 1868an hasi zen, Isabel II.aren erregimen moderatuaren krisiaren ondorioz. Sufragio zentsitarioak herritarren gehiengoa politikatik kanpo uzten zuen, ustelkeria eta klientelismoa ohikoak ziren, eta erreginaren inguruko faboritismoak monarkiaren prestigioa higatu zuen. Egoera horretan, progresistak, demokratak, errepublikanoak eta militar liberalak bat egiten hasi ziren sistema berri bat ezartzeko.</p>
    <h3><span class="h-num">1.4.1</span> «La Gloriosa»: 1868ko iraultza</h3>
    <p>1868ko irailean, <strong>Prim eta Serrano</strong> jeneralek gidatutako altxamendu militarrak arrakasta izan zuen, eta Isabel II.a tronutik kendu eta erbesteratu egin zuten. Iraultza horri <span class="term" data-def="Isabel II.aren aurkako altxamendu militarra (1868). Monarkia amaitu eta Seiurteko Demokratikoari bide eman zion.">«La Gloriosa»</span> deitu zitzaion. Ez zen dinastia aldaketa hutsa: sistema moderatu osoaren porrota agerian utzi zuen. Altxamenduaren ondoren, behin-behineko gobernu bat osatu zen, oinarri demokratikoagoak izango zituen estatu berri bat eraikitzeko xedearekin.</p>
    <h3><span class="h-num">1.4.2</span> 1869ko Konstituzioa: irekitze demokratikoaren gailurra</h3>
    <p>Seiurteko Demokratikoaren lehen lorpen nagusia <strong>1869ko Konstituzioa</strong> izan zen. Testu honek subiranotasun nazionala modu argian aitortu zuen, eta lehen aldiz Espainian <span class="term" data-def="Gizonezko heldu guztiek boto eskubidea dute, errenta edo jabetza kontuan hartu gabe. Espainian lehen aldiz 1869an ezarri zen.">gizonezkoen sufragio unibertsala</span> ezarri zuen — aurreko sufragio zentsitarioarekin alderatuta parte-hartze politikoa nabarmen zabaldu zen. Gainera, eskubide zibilen aitortza zabala jaso zuen: adierazpen askatasuna, inprenta askatasuna, biltzeko eskubidea eta erlijio askatasuna.</p>
    <p>Hala ere, irekitze horrek kontraesanak ere bazituen. Sistema berriak askatasun handiagoa eta pluralismo politiko zabalagoa ekarri zituen, baina horrek ez zuen egonkortasunik bermatu. Aitzitik, joera oso desberdineko indarrak — moderatuak, progresistak, errepublikanoak, federalak — aritu ziren elkarren lehian, eta eztabaida eta zatiketa are ageriago utzi zituzten.</p>
    <h3><span class="h-num">1.4.3</span> Amadeo I.aren monarkia: saiakera parlamentario baten porrota (1871–1873)</h3>
    <p>Konstituzio berriak monarkiari eutsi nahi izan zion. <span class="term" data-def="Saboya leinuko printzea. Espainiako errege (1871–1873) Seiurteko Demokratikoan; sostengu faltagatik abdikatu zuen.">Amadeo I.a Savoiakoa</span> aukeratu zuten Espainiako errege (1871). Baina bere agintaldia oso ahula izan zen hasieratik: ez zuen erro historikorik Espainian, ez zuen babes sozial sendorik, eta bere babesle nagusia zen <strong>Prim jenerala</strong> hil egin zuten. Haren agintaldian gatazka anitzak pilatu ziren: II. Karlistada piztu zen (1872), Kuban independentzia gerra jarraitzen zuen (1868tik), eta oposizio politikoa eta prentsako kritikak etengabeak ziren. Azkenean, 1873an abdikatu zuen.</p>
    <h3><span class="h-num">1.4.4</span> Lehen Errepublika: itxaropena eta ezegonkortasuna (1873–1874)</h3>
    <p>Amadeoren abdikazioaren ondoren, Gorteek <span class="term" data-def="Espainiako lehen errepublika (1873–1874). Barne tentsioek eta egonkortasun faltak porrotera eraman zuten urtebete eskasean.">Lehen Errepublika</span> aldarrikatu zuten (1873). Errepublika ez zen bloke bateratu gisa jaio: federalak eta zentralistak, moderatuak eta erradikalak, ikuspegi oso desberdineko errepublikanoak elkarren artean zatituta zeuden. Aldi berean, monarkikoak, karlistak eta militar kontserbadoreak ere erregimen berriaren aurka zeuden.</p>
    <p>Egoera are gehiago zaildu zen gatazka anitzak pilatu zirelako: <strong>kantonalismoa</strong> hedatu zen, hiri eta eskualdeetan autonomia propioak aldarrikatuz; Karlistaldia indarrean jarraitzen zuen; Kubako gerra kolonialak baliabideak xurgatzen zituen; gobernuaren barruko zatiketak etengabeak ziren. <strong>Urte bakarrean lau presidente izateak</strong> argi erakusten du erregimenaren ezegonkortasuna. 1874an, Martínez Campos jeneralaren pronuntziamenduak Alfonso XII.a errege izendatu zuen, Borboien Berrezarkuntza hasiz.</p>
    <h3><span class="h-num">1.4.5</span> Seiurtekoaren amaiera eta balorazioa</h3>
    <p>Porrota izan arren, Seiurtekoak lehen aldiz modu serioan planteatu zuen Espainian parte-hartze politikoa zabaltzea, sufragio unibertsala ezartzea eta askatasun zibil zabalagoak aitortzea. Aldi horretan, demokrazia, errepublika eta federalismoaren ideiek presentzia handiagoa hartu zuten kultura politikoan. Baina Seiurtekoak beste zerbait ere agerian utzi zuen: Espainiako estatu liberalak oinarri ahula zuela — gizartea zatituta, elite politikoen arteko akordioak hauskorrak, militarren esku-hartze politikoa ohikoa. Horregatik, Seiurteko Demokratikoa ez zen soilik esperimentu ausarta; estatu liberal espainiarraren mugak agerian utzi zituen laborategi politikoa ere izan zen.</p>
    <div class="callout">Porrota izan arren, Seiurtekoak demokrazia, errepublika eta federalismoaren ideiak errotu zituen. Sufragio unibertsala lehen aldiz aplikatu zen. Etorkizuneko eztabaida politiko askoren atea zabalik utzi zuen.</div>
- id: g1-5
  number: '1.5'
  title: Foru-auzia
  body: |-
    <p>Espainiako estatu liberalaren eraikuntza <span class="term" data-def="Boterea erdigunean biltzen duen sistema politiko eta administratiboa. Tokiko autonomiak baztertzen ditu.">zentralizazioaren</span> eta uniformizazio juridikoaren printzipioetan oinarritu zen. Liberal askoren ustez, estatu moderno bat eraikitzeko beharrezkoa zen lurralde osoa lege, administrazio eta botere egitura berberen menpe jartzea. Horregatik, <span class="term" data-def="Euskal lurraldeetako lege, ohitura eta erakunde propioak. Autogobernua eta zerga-salbuespenak ematen zituzten.">foru-erregimenak</span> traba gisa ikusi zituzten: Antzinako Erregimeneko hondar pribilegiatuak. Euskal Herrian eta Nafarroan, ordea, foruak ez ziren pribilegio huts moduan ulertzen; autogobernu historikoaren, tokiko askatasunen eta nortasun kolektiboaren adierazpen nagusietako bat ziren.</p>
    <h3><span class="h-num">1.5.1</span> Zer ziren foruak?</h3>
    <p>Foruak Erdi Aroko jatorria zuten lege, ohitura eta erakunde propioak ziren. Euskal lurraldeetan eta Nafarroan bereziki errotuta zeuden, eta bertan ematen zituzten:</p>
    <ul>
    <li>Zerga-salbuespen edo araubide bereziak eta soldadutza baldintza propioak.</li>
    <li>Justizia eta administrazio antolaketa berezia.</li>
    <li>Erabakiak hartzeko tokiko erakunde autonomoak: <span class="term" data-def="Euskal lurraldeetako foru-erakunde historikoak; tokiko erabakigune eta legegile nagusiak.">Batzar Nagusiak</span> eta Diputazioak.</li>
    </ul>
    <p>Euskal Herriko foru-sistemak berezitasun handia zuen: foruek ez zuten soilik salbuespen fiskal edo administratiboen balioa, komunitatearen antolaketa politikoarekin lotura estua baizik. Horregatik, haien aurkako neurriak ez ziren neurri tekniko huts gisa bizi, historia osoan eraikitako bizimodu politikoaren aurkako eraso gisa baizik.</p>
    <h3><span class="h-num">1.5.2</span> Foruak eta estatu liberalaren arteko talka</h3>
    <p>Estatu liberala eraikitzeko prozesuan, zentralismoak foruen aurkako jarrera hartu zuen. Liberal askoren ustez, estatu nazional bateratu batek ezin zuen onartu lurralde bakoitzak bere lege eta erakunde propioak izatea; horrek batasun juridikoa eta administratiboa hausten zituen. Foruak askotan <strong>pribilegio feudal zaharkitu</strong> gisa aurkeztu zituzten. Euskal Herrian eta Nafarroan, ordea, foruen aldeko askorentzat ez ziren iraganeko hondar hutsak, bertako herriek historian lortutako askatasun eta autogobernuaren seinale baizik.</p>
    <p>Talka hori bereziki agerikoa izan zen karlistaldietan: <strong>Lehen Karlistadan</strong>, foruen defentsa karlisten aldarrikapen nagusietako bat izan zen, batez ere Euskal Herrian eta Nafarroan. Bi eredu kontrajarri jarri ziren aurrez aurre: alde batean, tradizioa, foruak eta monarkia historikoa; bestean, liberalismo zentralizatzailea. Liberalek gerra irabazi ondoren, foruen murrizte eta egokitze bidea zabaldu zen.</p>
    <h3><span class="h-num">1.5.3</span> 1839ko eta 1841eko moldaketak</h3>
    <p>Lehen Karlistaldia amaitu ondoren, 1839ko legeak foruak berresten zituela zirudien, baina aldi berean Konstituzioaren barruan moldatzeko aukera irekita uzten zuen. Foruak ez ziren osorik eta baldintzarik gabe aitortzen; estatu liberalaren markora egokitu nahi ziren. Formula trantsiziozko bat zen: itxuraz mantentzea, baina etorkizuneko erreformaren atea irekita uztea.</p>
    <p>Nafarroan prozesua are argiagoa izan zen. <strong>1841eko Lege Hitzartuaren</strong> bidez, foru-sistema nabarmen murriztu zen eta estatuaren kontrola handitu. Nafarroak bere berezitasun batzuk mantendu zituen, baina jada ez zen aurreko foru-erresuma bera. Euskal probintziek ere erakunde batzuk mantendu ahal izan zituzten denboraz, baina presioa gero eta handiagoa zen.</p>
    <h3><span class="h-num">1.5.4</span> 1876ko abolizioa eta 1878ko Kontzertu Ekonomikoa</h3>
    <p>Foru-auziaren haustura erabakigarria <strong>Hirugarren Gerra Karlista</strong> (1872–1876) amaitu ondoren etorri zen. <strong>Cánovas del Castilloren gobernuak 1876an Euskal Foruen abolizio legea</strong> onartu zuen: Euskal Herria Espainiako gainerako probintzien pare jarri nahi izan zen lege, administrazio eta zerga arloetan. <span class="term" data-def="Euskal lurraldeetako foru-erakunde historikoak; tokiko erabakigune eta legegile nagusiak.">Batzar Nagusiak</span> eta foru diputazio historikoak desegin edo hutsaldu egin ziren.</p>
    <p>Hala ere, abolizioa ez zen erabatekoa. <strong>1878an <span class="term" data-def="Euskal lurraldeei zerga-autonomia partziala ematen dien sistema (1878). Estatuari kupo bat ordaintzen diote, baina inbertsio politika propioa egin dezakete. Gaur egun ere indarrean dago.">Kontzertu Ekonomikoa</span></strong> sinatu zen Bizkaia, Gipuzkoa eta Arabarekin: lurralde horiek zerga-bilketa propioa mantendu ahal izan zuten, eta gero kupo baten bidez estatuari ekarpena egin. Nafarroak, bere aldetik, Hitzarmen Ekonomikoa izan zuen. Beraz, 1876ak foruen amaiera ekarri zuen zentzu politiko eta administratiboan, baina 1878ak foru-oinordetza bat bizirik utzi zuen zerga arloan — gaur egun arte iraun duena.</p>
    <h3><span class="h-num">1.5.5</span> Foru-auziaren ondorio politikoak eta historikoak</h3>
    <p>Foruen abolizioak eragin sakona izan zuen Euskal Herriko gizartean. Askoren ustez, ez zen neurri administratibo huts bat, tokiko askatasunen, autogobernuaren eta historia propioaren aurkako eraso zuzena baizik. Hiru erreakzio politiko eta kultural nagusi sortu ziren:</p>
    <ul>
    <li><strong>Tradizionalismoaren indartze:</strong> karlisten eta sektore kontserbadore askoen artean, foruen defentsa Elizaren, monarkia tradizionalaren eta bizimodu zaharraren defentsarekin lotu zen.</li>
    <li><strong>Euskal nazionalismoaren lehen oinarriak:</strong> foruen galera Espainiaren asimilazio saiakera gisa irakurri zen; Sabino Aranak euskal nazioaren ideia artikulatu zuen, foruen oinarri historikoa erabiliz.</li>
    <li><strong>Autonomia modernoaren eskaera:</strong> beste sektore batzuek autogobernu modernoaren aldeko aldarrikapen gisa berrinterpretatu zuten foru-auzia.</li>
    </ul>
    <p>Laburbilduz, foru-auzia ez zen soilik iraganeko erakunde batzuen desagerpenaren historia. Espainiako estatu liberal zentralizatuaren eraikuntzaren eta Euskal Herriko autogobernu historikoaren arteko talkaren adierazpen nagusietako bat izan zen. Foru-defentsatik sortutako tradizionalismoa, nazionalismoa eta autonomismoa ez ziren erantzun berdinak, baina guztiek partekatzen zuten abiapuntu bera: 1876ko kolpearen ondoren autogobernuaren galera ezin zela neutraltasunez bizi.</p>
    <div class="callout">Foruen galera eta 1878ko Kontzertu Ekonomikoa elkarrekin ulertu behar dira: erabateko zentralizazioa ez zen lortu, baina foru-autogobernua desagertu zen. Horrek ondorengo hamarkadetan euskal politika osoaren oinarria finkatu zuen.</div>
glossary:
- term: Abertzaletasuna / Nazionalismoa
  def: |-
    Nazio baten nortasuna eta autodeterminazio eskubidea aldarrikatzen duen ideologia. Euskal Herrian XIX. mende amaieran sortu zen, foruen galera eta zentralismoaren aurrean.
- term: Amadeo I.a
  def: |-
    Saboya leinuko printzea. Espainiako errege (1871–1873) Seiurteko Demokratikoan; sostengu faltagatik abdikatu zuen.
- term: Antzinako Erregimena
  def: |-
    Gizarte estamentala, monarkia absolutua eta nekazaritzan oinarritutako ekonomia. XVIII. mende bukaeran krisian sartu zen.
- term: Baionako Abdikazioak (1808)
  def: |-
    Napoleonek Fernando VII.a eta Karlos IV.a abdikatzera behartu zituen, eta Jose I.a izendatu errege.
- term: Baionako Estatutua (1808)
  def: |-
    Jose I.ak ezarritako testua: konstituzio itxura zuen, baina ez zen demokratikoa ezta herritarrek onartua ere.
- term: Batzar Nagusiak
  def: |-
    Euskal lurraldeetako foru-erakunde historikoak; tokiko erabakigune eta legegile nagusiak.
- term: Cadizko Gorteak
  def: |-
    1810–1814 artean bildutako ordezkariek osatutako gorteak. Espainiako lehen konstituzioa (1812) onartu zuten.
- term: Desamortizazioa
  def: |-
    Estatuak Elizaren eta herriaren jabetzak saldu zituen jabetza pribatua sustatzeko. Nekazarien egoera okertu eta latifundismoa areagotu zuen.
- term: Diputazioak
  def: Probintzia mailako gobernuak. XIX. mendean gobernadore zibilen menpe egon ziren.
- term: Errejentzia
  def: |-
    Erregea adingabea edo absente dagoenean haren izenean gobernatzen duen agintea (Maria Cristina eta Espartero, 1833–1843).
- term: Errepublika
  def: |-
    Estatua erregerik gabe antolatzen den sistema. Herritarrek hautatutako ordezkariek gobernatzen dute.
- term: Estatu zentralista
  def: |-
    Boterea Madrilen edo erdigunean biltzen da; probintziek ez dute autonomia politikorik.
- term: Fernando VII.a
  def: |-
    Espainiako erregea. Absolutismoa berrezarri zuen 1814an eta liberalismoaren aurka jardun zuen.
- term: Frantsestuak
  def: |-
    Frantsesen alde egin zuten espainiar ilustratuak eta funtzionarioak. Askok erbestea hartu behar izan zuten.
- term: Frantziar Iraultza (1789)
  def: |-
    Absolutismoaren eta pribilegioen aurkako iraultza. Liberalismoaren, berdintasunaren eta subiranotasun nazionalaren oinarriak zabaldu zituen.
- term: Foruak
  def: |-
    Euskal lurraldeetako lege, ohitura eta erakunde propioak. Autogobernua eta zerga-salbuespenak ematen zituzten.
- term: Gobernadore zibilak
  def: |-
    Estatu zentralaren ordezkari nagusiak probintzietan. 1833tik aurrera sistematizatu ziren.
- term: Guardia Zibila (1844)
  def: |-
    Estatuak sortutako indar armatua. Ordena publikoa bermatzea zuen helburu, batez ere landa eremuetan.
- term: Habeas corpus
  def: |-
    Pertsonen askatasuna babesteko printzipio juridikoa: inor ezin da nahierara atxilotu, epaile baten aurrean aurkeztu behar da.
- term: Ilustrazioa
  def: |-
    Arrazoia, hezkuntza eta askatasuna defendatzen zituen XVIII. mendeko mugimendua. Liberalismoaren oinarri ideologikoa.
- term: Jose I.a
  def: |-
    Napoleonen anaia. Espainiako errege izan zen 1808–1813 artean, frantsesen babesarekin.
- term: Karlistadak
  def: |-
    Absolutisten eta liberalen arteko gerra zibilak. Lehen Karlistaldia (1833–1840) Euskal Herrian foruen defentsarekin bat egin zuen.
- term: Konstituzioa
  def: |-
    Estatuaren oinarrizko legea. Botereen banaketa, erakundeen egitura eta herritarren eskubideak arautzen ditu.
- term: Kontzertu Ekonomikoa (1878)
  def: |-
    Euskal lurraldeei zerga-autonomia partziala ematen dien sistema. Kupo bat ordaintzen diote estatuari. Gaur egun ere indarrean.
- term: La Gloriosa (1868)
  def: |-
    Isabel II.aren aurkako altxamendu militarra. Monarkia amaitu eta Seiurteko Demokratikoari bide eman zion.
- term: Lehen Errepublika (1873–1874)
  def: |-
    Espainiako lehen errepublika. Barne tentsioek eta egonkortasun faltak porrotera eraman zuten.
- term: Liberalismoa
  def: |-
    Subiranotasun nazionala, eskubide zibilak, konstituzioa eta ekonomia askearen defentsan oinarritutako ideologia.
- term: Moderantismoa
  def: |-
    Liberalismoaren adar kontserbadoreena. Subiranotasun partekatua eta sufragio zentsitarioa defendatzen zituen.
- term: Napoleon Bonaparte
  def: |-
    Frantziako enperadorea. Europa konkistatu zuen eta Espainian interbentzio zuzena egin zuen 1808tik aurrera.
- term: Nazio-kontzientzia
  def: |-
    Lurralde batek bere izaera politiko eta kulturala modu kolektiboan sentitzea. XIX. mendean indartu zen.
- term: Seiurteko Demokratikoa (1868–1874)
  def: |-
    Isabel II.a kendu eta erregimen demokratikoagoa ezartzeko saiakera: 1869ko Konstituzioa, Amadeo eta Lehen Errepublika.
- term: Subiranotasun nazionala
  def: Boterea herriaren edo nazioaren esku dago. Gorteen bidez gauzatzen da.
- term: Subiranotasun partekatua
  def: |-
    Boterea Gorteen eta erregearen artean banatzen da. Konstituzio moderatuetan agertzen da (1845).
- term: Sufragio unibertsala (gizonezkoena)
  def: |-
    Gizonezko heldu guztiek boto eskubidea dute, errenta kontuan hartu gabe. Espainian lehen aldiz 1869an.
- term: Sufragio zentsitarioa
  def: |-
    Botoa emateko baldintza ekonomikoak ezartzen dira (errenta, jabetza). Herritarren zati handi bat kanpoan geratzen da.
- term: Zentralismoa
  def: |-
    Boterea erdigunean biltzen duen sistema politiko eta administratiboa. Tokiko autonomiak baztertzen ditu.
