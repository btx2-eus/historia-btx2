intro: |-
  XVIII. mendearen bigarren erdian, mundua aldatuko zuten ideia berriak sortu ziren. <span class="term" data-def="Arrazoia, hezkuntza eta askatasuna defendatzen zituen XVIII. mendeko mugimendua. Liberalismoaren oinarri ideologikoa.">Ilustrazioak</span> arrazoia, hezkuntza eta askatasuna jarri zituen gizartearen oinarri gisa, eta <span class="term" data-def="Gizarte estamentala, monarkia absolutua eta nekazaritzan oinarritutako ekonomia. XVIII. mende bukaeran krisian sartu zen.">Antzinako Erregimena</span> —monarkia absolutua, gizarte estamentala eta nekazaritza-ekonomia— zalantzan jarri zen. AEBen independentzia (1776) eta <span class="term" data-def="Frantzian absolutismoaren eta pribilegioen aurkako iraultza (1789). Liberalismoaren, berdintasunaren eta subiranotasun nazionalaren oinarriak zabaldu zituen.">Frantziako Iraultzak</span> (1789) modernitate politikoaren bidea ireki zuten, eta burgesia gizarte-klase berri gisa sendotzen hasi zen.
