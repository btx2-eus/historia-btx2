sections:
- id: g6-1
  number: '6.1'
  title: Oinarri instituzional eta ideologikoa
  body: |-
    <p>1939tik aurrera frankismoak ez zuen «gobernu sendo» bat eraiki soilik; Estatu mota berri bat eraiki zuen, izaeraz eta funtzionamenduaz demokraziaren kontrakoa: <span class="term" data-def="Boterea pertsona edo talde baten esku kontzentratzen duen sistema, askatasun politikoak eta oposizioa ezabatuz. Frankismoa pertsonalista, militarra, nazional-katolikoa, zentralista eta antikomunista.">diktadura pertsonalista</span>, alderdi bakarrekoa eta askatasun politikorik gabea.</p>

    <h3><span class="h-num">6.1.1</span> Frankoren botere pertsonalista</h3>
    <p>Sistemaren erdigunea <strong>Francoren figura</strong> zen: botere guztia pertsona bakarrean — <span class="term" data-def="Botere politiko osoa buruzagi bakar baten inguruan antolatzen duen eredua. Franco «Caudillo» gisa: Estatu buru, armadaren buru eta azken erabakitzaile.">caudillismoa</span>. Francok bere gain hartu zituen:</p>
    <ul>
      <li>Estatu buruaren eginkizunak.</li>
      <li>Armadaren agintaritza gorena.</li>
      <li>Gobernuaren norabide politikoa markatzeko ahalmen erabakigarria.</li>
    </ul>
    <p>Horrek esan nahi zuen subiranotasuna ez zegoela herritarren esku, ezta ordezkaritza-organo libre baten esku ere: botere politikoaren azken erabakia Francoren esku kontzentratzen zen. Erregimenaren osagarri politikoa <strong>alderdi bakarra</strong> izan zen: Mugimendu Nazionala (FET y de las JONS). Pluralismoa debekatua zegoen, eta herritarrek ez zuten «parte hartzen»: atxikitu egin behar zuten, edo isilik geratu.</p>
    <p>Emakumearen egoera erregimenaren gizarte-ereduaren adibide argia zen. Frankismoak II. Errepublikan lortutako emakumeen parte-hartze politiko eta soziala atzera bota zuen: emakumea familia tradizionalaren barruan kokatu zuen berriro, emazte, ama eta etxeko zaintzaile gisa. <strong><span class="term" data-def="Mugimendu Nazionalaren adar femeninoa, emakumeen heziketa obedientzian, katolizismoan, etxeko lanetan eta amatasunaren idealizazioan oinarritzen zuena.">Sección Femeninak</span></strong> eredu hori hedatzeko funtzio ideologikoa izan zuen.</p>

    <h3><span class="h-num">6.1.2</span> Kontrol sozialaren tresnak</h3>
    <p>Sistemak hainbat zutabe zituen gizartea kontrolatzeko:</p>
    <ul>
      <li><strong>Armada:</strong> ordenaren zaindari gisa aurkeztu zen eta Estatuaren barnean presentzia handia izan zuen kargu politikoetan eta administrazioan.</li>
      <li><strong>Eliza Katolikoa:</strong> frankismoaren zutabe nagusietako bat; <span class="term" data-def="Elizak erregimenari legitimazio moral eta soziala eman zion ('Espainia katolikoa salbatu' omen zelako), eta trukean hezkuntza, moral publikoa eta gizarte-kontrola gidatzeko botere handia berreskuratu zuen.">aliantza</span> bat zen: Elizak legitimazio morala ematen zion eta erregimenak hezkuntza, moral publikoa eta gizarte-kontrola eman zizkion Elizari.</li>
      <li><strong>Mugimendu Nazionala (FET-JONS):</strong> gazteria (Frente de Juventudes), emakumeen rola (Sección Femenina), lan-mundua (<span class="term" data-def="Sindikatu Bertikala (OSE): langileak eta enpresariak egitura berean 'batuak', Estatuak gidatuak. Gatazka soziala ezabatu eta gizartea kontrolatzeko tresna.">Sindikatu Bertikala / OSE</span>), propaganda, errituak eta sinbolo politikoak.</li>
      <li><strong>Salaketa-kultura:</strong> auzokideen arteko zelatatzea eta susmoak, errepresioaren eragina biderkatu zuena.</li>
    </ul>
    <p>Lurralde-kontrola ere funtsezkoa zen: Gobernadore Zibilak eta administrazio hierarkikoa kontrolaren giltza ziren probintzietan. Frankismoaren ideia nagusia: boterea ez da banatzen, ez da eztabaidatzen, ez da lehiatzen — <strong>kontrolatu egiten da</strong>.</p>

    <h3><span class="h-num">6.1.3</span> Funtsezko Legeak eta ideologia osagaiak</h3>
    <p>Frankismoak bere burua «legal» gisa aurkeztu nahi izan zuen, konstituzio demokratikorik gabe ere. Horretarako, <span class="term" data-def="Konstituziorik gabe, erregimenari legitimazio-itxura emateko lege-multzoa: Lanaren Forua (1938), Espainolen Forua (1945), Ondorengotzaren Legea (1947)... Pseudo-konstituzionalismoa.">«Funtsezko Legeak»</span> izeneko lege-multzoa eraiki zuen:</p>
    <ul>
      <li><strong>Lanaren Forua (1938):</strong> lan-antolaketa korporatiboa eta sindikatu bertikala.</li>
      <li><strong>Gorteak Eratzeko Legea (1942):</strong> ordezkaritza «korporatiboa» (familia, udal, sindikatu) — <span class="term" data-def="Demokrazia liberalaren ordezko: herritarrak indibiduo aske gisa ez, baizik familia, udal eta sindikatu bezalako 'organismoetan' integratuta, baina praktikan sistema kontrolatua.">demokrazia organikoa</span>.</li>
      <li><strong>Espainolen Forua (1945):</strong> «eskubide» batzuk, beti Estatuaren interesaren menpe.</li>
      <li><strong>Ondorengotzaren Legea (1947):</strong> Espainia «erresuma» zela adierazi, eta Franco biziarteko Estatu buru izendatu.</li>
      <li><strong>Mugimendu Nazionalaren Printzipioak (1958):</strong> doktrina ideologikoa trinkotu.</li>
    </ul>
    <p>Ideologiaren osagai nagusiak: <strong>antiliberalismoa</strong> (pluralismo politikoa «kaos» gisa); <strong>antikomunismoa</strong> (oposizioa «komunismo» gisa etiketatzea); <strong>espainiar ultra-nazionalismo zentralista</strong> (autonomiak «traizio»); <strong>nazional-katolizismoa</strong> (Espainiaren identitate katolikoa moral eta hezkuntzan); eta hasieran <strong>falangismoa</strong> (II. Mundu Gerraren ondoren leundua). Gainera, Gerra Zibila «Gurutzada» gisa aurkeztu zen: garaileen boterea legitimatzeko eta garaituen errepresioa «naturaltzat» aurkezteko.</p>

- id: g6-2
  number: '6.2'
  title: Gerraosteko gizartea eta errepresioa
  body: |-
    <p>Frankismoaren lehen urteetan, gerraosteko gizartea ezin da ulertu «pobrezia» edo «suntsipen» hitzekin bakarrik: goseak, eskasiak eta eguneroko biziraupenak markatu zuten dena. Elikagaiak lortzea bera arazo bihurtu zen — ogia, olioa, esnea, azukrea —, eta askorentzat gerraosteko lehen esperientzia ez zen «politika» kontzeptua, biziraupen zailaren errealitate gordina baizik.</p>

    <h3><span class="h-num">6.2.1</span> Garaileak eta garaituak — gizartearen zatiketa</h3>
    <p>1939tik aurrera Espainia bi kategoriatan banatu zen ia ofizialean: <strong>garaileen Espainia eta garaituen Espainia</strong>. Banaketa horrek ondorio zuzenak zituen bizitza errealean: nork zuen enplegua, nork galdu zuen, nork lortu zuen babesa, nork jasan zuen jazarpena.</p>
    <p>Garaituak ez ziren oposizio politiko arrunt gisa tratatu: frankismoaren hizkeran «anti-Espainia» ziren — errepublikanoak, sozialistak, komunistak, anarkistak, nazionalistak — baina baita erregimenak susmagarri jotzen zuen edonor ere. Horrek errepresioaren logika berezi bat sortu zuen: zigorrak ez ziren soilik ekintza zehatzengatik; <strong>identitateagatik, loturengatik edo «aurrekari» izateagatik</strong> etortzen ziren. Beldurra etxeetan eta kalean zabaldu zen: isiltzea ez zen «zuhurtzia» soilik, biziraupenerako baldintza ezinbesteko bat zen.</p>
    <p><strong>Erbeste masiboa</strong> (450.000–500.000): militante politikoak, intelektualak, funtzionarioak, irakasleak, sindikalistak, soldadu errepublikarrak eta familiak. Askok Frantziara jo zuten lehenik, eta han egoera gogorra bizi: ihesaldi traumatikoak, kontzentrazio-esparruak edo lan behartuak; gero, batzuk Mexikora, URSS-era edo Latinoamerikara.</p>

    <h3><span class="h-num">6.2.2</span> Errepresioaren tresnak eta funtzioak</h3>
    <p>Errepresioak lau funtzio nagusi bete zituen: zigortzea; <strong>beldurra zabaltzea</strong> (oposizioak prezio izugarria zuela); <span class="term" data-def="Administraziotik, hezkuntzatik edo funtzio publikotik pertsona susmagarriak kanporatzeko garbiketa politikoa. Errepublikarekin lotutako milaka zigortu eta baztertu zituzten.">depurazio politikoa</span>; eta gizartearen berrantolaketa ideologikoa.</p>
    <p>Tresna errepresiboak:</p>
    <ul>
      <li><strong>Justizia militarra eta epaiketa azkarrak:</strong> oposizioa «segurtasun arazo» gisa tratatuz, zigor errukigabeak.</li>
      <li><strong><span class="term" data-def="1939ko legea, iraganeko jarrera errepublikarrak zigortzeko eta ondasunak konfiskatzeko. Isunak, ondasunen bahiketa eta lanpostuen galerak.">Erantzukizun Politikoen Legea (1939)</span>:</strong> iraganeko jarrerak zigortu, ondasunak konfiskatu.</li>
      <li><strong>Masoneria eta Komunismoaren Aurkako Legea (1940):</strong> etsai ideologikoaren kriminalizazioa.</li>
      <li><strong>Espetxeak eta lan behartuak:</strong> preso kopuru handiak, baldintza gogorrak.</li>
      <li><strong>Salaketa-kultura:</strong> auzokideen zelatatzea; jendeak bere burua zentsuratzen zuen poliziaren presentziarik gabe.</li>
    </ul>

    <h3><span class="h-num">6.2.3</span> Dimentsio kulturala eta nazionalista</h3>
    <p>Errepresioak dimentsio kulturala eta nazionalista ere izan zuen, bereziki Euskal Herrian eta Katalunian. Frankismoak <strong>«Espainia bakarra»</strong> ezarri nahi izan zuen:</p>
    <ul>
      <li>Euskararen erabilera publikoa gogor mugatu zen: administrazioan, eskolan eta espazio ofizialean gaztelania ezarri zen, eta euskara familia-eremura eta erabilera pribatura murriztu zen.</li>
      <li>Sinbolo abertzaleak debekatuta; erakunde autonomikoak deseginda.</li>
      <li>Abertzaletasuna separatismoarekin, traizioarekin eta erregimenaren aurkako jarduerarekin lotzen zen.</li>
    </ul>
    <p>Frankismoaren zentralismoa ez zen administrazio-antolaketa hutsa: nazio-identitate alternatiboak ahultzeko eta <strong>Espainia uniformearen irudia inposatzeko</strong> politika kulturala ere izan zen.</p>

- id: g6-3
  number: '6.3'
  title: Autarkia ekonomikoa eta gosea
  body: |-
    <p>1939tik 1959ra bitarteko ekonomia frankista ulertzeko, funtsezko kontzeptua <span class="term" data-def="Estatu batek kanpoarekiko mendekotasuna murriztu eta ekonomia bere kabuz antolatzeko politika: inportazioak mugatu, barne-ekoizpena lehenetsi eta Estatuaren kontrola handitu. Frankismoan eskasia, produktibitate baxua eta gosea luzatu zituen.">autarkia</span> da. Autarkia ez zen soilik aukera ekonomiko bat; erregimenaren ikuspegi ideologiko eta politikoarekin lotuta zegoen: diktadurak ekonomia kontrolatu nahi zuen, gizartea kontrolatu nahi zuen bezala.</p>

    <h3><span class="h-num">6.3.1</span> Autarkiaren arrazoiak eta ezaugarriak</h3>
    <p>Gerra Zibilaren ondoren Espainia hondatuta zegoen: azpiegiturak kaltetuta, nekazaritza eta industria ahulduta, garraio-sareak suntsituak. Egoera horri nazioarteko isolamendua gehitu zitzaion. Frankismoak, ordea, egoera bere diskurtsoarekin justifikatu zuen: Espainiak «bere kabuz» bizitzeko gai izan behar zuela, kanpoko eraginik gabe.</p>
    <p>Autarkiaren ezaugarriak:</p>
    <ul>
      <li>Inportazioak mugatu eta barne-ekoizpena lehenetsi.</li>
      <li><strong>Estatuaren kontrol zorrotza:</strong> prezioak, ekoizpena, inportazioak, banaketa eta kontsumoa erregulatu.</li>
      <li>Kanpo-merkataritza mugatua eta <span class="term" data-def="Atzerriko monetaren eskasia, kanpo-merkataritza eta inbertsioak oztopatzen dituena. Autarkian, dibisa-falta frank larga baten arazo kronikoa bihurtu zen.">dibisa-falta</span> larria.</li>
      <li>Praktikan: ekoizpen urria, prezio altuak, produktuen kalitate txarra, lehengaien eta energiaren falta.</li>
    </ul>

    <h3><span class="h-num">6.3.2</span> Errazionamendua, estraperloa eta gosearen urteak</h3>
    <p>Eskasia pairatzen zuten herritarrek, eta horregatik <span class="term" data-def="Txartel bidez oinarrizko elikagaiak banatzeko sistema estatuak kontrolatua. Frankismoaren gerraostean 1952ra arte iraun zuen.">errazionamendua</span> ezarri zen: txartelen bidez lortu behar zituzten elikagaiak (ogia, olioa, azukrea, lekaleak). Sistema urte luzez iraun zuen, <strong>1952ra arte</strong>. Janaria lortzea ez zen soilik arazo ekonomikoa: biziraupenaren, mendekotasunaren eta kontrol sozialaren parte bihurtu zen.</p>
    <p>Eskasiak beste fenomeno bat sortu zuen: <span class="term" data-def="Merkatu beltza: produktuak bide ez-ofizialetatik eta prezio altuagoetan saltzen ziren. Desberdintasun sozialak areagotu zituen; dirua edo kontaktuak zituztenentzat aukera gehiago.">estraperloa</span>. Teorian, errazionamenduak guztiei gutxieneko hornidura bermatu behar zien; praktikan, dirua, kontaktuak edo boterearekiko hurbiltasuna zutenek aukera gehiago zituzten. Autarkiak eta errazionamenduak ez zuten soilik pobrezia sortu: <strong>pribilegio informalak, klientelismoa eta mendekotasun soziala</strong> ere indartu zituzten.</p>
    <p>1940ko hamarkada <strong>«gosearen urteak»</strong> bezala gogoratu da: elikadura urria, gaixotasunak, pobrezia, etxebizitza-arazoak eta eguneroko biziraupenaren zama herritar askoren esperientzia nagusia.</p>

    <h3><span class="h-num">6.3.3</span> INI eta industria; 1959ko Egonkortze Plana</h3>
    <p>Statua ekonomian zuzenean esku hartu zuen. <strong><span class="term" data-def="Instituto Nacional de Industria (1941): Estatuaren interbentzioa industria estrategikoan: energia, siderurgia, garraioa. Emaitza mugatuak: lehia faltaz, teknologia zaharkitua eta ekoizpen eskasa.">INI</span></strong> (Instituto Nacional de Industria, 1941) industria estrategikoa garatu nahi zuen (energia, siderurgia, garraioa). Hala ere, babestutako merkatu batean eta lehiarik gabe, enpresek ez zuten produktibitatea handitzeko presiorik; teknologia zaharkitua zen eta ekoizpena ez zen nahikoa.</p>
    <p>1950etik aurrera egoera pixkanaka aldatu zen: Gerra Hotza piztu eta frankismoa Mendebaldearentzat baliagarri bihurtu zenean, kanpoko laguntza, kredituak eta merkataritza-aukerak hazi ziren. Erregimenaren barruan ere gero eta argiago ikusi zen autarkia modernizazioaren oztopo bihurtu zela.</p>
    <p><strong>1959ko Egonkoltze Planak</strong> autarkiaren zikloa hautsi zuen: gastu publikoa kontrolatu, inflazioa murriztu, kanpo-inbertsioa erraztu eta merkataritza ireki. Horrek frankismoaren bigarren fase ekonomikoa ireki zuen, <span class="term" data-def="1960ko hamarkadako garapenekoaren politika frankista: industrializazio bizkorra, kanpo-inbertsioa, turismoa eta bizi-maila hobetzea, betiere askatasun politikorik gabe.">1960ko hamarkadako desarrollismoa</span>.</p>

- id: g6-4
  number: '6.4'
  title: Oposizioa eta erresistentzia
  body: |-
    <p>Frankismoaren lehen etapan oposizioa existitu zen, baina oso baldintza zailetan: espetxeratzeak, depurazioak, fusilamenduak, polizia-sarea eta salaketaren kultura ez ziren «gogor» izateko tresnak soilik; oposizio antolatua ia ezinezko bihurtzeko mekanismo egiturazko eta iraunkorra ziren. 1939–1959 artean oposizioak hiru bide nagusi hartu zituen.</p>

    <h3><span class="h-num">6.4.1</span> Erbesteko oposizioa — Gobernu Errepublikarra eta Eusko Jaurlaritza</h3>
    <p>1939ko porrotaren ondoren oposizio politikoaren zati handi bat kanpora joan zen. Erbestean egon zen <strong>Gobernu Errepublikarra</strong>, eta alderdi eta sindikatu nagusiek (PSOE, UGT, CNT, PCE) beren egitura batzuk mantendu zituzten neurri batean. Horrek bi ondorio zituen: barruan, frankismoak errazago «hustu» zuen oposizioaren elite politiko eta intelektual askoren presentzia; kanpoan, Errepublikaren legitimotasuna eta memoria mantentzeko ahalegina egin zen.</p>
    <p>Euskal kasuan, <strong>Eusko Jaurlaritzak</strong> —Jose Antonio Agirre lehendakari gisa— dimentsio propioa izan zuen. Haren jarduna bi helburu nagusi uztartu zituen:</p>
    <ul>
      <li>Euskal erakundeen legitimotasuna eta jarraipena bizirik mantentzea, frankismoaren zentralismoaren aurrean Euskal Herria subjektu politiko gisa defendatuz.</li>
      <li>Frankismoaren aurkako aliantzak eta harreman diplomatikoak bilatzea, batez ere II. Mundu Gerrako eta ondorengo urteetan. Aliatuen garaipenarekin frankismoa ere eroriko zelako itxaropena izanda, nazioarteko posizionamendua eta presioa bilatu zituzten.</li>
    </ul>
    <p>Euzko Jaurlaritzak erbestean sare politiko eta sozialak aktibatu zituen: komunitate euskaldunen antolaketa (Frantzian, Ameriketan), laguntza humanitarioa, informazio eta propaganda lana. Hala ere, Aliatuek ez zuten Espainian interbentziorik egin, eta Gerra Hotzaren hasierak erbestearen presio gaitasuna ahuldu zuen. Halere, <strong>euskal identitate politikoa eta autogobernuaren ideia bizirik atxiki zituzten</strong> frankismoaren 40 urteetan.</p>

    <h3><span class="h-num">6.4.2</span> Barnealdeko erresistentzia — Maquis eta klandestinitatea</h3>
    <p>Barruko erresistentziaren aurpegirik ikusgarriena <strong>1940ko hamarkadako gerrilla</strong> izan zen, <span class="term" data-def="Frankismoaren aurkako gerrilla armatua, batez ere 1940ko hamarkadan. Aliatuen laguntzarekin frankismoa erortzearen itxaropenaren baitan sortu zen. 1944ko Vall d'Araneko saiakera (PCE); gero indarra galdu.">maquis</span> izenez ezagutua. Elikatu zuen testuinguruak: errepresioaren bortizkeriak «ez dago atzera bueltarik» sentsazioa sortu zuen, eta II. Mundu Gerrako aliatuen garaipenak itxaropena piztu: agian Espainia ere askatu. <strong>1944ko Vall d'Araneko saiakera</strong> (PCE) erresistentzia armatuari ikusgarritasuna eman zion. Baina frankismoaren aparatu errepresiboak eta nazioarteko egoeraren aldaketak gerrillaren bidea itotzen joan ziren: 50eko hamarkadaren hasieran erresistentzia armatuak indarra galdu zuen.</p>
    <p>Gerrillarekin batera, <strong>klandestinitatea</strong> oposizioaren ardatz nagusia zen. Alderdi eta sindikatu guztiak debekatuta zeuden, baina taldeek barruan sareak berreraikitzen saiatu ziren: PCEk, PSOE/UGTk eta CNTk propaganda, lotura-sareak eta antolaketa minimoak mantendu zituzten, nahiz eta atxiloketek eta infiltrazioek behin eta berriz kolpatu.</p>

    <h3><span class="h-num">6.4.3</span> 50eko hamarkadako oposizio sozial berria eta ETAren sorrera</h3>
    <p>1950eko hamarkadan pixkanaka garrantzia hartzen hasi zen oposizio mota bat ez zen «politiko» agertzen, baina erregimenarentzat arriskutsuago bilakatu zitekeen: <strong>oposizio soziala</strong>, lan-munduan eta unibertsitatean agertzen hasita.</p>
    <ul>
      <li><strong>1951ko Bartzelonako tranbien greba eta boikota:</strong> erregimenaren aurkako haserrea eguneroko arazoekin lotu zuen; oso adierazgarria, sindikatuak debekatuta egon arren.</li>
      <li><strong>1956ko Madrilgo ikasle-protestak:</strong> belaunaldi berri bat agertzen zen, gerra bizi ez zuena baina diktaduraren itolarria bai.</li>
      <li><strong>Elizaren barruan</strong> ere, hamarkada amaierarantz, erregimenarekiko urruntze mailak agertzen hasi ziren sektore batzuetan.</li>
    </ul>
    <p>1959an, azkenik, bi gertakari markatzen dute etapa honen amaiera: <strong>Egonkortze Plana</strong> (ekonomia aldaketa) eta <strong>ETAren sorrera</strong> — hasieran gazte giroko mugimendu gisa, hurrengo urteetan erresistentziaren mapa aldatuko duen fenomenoaren abiapuntu.</p>

- id: g6-5
  number: '6.5'
  title: 'Nazioarteko politika: isolamendutik integraziora'
  body: |-
    <p>Frankismoaren lehen etapako nazioarteko politika bi fase nagusitan azal daiteke: isolamendua (1945–1950) eta integrazio pragmatikoa (1950–1959). Bi faseen arteko aldaketa Gerra Hotzak eragin zuen.</p>

    <h3><span class="h-num">6.5.1</span> Bigarren Mundu Gerrako kokapena — Dibisio Urdina</h3>
    <p>1939an frankismoa jaio zen Alemania naziaren eta Italia faxistaren laguntza erabakigarriarekin, eta horrek nazioarteko irudia markatu zuen. II. Mundu Gerraren urteetan Franco ez zen gerran sartu formalki, baina ez zuen neutraltasun argirik: «ez-beligerante» moduko jarrera hartu eta <span class="term" data-def="Franco-k Alemaniaren alde Sobietar Batasunaren aurka borrokatzera bidalitako boluntario-unitate espainiar nazionalista. Ardatzarekiko hurbiltasunaren adierazle nagusia.">Dibisio Urdinaz</span> Ardatzarekiko hurbiltasun politikoa erakutsi zuen.</p>
    <p>Gerrak norabidea hartu ahala, erregimenak bere burua «egokitzen» hasi zen: faxismoen porrota gero eta argiagoa zenean, tonu faxistagoa apaltzen jo zuen eta <strong>nazional-katolizismoaren eta «Espainia kristaua»ren diskurtsoa</strong> indartu zuen, beste «traje» batekin aurkezteko. Hala ere, 1945ean Ardatza garaitua izan zenean, frankismoa garaile berrien begietara erregimen autoritario eta faxismoarekin lotuegia zen.</p>

    <h3><span class="h-num">6.5.2</span> 1945–1950 isolamendua</h3>
    <p>1945–1950 arteko fasea: <span class="term" data-def="1945etik aurrera frankismoak pairatu zuen bazterketa diplomatikoa eta politikoa, erregimena faxismoekin lotuegi ikusten zelako. Ondorioak: kreditu eskasiak, merkataritza zaildu eta autarkia areagotzea.">isolamendua</span>, ondorio material latzak zituena. Espainia gerraosteko Europa berreraikitzeko sare nagusietatik kanpo geratu zen:</p>
    <ul>
      <li>Harreman diplomatikoak hoztu (1946an NBEk frankismo gaitzetsi zuen eta enbaxadoreak erretiratu).</li>
      <li>Kreitu gutxiago, dibisa gutxiago, merkataritza zailagoa.</li>
      <li>Isolamenduak autarkiaren dinamika elikatu zuen, ondorioak areagotuz.</li>
    </ul>
    <p>Frankismoak barne-legitimazioa «gurutzadaren» eta garaipenaren bidez eraiki zuen bitartean, kanpoan irudi toxikoa zuen: Europako ordena berria demokraziaren eta antifaxismoaren izenean eraikitzen ari zen.</p>

    <h3><span class="h-num">6.5.3</span> 1950–1959 integrazio pragmatikoa — Gerra Hotza, 1953, NBE</h3>
    <p>1950etik aurrera egoera aldatu zen Gerra Hotzaren ondorioz. Mendebaldearen lehentasuna ez zen «faxismoaren arrastoak ezabatzea», Sobietar Batasunaren hedapena geldiaraztea baizik. Testuinguru horretan frankismoak aktibo nagusi bat zuen: <span class="term" data-def="Komunismoaren aurkako jarrera. Frankismoan, Gerra Hotzean nazioarteko balioa eman zion erregimeni; Mendebaldearentzat 'erabilgarri' bihurtu zen.">antikomunismoa</span>, eta Espainiaren kokapen geografiko estrategikoa (Atlantikoa–Mediterraneoa–Afrikako atea).</p>
    <p><strong>1953an</strong> norabide-aldaketa bi akordio handirekin finkatzen da:</p>
    <ul>
      <li><strong><span class="term" data-def="1953ko akordioa Vatikanoarekin: erregimenari nazioarteko legitimitate sinbolikoa eman zion eta nazional-katolizismoaren zutabea sendotu.">Konkordatua Vatikanoarekin</span>:</strong> legitimitate sinbolikoa eta nazional-katolizismoaren indartze.</li>
      <li><strong><span class="term" data-def="1953ko AEBekiko akordioak: Espainiak base militarrak eskaintzen ditu eta trukean laguntza ekonomikoa, militarra eta irekitze diplomatikoak jasotzen ditu.">Madrilgo Itunak AEBekin</span>:</strong> Espainiak base militarrak eskaintzen ditu; trukean laguntza ekonomikoa, militarra eta irekitze diplomatikoak.</li>
    </ul>
    <p><strong>1955ean</strong> Espainia NBEan onartua izan zen — erregimena demokrazia ez zen arren, nazioarteko sistemaren barruan onartua. <strong>1959ko Egonkoltze Plana</strong> integrazio prozesuaren emaitza eta hurrengo urtealdiko baldintza: ekonomia irekiago baterako bidea, kanpo-inbertsioa, eta 1960ko hamarkadako garapen ekonomikoaren ataria.</p>
    <div class="callout"><div class="callout-title">Ondorioa</div>1939–1959 arteko kanpo-politika isolamendutik integraziora doa, baina integrazio hori ez da erregimenaren «hobekuntza demokratikoaren» ondorio: Gerra Hotzaren logikak eta Mendebaldearen interes estrategikoek eragindako onarpen pragmatikoa da. Frankismoak antikomunismoa eta kokapen geografikoa «txanpon» gisa erabili zituen.</div>

glossary:
- term: Antikomunismoa
  def: |-
    Komunismoaren aurkako jarrera politiko eta ideologikoa. Frankismoan, Gerra Hotzean nazioarteko balioa eman zion erregimeni, Mendebaldearentzat «erabilgarri» bihurtuz.
- term: Autarkia
  def: |-
    Estatu batek kanpoarekiko mendekotasuna murriztu eta ekonomia barrurantz antolatzeko politika. Frankismoan eskasia, produktibitate baxua eta gosea luzatu zituen.
- term: Caudillismoa
  def: |-
    Botere politiko osoa buruzagi bakar baten inguruan antolatzen duen eredua. Franco «Caudillo»: Estatu buru, armadaren buru eta azken erabakitzaile; diktaduraren izaera pertsonalista adierazten du.
- term: Demokrazia organikoa
  def: |-
    Frankismoak demokrazia liberalaren ordezko gisa aurkeztu zuen eredua. Herritarrak ez ziren alderdien bidez ordezkatzen, baizik «organismo naturalen» bidez: familia, udalerria eta sindikatua. Praktikan sistema kontrolatua.
- term: Depurazioa
  def: |-
    Administraziotik, hezkuntzatik, unibertsitatetik, funtzio publikotik edo lanpostuetatik pertsona susmagarriak kanporatzeko garbiketa politikoa. Errepublikarekin, ezkerrarekin, abertzaletasunarekin edo sindikalgintzarekin lotutako milaka zigortu zituzten.
- term: Desarrollismoa
  def: |-
    1960ko hamarkadako frankismoaren politika ekonomikoa: industrializazio bizkorra, kanpo-inbertsioa, turismoa eta bizi-maila hobetzea. 1959ko Egonkortze Planaren ondoren.
- term: Dibisio Urdina
  def: |-
    Franco-k Alemaniaren alde Sobietar Batasunaren aurka borrokatzera bidalitako boluntario-unitate espainiar nazionalista (1941-1943). Ardatzarekiko hurbiltasunaren adierazle nagusia.
- term: Diktadura pertsonalista
  def: |-
    Boterea erakunde edo alderdi baten baino gehiago pertsona bakar baten inguruan antolatzen duen diktadura. Frankismoan, legeak, armada, gobernua eta instituzioak Francoren agintearen menpe zeuden.
- term: Egonkortze Plana (1959)
  def: |-
    1959ko plan ekonomikoa: gastu publikoa kontrolatu, inflazioa murriztu, kanpo-inbertsioa erraztu eta merkataritza ireki. Autarkiaren amaiera eta desarrollismoaren atea.
- term: Erantzukizun Politikoen Legea (1939)
  def: |-
    Gerra Zibilaren aurretik edo bitartean Errepublikarekin lotutako pertsonak zigortzeko legea. Isunak, ondasunen konfiskazioak, lanpostuen galerak.
- term: Erbestea
  def: |-
    Arrazoi politiko, militar edo errepresiboengatik herrialdea uztera behartuta joatea. 1939an 450.000-500.000 pertsonek erbesterako bidea hartu zuten, batez ere Frantziara eta Latinoamerikara.
- term: Errazionamendua
  def: |-
    Oinarrizko produktuen banaketa Estatuak kontrolatzeko sistema, txartelen bidez. Frankismoaren gerraostean 1952ra arte iraun zuen; gosearen, eskasiaren eta eguneroko mendekotasunaren sinbolo.
- term: Errepresioa
  def: |-
    Botere politikoak oposizioa, disidentzia edo talde susmagarriak zigortzeko erabiltzen duen indarkeria eta kontrol-mekanismoen multzoa. Lehen frankismoan sistematikoa, garaileen boterea sendotzeko eta garaituak isilarazteko.
- term: Estraperloa
  def: |-
    Merkatu beltza: errazionamenduaren eta eskasiaren testuinguruan sortutako bide ez-ofizialak, prezio altuagoetan. Desberdintasun sozialak eta klientelismoa areagotu zituen.
- term: ETA
  def: |-
    Euskadi Ta Askatasuna, 1959an sortutako erakunde abertzalea. Hasieran gazte giroko mugimendu gisa sortu zen; hurrengo urteetan frankismoaren aurkako erresistentziaren mapa aldatuko duen fenomeno garrantzitsu bihurtu zen.
- term: FET y de las JONS
  def: |-
    Frankismoaren alderdi bakarra, Falangea eta karlismoa bateratzetik sortua. Pluralismo politikoa ordezkatu eta gizartearen kontrol ideologikoa antolatzeko tresna: gazteria, emakumeak, sindikatu bertikala.
- term: Funtsezko Legeak
  def: |-
    Frankismoak konstituzio demokratikorik gabe erregimenari egitura juridiko-instituzionala emateko sortutako lege-multzoa. Lanaren Forua, Gorteak Eratzeko Legea, Espainolen Forua, Ondorengotzaren Legea, Mugimendu Nazionalaren Printzipioak.
- term: Gerra Hotza
  def: |-
    Bigarren Mundu Gerraren ondoren AEBen eta Sobietar Batasunaren arteko tentsio geopolitiko eta ideologikoaren garaia. Frankismoarentzat funtsezkoa: antikomunismoari esker nazioarteko isolamendutik ateratzeko aukera eman zuen.
- term: Gosearen urteak
  def: |-
    1940ko hamarkadako gerraosteko miseria, eskasia, elikadura urria eta biziraupen zaila izendatzeko adierazpena. Autarkiak, errazionamenduak, gerraosteko suntsipenak eta isolamenduak herritarren bizi-baldintzak gogor okertu zituzten.
- term: INI (Instituto Nacional de Industria)
  def: |-
    1941ean sortutako erakunde publikoa, Estatuaren esku-hartzea industria estrategikoan gauzatzeko: energia, siderurgia, garraioa. Emaitza mugatuak: lehia faltaz produktibitate baxua.
- term: Isolamendu internazionala
  def: |-
    1945-1950 artean frankismoak pairatu zuen bazterketa diplomatikoa eta politikoa, erregimena faxismoekin lotuegi ikusten zelako. Autarkiaren dinamika elikatu zuen.
- term: Klientelismoa
  def: |-
    Boterearekin hurbiltasuna, mesedeak, kontaktuak edo leialtasun politikoa baliatuz baliabideak lortzeko sistema informala. Gerraostean, estraperloak, baimenek eta administrazio-kontrolek klientelismoa indartu zuten.
- term: Konkordatua (1953)
  def: |-
    Vatikanoarekiko akordioa: erregimenari nazioarteko legitimitate sinbolikoa eman zion eta nazional-katolizismoaren zutabea sendotu.
- term: Madrilgo Itunak (1953)
  def: |-
    AEBekiko akordioak: Espainiak base militarrak eskaintzen ditu eta trukean laguntza ekonomikoa, militarra eta irekitze diplomatikoak jasotzen ditu.
- term: Maquis
  def: |-
    1940ko hamarkadako gerrilla antifrankista. Elikatu zuen Aliatuen garaipena ikusteak sortutako itxaropena. 1944ko Vall d'Araneko saiakera; errepresioaren ondorioz indarra galdu zuen 50eko hasieran.
- term: Mugimendu Nazionala (FET-JONS)
  def: |-
    Frankismoaren antolaketa politiko eta ideologiko osoa. Alderdi bakarra, sindikatu bertikala, propaganda eta gizartearen atxikimendu-sareak barne hartzen zituen.
- term: Nazional-katolizismoa
  def: |-
    Espainiaren identitatea katolizismoarekin lotzen duen frankismoaren ideologia nagusia. Elizak erregimenari legitimazio morala eman zion; trukean hezkuntza, moral publikoa eta gizarte-kontrola eskuratu zuen.
- term: Pseudo-konstituzionalismoa
  def: |-
    Konstituziorik gabe, baina Funtsezko Legeen bidez legitimazio juridiko-instituzionalaren itxura ematea. Frankismoak demokrazia itxura erakutsi nahi zuen, edukia gabe.
- term: Sección Femenina
  def: |-
    Mugimendu Nazionalaren adar femeninoa; emakumeen heziketa obedientzian, katolizismoan, etxeko lanetan eta amatasunaren idealizazioan oinarritzen zuena. Emakumeen autonomia juridikoa eta espazio publikoa mugatu zituen.
- term: Sindikatu Bertikala (OSE)
  def: |-
    Frankismoaren lan-antolaketa ofiziala: langileak eta enpresariak egitura berean, ustez klase-gatazka gainditzeko. Praktikan, sindikatu askatasuna ezabatu eta lan-mundua Estatuaren menpe kontrolatzeko tresna.
- term: Zentralismoa
  def: |-
    Botere politiko eta administratiboa estatu-erdigunean kontzentratzea. Frankismoak zentralismo zorrotza ezarri zuen, autonomia politikoak ezabatuz eta Euskal Herrian eta Katalunian hizkuntza, sinbolo eta identitate politikoak susmagarri bihurtuz.
