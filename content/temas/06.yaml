intro: |-
  1939ko apirilaren 1ean Gerra Zibila amaitu zenean, ez zen «normaltasuna» itzuli. Garaileek Estatu osoa bereganatu eta garaituen aurka gerra ideologiko, juridiko eta sozial bat abiatu zuten. <strong>Frankismoa</strong> ez zen «gerra ondorengo gobernu gogor» bat soilik; garaipen militarrean oinarritutako <span class="term" data-def="Boterea pertsona edo talde baten esku kontzentratzen duen sistema, askatasun politikoak eta oposizioa ezabatuz. Frankismoa pertsonalista, militarra, nazional-katolikoa, zentralista eta antikomunista izan zen.">diktadura</span> bat zen, gizartea «garbitu» eta berrantolatu nahi zuena Francoren aginte pertsonalistaren arabera.
  Gosea, eskasia, errepresioa eta beldurra ez ziren gerraren albo-ondorioak: kontrol sozialerako <strong>kontzienteki erabilitako tresnak</strong> izan ziren. Herrialdea suntsituta zegoen, eta 1940ko hamarkada «gosearen urteak» bezala gogoratu da. Aldi berean, nazioartean erregimena <span class="term" data-def="1945-1950 artean frankismoak pairatu zuen bazterketa diplomatikoa eta politikoa, faxismoekin lotuegi ikusten zelako.">isolamendua</span> jasan zuen; baina <strong>Gerra Hotzak</strong> panorama irauli zuen, antikomunismoari esker Mendebaldearentzat «erabilgarri» bihurtuz. 1959ko Egonkoltze Planak autarkiaren zikloa itxi eta hurrengo garairako atea ireki zuen.

