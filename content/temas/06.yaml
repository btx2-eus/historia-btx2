  slug: frankismoa-i
  title: 'Diktadura frankista I: Gerraostea eta autarkia'
  years: 1939 – 1959
  pdf: 06-frankismoa-i.pdf
  iturri_pdf: 06-iturri.pdf
intro: |-
  1939ko apirilaren 1ean Gerra Zibila amaitu zenean, ez zen «normaltasuna» itzuli. Garaileek Estatu osoa bereganatu eta garaituen aurka gerra ideologiko, juridiko eta sozial bat abiatu zuten. Frankismoa garaipen militarrean oinarritutako <span class="term" data-def="Boterea pertsona edo talde baten esku kontzentratzen duen sistema, askatasun politikoak eta oposizioa ezabatuz. Frankismoa pertsonalista, militarra, nazional-katolikoa, zentralista eta antikomunista izan zen.">diktadura</span> izan zen: gizartea «garbitu» eta berrantolatu nahi zuena. Gosea, eskasia, errepresioa eta beldurra ez ziren gerraren albo-ondorioak: kontrol sozialerako kontzienteki erabilitako tresnak izan ziren.
