intro: |-
  1931ko apirilaren 14an <strong>Bigarren Errepublika</strong> aldarrikatu zen, monarkiaren krisi sakonaren ondoren eta gizartearen zati handi baten itxaropen artean. Espainia modernizatzeko, demokratizatzeko eta Europako demokrazia aurreratuen eredura hurbiltzeko aukera gisa ikusi zuten askok. Errepublikak proiektu handi batekin jaio zen: sistema politikoa demokratizatzea, <span class="term" data-def="Pertsonen oinarrizko askatasunak: adierazpena, prentsa, elkarteak sortzea, erlijioa eta legearen aurreko berdintasuna.">eskubide zibilak</span> zabaltzea, hezkuntza publikoa eta laikoa indartzea, emakumeen parte-hartze politikoa aitortzea, armadaren eta Elizaren boterea mugatzea, eta lur-jabetzaren arazo historikoari aurre egitea. Horretan zegoen haren indarra, baina baita haren ahulezia ere: erreformek gizartearen oinarri sakonak ukitzen zituzten, interes handiak ere bai, eta horrek oposizio gogorra sortu zuen.
  Errepublika ez zen ideologia bakarraren emaitza izan. Batzuentzat askatasunaren, justizia sozialaren eta autonomia politikoen aukera zen; besteentzat, berriz, ordena sozialaren, erlijioaren eta Espainiaren batasunaren aurkako mehatxua. Horregatik, 1931ko hasierako ilusioa pixkanaka tentsio politiko, sozial eta ideologiko gero eta handiago bihurtu zen. Azken batean, Bigarren Errepublika Espainiako historiako esperientzia demokratiko ausartenetako bat izan zen: erreforma sakonen bidez herrialdea modernizatzen saiatu zen, baina krisi ekonomikoak, <span class="term" data-def="Gizartean jarrerak mutur kontrajarrietara urruntzeko prozesua. Ezker eta eskuinaren arteko akordioa ezinezko bihurtu zuen.">polarizazioak</span>, interes talde boteretsuen erresistentziak eta indarkeria politikoaren gorakadak demokrazia gazte hura kolokan jarri zuten. 1931tik 1936ra bitarteko aldia modernizazioaren eta gatazkaren arteko talka izan zen, eta Espainiaren etorkizun politikoa erabakiko zuen prozesu tragikoaren ataria bihurtu zen.

