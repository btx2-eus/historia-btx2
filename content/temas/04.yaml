intro: |-
  1931ko apirilaren 14an <strong>Bigarren Errepublika</strong> aldarrikatu zen, gizartearen itxaropen artean. Proiektu handi batekin jaio zen: sistema demokratizatzea, eskubide zibilak zabaltzea, hezkuntza laikoa indartzea, emakumeen botoa aitortzea, armada eta Eliza mugatzea, eta lur-jabetzaren arazoari aurre egitea. Hori zen haren indarra, baina baita ahulezia ere: <span class="term" data-def="Sistema politiko, sozial edo ekonomikoa legearen bidez aldatzeko prozesua.">erreformek</span> interes sakonak ukitzen zituzten, eta oposizio gogorra sortu zuten. 1931–1936 modernizazioaren eta gatazkaren arteko talka izan zen.
