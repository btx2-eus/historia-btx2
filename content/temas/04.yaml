sections:
- id: g4-1
  number: '4.1'
  title: Monarkiaren behin betiko krisia
  body: |-
    <p>XX. mendearen lehen hamarkadan Espainiako <span class="term" data-def="Estatua errege batek zuzentzen duen sistema politikoa, non boterea oinordetza bidez transmititzen den.">monarkia</span> liberalak, Alfonso XIII.a buru zuela, haustura sozial eta politiko sakon bati egin behar izan zion aurre. 1898ko Porrotaren ondoren modernizazio-nahia piztu zen arren, sistema politikoaren ustelkeriak eta bipartidismo itxiak eragotzi zuten benetako erreforma. <strong>1929ko krisi ekonomikoa</strong>ren eta diktaduraren porrotaren ondoren, oposizioa helburu komun batean bildu zen: errepublika demokratiko bat ezartzea.</p>

    <h3><span class="h-num">4.1.1</span> Primo de Riveraren diktadura eta bere porrota (1923–1930)</h3>
    <p>1923an, testuinguru horretan, <strong>Miguel Primo de Riverak estatu kolpea</strong> eman zuen, Alfonso XIII.aren onespenarekin. <span class="term" data-def="Armadaren buruzagi batek botere politikoa hartzen duen erregimena, legea alde batera utzita. Espainian 1923-1930 artean iraun zuen.">Diktadura</span> hark ordena eta egonkortasuna ekartzea agindu zuen, baina bere oinarriak ahulak ziren: militarismoa, autoritarismoa eta zentralismoa, garai berrietako behar sozial eta ekonomikoen aurrean guztiz zaharkituak.</p>
    <ul>
      <li><strong>Ezaugarriak:</strong> Konstituzioaren etete, alderdi politikoen debekua, prentsa zentsura eta erregio autonomien murrizketa.</li>
      <li><strong>Porrotaren arrazoiak:</strong> 1929ko Depresio Handiaren ondorioak Espainian ere nabari ziren; ekonomia ahuldu, langabezia hazi eta diktaduraren aurkako gizarte-mobilizazioa areagotu zen. 1930ean Primo de Riverak dimititu zuen, osasun txarraz eta oinarri politikorik gabe.</li>
      <li><strong>Alfonso XIII.aren erantzukizuna:</strong> Erregeak diktadura onartu zuelako, erregimenarekiko lotura egin zuen eta gero eta sektore gehiagok ikusten zuten erregearen eta sistema autoritarioaren arteko lotura estua.</li>
    </ul>
    <p>Primo de Riveraren ondoren, <em>Dictablanda</em> izeneko gobernu ahulak (Berenguer, Aznar) ez zuten egoera bideratzea lortu. Denbora irabazten ahalegindu ziren, baina jada ez zeuden monarkiaren salbaziorako baldintzak.</p>

    <h3><span class="h-num">4.1.2</span> Donostiako Ituna (1930): oposizioa biltzen</h3>
    <p>Primo de Riveraren diktadura porrot eginda, Espainiako oposizio politikoak lehen aldiz helburu komun baten inguruan elkartu zen: monarkia amaitzea eta erregimen demokratiko berri bat ezartzea. <strong>1930eko abuztuaren 17an, Donostian</strong> bildu ziren oposizioko indar nagusiak:</p>
    <ul>
      <li><strong>Errepublikanoak:</strong> Niceto Alcalá-Zamora, Miguel Maura eta Alejandro Lerroux.</li>
      <li><strong>Sozialistak:</strong> Indalecio Prieto eta Fernando de los Ríos (PSOE eta UGTren ordezkari gisa).</li>
      <li><strong>Kataluniako ezker nazionalistak:</strong> Lluís Companys eta Manuel Carrasco i Formiguera, autonomia aldarrikapenaren ikuspegitik.</li>
    </ul>
    <p>Itunaren bidez «Errepublika Aldarrikatzeko Batzordea» sortu zuten, gerora II. Errepublikako lehen gobernuaren oinarria izango zena. Haien helburua ez zen iraultza soziala, erregimen politikoaren aldaketa baketsu baina guztizkoa baizik: monarkia liberal zaharkituaren ordez <span class="term" data-def="Estatu-forma non estatuburua ez den erregea eta boterea ez den oinordetzaz transmititzen. Espainian bi alditan ezarri zen: 1873-74 (I.) eta 1931-39 (II.).">errepublika demokratiko eta aurrerakoia</span> ezartzea.</p>
    <p>Itunaren edukia: monarkiaren amaiera adostea; errepublika konstituzional baten oinarriak prestatzea (askatasun publikoetan, hezkuntzan eta gizarte-erreformetan oinarritua); eta autonomien auzia aintzat hartzea, bereziki Kataluniaren kasuan, Espainiako batasun demokratikoaren barruan.</p>
    <p>Itunaren ondoren, 1930eko abenduan <strong>Jaca-ko altxamendu errepublikarra</strong> piztu zen —porrot egin bazuen ere, sinbolikoki indartsua izan zen—, eta herriaren aldaketa-nahia gero eta nabariagoa bihurtu zen.</p>

    <h3><span class="h-num">4.1.3</span> 1931ko udal hauteskundeak eta Errepublikaren aldarrikapena</h3>
    <p><strong>1931ko apirilaren 12ko udal hauteskundeek</strong> herriaren benetako aldaketa-nahia gorpuztu zuten: errepublikanoek garaipen argia lortu zuten hiri nagusienetan. Hauteskundeetako emaitzak ikusi eta Alfonso XIII.ak erbestea aukeratu zuen.</p>
    <div class="callout"><div class="callout-title">1931ko apirilak 14</div>Errepublika aldarrikatu zen, eta Donostiako Ituneko sinatzaileek hartu zuten boterea: Alcalá-Zamora presidente gisa, eta beste askok lehen gobernu errepublikarra osatuz. Monarkiaren krisi moral eta politikoaren ondorioz, Espainiako historian etapa berri bat ireki zen, modernizazioaren eta demokraziaren aldeko esperantzen sinbolo.</div>
    <p>Primo de Riveraren diktadurak monarkiari azken arnasa eman zion, eta, paradoxikoki, hura salbatzeko asmatutako erregimenak erregea bera hondoratu zuen.</p>

- id: g4-2
  number: '4.2'
  title: Biurteko errepublikar-sozialista (1931–1933)
  body: |-
    <p>1931ko apirilaren 14an, udal hauteskundeetako emaitzen ondorioz eta monarkiaren erorketaren ondoren, <span class="term" data-def="Konstituzioa idatzi arte zuzendu zuen trantsizioko gobernua. Donostiako Ituneko sinatzaileek osatu zuten.">Behin-behineko Gobernu Errepublikarra</span> eratu zen. Gobernu hura Donostiako Itunaren sinatzaileek osatu zuten: errepublikano aurrerakoi zein kontserbadoreak, sozialistak eta nazionalista katalanak. Bere lehen zeregina hauteskunde konstituziogileak antolatzea eta oinarrizko erreformak abian jartzea izan zen.</p>

    <h3><span class="h-num">4.2.1</span> Behin-behineko Gobernuaren lehen neurriak</h3>
    <p>Gobernuak sinbolo monarkikoak ordezkatu zituen (bandera eta ereserkia aldatu) eta askatasun zibilak berrezarri: adierazpen, elkarte eta prentsa askatasuna. Aldi berean, udal autonomiak berreskuratu ziren eta amnestia politikoa eman zen Primo de Riveraren diktadurako presoentzat. Hezkuntzan lehen neurriak hartu ziren: eskola laikoaren oinarriak ezarri eta irakasleen prestakuntza publikoan inbertitzen hasi ziren. 1931ko ekainean egin ziren hauteskundeetan errepublikano-sozialisten koalizioak irabazi zuen eta Konstituzio berria idazteko bideari ekin zion.</p>

    <h3><span class="h-num">4.2.2</span> Manuel Azañaren erreforma programaren ardatzak</h3>
    <p><strong>Manuel Azaña</strong> buru, gobernuak gizartearen oinarrizko egiturak berritzeko erreforma multzo zabala jarri zuen martxan. Bost ardatz nagusitan labur daiteke:</p>
    <ul>
      <li><strong>1. <span class="term" data-def="Lur-jabetzaren banaketa aldatzeko politika. Latifundioak mugatu eta nekazariei lurra ematea. Aplikazioa motela eta mugatua izan zen, desilusioa eraginez.">Erreforma agrarioa</span>:</strong> Andaluziako eta Extremadurako nekazaritza arazoa konpontzeko, 1932ko Lur Erreformaren Legeak jabetza handiak desjabetzeko eta nekazariei banatzeko idatzi zen. Burokrazia, baliabide eskasia eta lur-jabeen erresistentzia zirela eta, aplikazioa oso motela eta mugatua izan zen. Desilusioa eta tentsioa handiak eragin zituen gobernuaren aurka.</li>
      <li><strong>2. Erreforma militarra:</strong> Azañak armada murriztu, ofizialen soberakina kendu eta militarrek Errepublikarekiko leialtasun zin egitea eskatu zuen. <span class="term" data-def="Espainiako armadako goi-mailako hezkuntzarako erakundea. Azañak 1931n itxi zuen, militarren haserrea piztuz.">Akademia Militar Nagusia</span> itxi zuen (Franco bertako zuzendaria zen) eta armada zibilen menpe jarri. Neurri horiek militar kontserbadoreen haserrea piztu zuten.</li>
      <li><strong>3. Hezkuntza erreforma:</strong> Hezkuntza Errepublikaren oinarri nagusietakoa izan zen. Bi urtetan <strong>13.000 eskola publiko</strong> ireki ziren eta irakasleen prestakuntza hobetu. <span class="term" data-def="Estatuak erlijio jakin batekin identifikatu behar ez duela dioen printzipioa. Hezkuntza erlijioaren kontrolpetik ateraz.">Eskola laiko, doako eta unibertsal</span> bat sortu nahi zen. Horrek, ordea, Elizaren aurkako tentsio ideologikoak areagotu zituen.</li>
      <li><strong>4. Gizarte- eta lan-erreformak:</strong> Lan baldintzak hobetu, lanaldiak mugatu eta langileen eskubideak indartu ziren. UGTk gobernuan eragina izan zuen, baina CNT anarkistaren oposizio erradikala gero eta handiagoa zen.</li>
      <li><strong>5. Elizaren eta Estatuaren gatazka:</strong> Eliza eta Estatuaren bereizketak Elizaren kontrako jarrera gisa ikusi zuen hierarkia Katolikoak. 1931 eta 1932an eliza eta komentuen aurkako indarkeria zabaldu egin zen, eta ezinbestean, zatiketa ideologikoa areagotu zuen. 1932an, <strong>Kataluniako Estatutua</strong> onartu zen, autonomia politikoaren esparruari ere heldu zitzaiolarik.</li>
    </ul>

    <h3><span class="h-num">4.2.3</span> Porrotaren arrazoiak eta 1933ko hauteskundeak</h3>
    <p>Gobernuak bi urtez iraun bazuen ere eta erreforma ugari martxan jarri bazituen ere, ez zen gai izan ordena eta oreka mantentzeko. Arrazoi nagusiak:</p>
    <ul>
      <li><strong>Erresistentzia handiak:</strong> Lur-jabe handiek, Elizak, militar kontserbadoreek eta eskuineko alderdi berriek (CEDA, 1933an sortua) erabateko oposizioa egin zioten erreforma programari.</li>
      <li><strong>Ezkerraren zatiketa:</strong> Sozialistek eta errepublikanoek erreforma erritmoari buruzko desadostasunak zituzten; ezker erradikalak (CNT, FAI) gobernua «burgesa» zela salatu zuen.</li>
      <li><strong>Krisi ekonomikoaren testuingurua:</strong> 1929ko <span class="term" data-def="1929an Wall Streeten hasitako krisi ekonomiko mundiala, langabezia eta miseria zabaldu zituena. Espainian ere eragin zuen, nekazari eta langileen egoera okertuz.">Depresio Handiaren</span> ondorioak nabarmen zeuden; nekazarien eta langileen egoera ez zen aski hobetu eta hasierako itxaropenaren kontraste handiak desilusioa zabaldu zuen.</li>
      <li><strong>Gatazka sozial eta politikoen gorakada:</strong> grebak, lurren okupazioak eta matxinadak ugaritu ziren, bereziki 1933ko urtarrilean, <strong>Casas Viejas</strong>-eko gertakari tragikoan. Cádizko herri hartan nekazari anarkistek lurren banaketa eskatu zuten; Guardia Zibilak errepresio bortitza erabili zuen, dozenaka herritar hilez. Sarraskiak eta barne-zatiketak Azañaren dimisioa ekarri zuen.</li>
      <li><strong>Polarizazio ideologikoa:</strong> Ezker eta eskuinaren arteko elkarrizketa ia ezinezkoa bihurtu zen; Errepublikaren aldeko hasierako batasun hura apurtu zen.</li>
    </ul>
    <p>1933ko <strong>azaroko hauteskundeetan</strong> —emakumeek lehen aldiz bozkatu zuten—, eskuineko indarrek (CEDA, Gil-Robles buru) eta Alderdi Erradikalak (Lerroux) garaipen argia lortu zuten. Horrela amaitu zen biurteko errepublikar-sozialista, eta biurteko kontrarreformatzailea hasi.</p>

- id: g4-3
  number: '4.3'
  title: 1931ko Konstituzioa
  body: |-
    <p>1931ko ekaineko hauteskunde konstituziogileetan errepublikanoek eta sozialistek gehiengo handia lortu zuten. <span class="term" data-def="Konstituzio berri bat idazteko bereziki hautatutako biltzarra. 1931an eratu zen, Manuel Azaña eta Niceto Alcalá-Zamora buru.">Asanblada Konstituziogilea</span> eratu zen eta <strong>1931ko abenduaren 9an</strong> Espainiako historiako lehen Konstituzio demokratiko eta laikoa onartu zen. Helburua Espainia Estatu moderno, demokratiko eta sozial bihurtuko zuen legea idaztea zen, Antzinako Erregimenaren hondar instituzionalak gaindituz.</p>

    <h3><span class="h-num">4.3.1</span> Oinarrizko ezaugarriak</h3>
    <p>1931ko Konstituzioa Espainiako historiako testu demokratiko, sozial eta laiko aurrerakoienetakoa izan zen. Sei ardatz nagusitan laburbildu daiteke:</p>
    <ul>
      <li><strong>1. Errepublika demokratikoa eta parlamentarioa:</strong> Espainia «lanaren eta justizia sozialaren Errepublika» zela aldarrikatzen zuen; <span class="term" data-def="Botere politikoaren azken iturria herritarren borondatea dela dioen printzipioa. Erregearen edo Jainkoaren eskutik ez, herriaren borondatetik datorren zilegitasuna.">subiranotasuna</span> herriarengan jarrita. Gobernua Gorteen aurrean arduraduna zen eta presidentea Asanbladak hautatzen zuen.</li>
      <li><strong>2. Botereen banaketa eta ordezkaritza:</strong> Legebiltzarra ganbera bakarrekoa zen (Gorteak), herritar guztien boto bidez aukeratua. Botere judiziala independentea zen.</li>
      <li><strong>3. Eskubide eta askatasun zabalak:</strong> adierazpen, prentsa, elkarte eta erlijio askatasuna; gizonen eta emakumeen berdintasuna legearen aurrean; <span class="term" data-def="Herritar heldu guztiek botoa ematea. Emakumeen botoa 1931an onartu eta 1933an aplikatu zen lehen aldiz.">sufragio unibertsala</span> emakumeentzat ere; lanerako, hezkuntzarako eta pentsio duinerako eskubide sozialak.</li>
      <li><strong>4. Estatu laikoa:</strong> Eliza eta Estatuaren arteko banaketa ezarri zen eta jesuiten ordena desegin. Erlijio-irakaskuntza ez zen derrigorrezkoa izan eta estatuko eskolak laiko eta publikoak izatera pasatu ziren.</li>
      <li><strong>5. <span class="term" data-def="Botere politiko eta administratiboaren zati bat estatu zentraletik lurralde-erakundeetara eramatea. II. Errepublikan berrikuntza handia izan zen.">Deszentralizazioa</span> eta autonomien aitorpena:</strong> Estatuak «probintzia autonomoen» eraketa onartu zuen. Kataluniak 1932an lehen Estatutua lortu zuen; Euskal Herriak prozesu bat hasi zuen (nahiz eta 1936ra arte ez zen onartu).</li>
      <li><strong>6. Erreforma sozial eta ekonomikoak sustatzeko bidea:</strong> Konstituzioak aukera eman zuen lurren desjabetzerako eta ekonomian estatuaren esku-hartzerako «interes orokorrak hala eskatzen bazuen».</li>
    </ul>

    <h3><span class="h-num">4.3.2</span> Zergatik ez zuen adostasun nahikorik sortu?</h3>
    <p>Konstituzioa aurrerakoia zen, baina justu horrexegatik sektore handi batek mehatxutzat hartu zuen. Bost oposizio-iturri nagusi bereizi daitezke:</p>
    <ul>
      <li><strong>Eliza eta sektore katolikoen oposizioa:</strong> Elizaren eta Estatuaren arteko banaketa eta jesuiten ordena debekatzea «Jainkoaren aurkako legearen» seinale gisa aurkeztu zituzten. Pio XI.a bera agertu zen Errepublikaren aurka, eta prentsa katolikoak diskurtso antierrepublikarra zabaldu zuen. CEDAren sorreran zuzenean islatu zen erreakzio hau.</li>
      <li><strong>Monarkiko eta eskuin tradizionalistaren oposizioa:</strong> Errepublika eta Konstituzioa monarkiaren erorketaren sinbolo ziren. Monarkiko kontserbadoreek eta karlistek erregimena legez kanpokoa zela aldarrikatu zuten. <strong>1932ko Sanjurjada</strong> —Guardia Zibilaren generalaren kolpe-saiakera— etorkizuneko altxamenduaren aurrekaria izan zen; porrot egin bazuen ere, 1936ko kolperako bidea ireki zuen.</li>
      <li><strong>Elite ekonomikoen oposizioa:</strong> Lur-jabe handiak, enpresaburua eta industrialariak beldur ziren erreforma agrariotik eta estatuaren esku-hartze handiagoaren ondorioetatik. Kapitalaren ihesa eta inbertsioen paralizazioa gertatu ziren zenbait eremutan; klase altuen babesa Errepublikatik CEDArantz desplazatu zen.</li>
      <li><strong>Ezker muturraren eta anarkisten oposizioa:</strong> CNT eta FAI erakundeek Konstituzioa «burgesa» eta «itzurikeriazkoa» zela salatu zuten: uste zuten erreformak goitik zetozela, ez herritik, eta sistema kapitalista ez zela desegin. Greba orokorrak eta matxinadak sustatu zituzten.</li>
      <li><strong>Armadaren eta militar kontserbadoreen jarrera:</strong> Azañaren erreforma militarrak oso gaizki hartu zituzten ofizial askok. Milita askok ikusten zuten Konstituzioa «Espainia zatitzen» ari zela (autonomia eta sekularizazioaren bidez). Ofizial askok (Mola, Franco, Sanjurjo, Queipo de Llano…) jada garai hartan konfiantza galdua zuten sistema errepublikarrean.</li>
    </ul>
    <div class="callout"><div class="callout-title">Ondorioa</div>1931ko Konstituzioak ez zuen huts egin bere edukiagatik —demokratikoa eta aurrerakoia zen—, baizik eta gizartean ez zuelako adostasun nahikorik sortu. Eskuinak mehatxutzat hartu zuen; ezker erradikalak «gutxiegi» zela pentsatu zuen. Inor guztiz konbentzitu gabe, demokraziaren oinarriak ahuldu eta Errepublikaren egonkortasuna kolokan jarri zituen.</div>

- id: g4-4
  number: '4.4'
  title: Biurteko erradikal-cedista (1933–1936)
  body: |-
    <p>1933rako, Azañaren gobernua krisian zegoen: erreformek ez zuten espero zen emaitzarik eman, Casas Viejas-eko sarraskiak iritzi publikoa bere aurka jarri eta gizartea gero eta zatituago zegoen. Giro horretan, hauteskunde berriek boterea eskuinaren esku utzi zuten.</p>

    <h3><span class="h-num">4.4.1</span> 1933ko hauteskundeak eta botere aldaketa</h3>
    <p>1933ko hauteskunde orokorrak Espainiako historian lehen aldiz emakumeek bozkatu zuten hautak izan ziren, eta emaitzak guztiz irauli ziren. <span class="term" data-def="Confederación Española de Derechas Autónomas. José María Gil Roblesek zuzendutako eskuin katoliko nagusia 1933tik aurrera.">CEDA</span>k eta Alderdi Erradikalak (Alejandro Lerroux) garaipen argia lortu zuten; ezkerrak porrot sakona jasan zuen, nekazarien desilusioa, ezkerraren zatiketa eta CNTren abstentzioa zirela eta.</p>
    <p>Alcalá-Zamorak ez zion CEDAri gobernua zuzenean osatzeko aukera eman nahi, ezkerraren erreakzioa eta CEDAren errepublikarekiko anbiguotasuna zirela eta. Horregatik, <strong>Lerrouxen Alderdi Erradikalari</strong> eman zion gobernua osatzeko ardura. CEDAk ez zuen hasieran zuzenean ministeriorik hartu, baina 1934ko urrian sartu zen gobernuan, eta horrek krisi politiko larriak piztu zituen.</p>

    <h3><span class="h-num">4.4.2</span> Politika kontrarreformatzaileak</h3>
    <p><span class="term" data-def="Aurretik egindako erreformak geldiarazi, mugatu edo desegiteko politika. 1933tik aurrera, lehen biurtekoko erreformak eten ziren.">Kontrarreforma</span> hiru ardatz nagusitan islatu zen:</p>
    <ul>
      <li><strong>Erreforma agrarioaren geldiarazte:</strong> Lurren banaketa prozesua guztiz gelditu zen eta desjabetutako lurrak jabetza pribatura itzuli ziren. Lur-jabe handiek berriro hartu zuten kontrol ekonomiko eta politikoa; nekazarien artean sumindura eta frustrazioa handitu ziren.</li>
      <li><strong>Armada eta Elizaren posizioaren berreskurapena:</strong> Azañaren erreforma militarrak bertan behera utzi zituzten eta militar kontserbadoreei berriro protagonismoa eman. Gobernuak Elizari eskubideak itzuli zizkion: ikastetxe erlijiosoak berriro ireki ziren, erlijio-irakaskuntza hezkuntza publikoan zabaldu eta eskola publiko laikoaren eredua ahuldu egin zen.</li>
      <li><strong>Hezkuntza eta gizarte-politiken atzerakada:</strong> Eskola publikoen hedapena eten eta aurrekontu publikoak murriztu ziren. Lan arloan, sindikatuen eragina desagertu zen administraziotik eta gobernuak jarrera gogorra hartu zuen langile mugimenduen aurrean. CNTren eta UGTren grebak errepresioz zapaldu ziren.</li>
    </ul>

    <h3><span class="h-num">4.4.3</span> Urriko Iraultza, korrupzioa eta Fronte Popularraren garaipena</h3>
    <p>Eskuineko gobernuaren politikek ezkerraren eta langile klasearen mobilizazio orokorra eragin zuten. Tentsioa areagotu egin zen <strong>1934ko urrian CEDAren ministroak</strong> sartu zirenean. Sozialistek uste zuten horrek Errepublikaren izaera demokratikoa arriskuan jartzen zuela, eta <span class="term" data-def="1934ko urrian eskuineko politiken aurkako altxamendua. Asturiasen meatzariek gobernuaren aurkako iraultza sozialista antolatu zuten; gogor zapaldua.">Urriko Iraultza</span> deitu zuten:</p>
    <ul>
      <li><strong>Asturias:</strong> Meatzariek eta langileek lurralde osoa hartu zuten bi astez, sozialisten eta anarkisten batasunean. Gobernuak armada bidali zuen, <strong>Francisco Franco</strong> buru, eta milaka hildako eta preso izan ziren (~1.500 hildako, milaka atxilotu).</li>
      <li><strong>Katalunia:</strong> Lluís Companysek «Kataluniako Estatua» aldarrikatu zuen «Errepublika Federalaren barruan», baina berehala zapaldua izan zen; Generalitatea desegin eta buruzagiak atxilotu zituzten.</li>
    </ul>
    <p>1935ean, gobernuak gero eta prestigio gutxiago zuen bi ustelkeria-gertakizun direla eta. <strong>Estraperlo</strong> aferak joko-makinen lizentzia baten inguruko iruzur eta komisio sare bat agerian utzi zuen, Lerrouxen inguruko politikariei lotuta. <strong>Nombela</strong> aferak kontratu publikoetan eta diru publikoaren kudeaketan egindako ustelkeriak azaleratu zituen. Bi eskandalu horiek gobernuaren irudia guztiz hondoratu zuten; Alcalá-Zamorak Gorteak desegin eta <strong>1936ko otsailean hauteskunde berriak deitu zituen</strong>. Fronte Popularrak (sozialistak, errepublikanoak eta komunistak) garaipena lortu zuen.</p>

- id: g4-5
  number: '4.5'
  title: Fronte Popularraren etapa (1936)
  body: |-
    <p>Lerrouxen gobernua hondoratu ondoren, <strong>1936ko otsaileko hauteskundeetan</strong> Espainia une hartan gizarte zatiketaren eta tentsioaren muturrean zegoen: bi urteko politika atzerakoiaren ondoren, ezkerreko indarrek berriro erreformen bidea ireki nahi zuten; eskuinekoek, berriz, «kaosaren» eta «boltxebismoaren» aurka mobilizatzen zuten.</p>

    <h3><span class="h-num">4.5.1</span> Fronte Popularraren koalizioa eta programa</h3>
    <p>Ezkerrak <span class="term" data-def="1936ko hauteskundeetarako ezkerreko koalizio zabala: errepublikano aurrerakoiak, sozialistak, komunistak eta ezker nazionalistak. Otsailaren 16an garaipena lortu zuen.">Fronte Popularra</span> izeneko koalizio zabala osatu zuen:</p>
    <ul>
      <li>Errepublikano aurrerakoiak (Azaña, Casares Quiroga)</li>
      <li>Sozialistak (PSOE eta UGT)</li>
      <li>Alderdi Komunista</li>
      <li>Ezker nazionalistak: EAE-ANV Euskadin eta ERC Katalunian</li>
    </ul>
    <p>Haien programa: 1931ko Konstituzioaren printzipioak berreskuratzea; 1934ko matxinadako preso politikoak askatzea; eta erreforma sozialak eta autonomia-estatutuak berraktibatzea. <strong>Otsailaren 16ko hauteskundeetan</strong> Fronte Popularrak garaipena lortu zuen, botoen %48 inguru eskuratuz. Eskuina ez zen porrota onartzera iritsi, eta lehen unetik bertatik hasi zen hauteskundeak iruzurtzat aurkezten.</p>

    <h3><span class="h-num">4.5.2</span> Gobernua, tentsio soziala eta indarkeria politikoa</h3>
    <p>Gobernu berriak moderazioaren eta legezkotasunaren aldeko jarrera erakutsi nahi izan zuen: preso politiko guztiak amnistiatu zituen, Kataluniako Generalitatea berrezarri zen eta Euskal Estatutua berriro eztabaidatzen hasi ziren. Baina ezkerreko sektore erradikalek lurren okupazioak eta grebak hasi zituzten bere kabuz, eta lur-jabe eta industrialari handiek presio ekonomiko eta boikot soziala egin zuten gobernua ahultzeko asmoz.</p>
    <p>1936ko udaberrian, Espainia <span class="term" data-def="Helburu politikoak lortzeko erabiltzen den indarkeria: kale-borroka, atentatuak, errepresioa. 1936ko udaberrian eguneroko bihurtu zen.">indarkeria politikoaren</span> eszenatoki bihurtu zen. Bi aldeen artean tiroketa, atentatu eta hilketa politikoak ugaritu ziren:</p>
    <ul>
      <li><strong><span class="term" data-def="José Antonio Primo de Riverak 1933an sortutako alderdi faxista. Kale-borroka antolatu zuen, faxismoaren ideietan inspiratuta.">Falange Española</span></strong> (José Antonio Primo de Rivera buru) kale-borroka antolatzen hasi zen faxismoaren ideietan inspiratuta.</li>
      <li>Ezkerreko milizia eta sindikatu batzuek (bereziki CNTkoek) erantzun bortitzak eman zituzten.</li>
    </ul>
    <p>Hilketek eta atentatuek eguneroko normaltasuna hautsi zuten; herritarren artean segurtasunik eza eta beldurra nagusitu zen. Tentsio horren ondorioz, eskuinak gobernua «anarkian hondoratzen» ari zela zabaldu zuen eta militarrek konspirazioa areagotu zuten.</p>

    <h3><span class="h-num">4.5.3</span> Konspirazio militarra eta 1936ko uztaileko estatu-kolpea</h3>
    <p>Eskuina ez zen berriro hauteskunde bidez boterea eskuratzeko gai izango zela sinesten. Armadan, ofizial kontserbadore eta monarkiko asko batzen hasi ziren sekretupean:</p>
    <ul>
      <li><strong>Emilio Mola</strong> izan zen kolpearen koordinatzaile nagusia Nafarroatik.</li>
      <li><strong>Francisco Franco</strong>, orduan Kanarietan zegoena, Afrikako armadaren agintepean zegoen.</li>
      <li><strong>Queipo de Llano</strong> Andaluziako militar garrantzitsuenetako bat zen.</li>
    </ul>
    <p><strong>1936ko uztailaren 13an</strong>, eskuineko buruzagi karismatikoa <strong>José Calvo Sotelo</strong> Guardia de Asaltoko kide batzuek hil zuten, aurreko egunean hildako ezkerreko ofizialaren mendekuz. Hilketak shock kolektiboa eragin zuen: eskuinak Errepublikaren legezko izaera zalantzan jarri eta militarrek kolpearen azken prestaketak azkartu zituzten.</p>
    <p><strong>1936ko uztailaren 17an</strong>, Afrikako armada Melillan eta Ceutan matxinatu zen, eta hurrengo egunetan altxamendua penintsulara hedatu zen. Kolpeak ez zuen berehala arrakasta osoa lortu, gobernuaren aldeko zati handi batek eta herri-miliziek erantzun egin ziotelako. Horrela, Espainia bi zatitan banatu zen eta <strong>Gerra Zibila hasi zen</strong>.</p>
    <div class="callout"><div class="callout-title">Balorazio orokorra</div>Fronte Popularraren garaia Errepublikaren azken aukera demokratikoa izan zen. Ezkerraren asmoa zen gizartea berriro demokratizatu eta erreformak bakean burutzea, baina tentsio politiko, sozial eta ideologiko gehiegikoa zegoen. Errepublikaren amaiera ez zen prozesu natural baten ondorio hutsa: armadaren sektore batek, eskuin antierrepublikarraren babesarekin, legezko gobernuaren aurkako estatu-kolpea abiarazi zuen. 1936ko uztaila bihurtu zen demokraziaren eta autoritarismoaren arteko talkaren ataria; hortik aurrera Espainiak bide tragiko batean sartu zen: 3 urteko Gerra Zibila (1936–39) eta ondoren ia 40 urteko diktadura.</div>

glossary:
- term: Antiklerikalismoa
  def: |-
    Elizaren botere politiko, sozial edo ekonomikoaren aurkako jarrera. II. Errepublikan indar handia izan zuen ezker errepublikanoan, sozialismoan eta anarkismoan.
- term: Autonomia
  def: |-
    Lurralde batek estatuaren barruan bere erakunde propioak eta autogobernu maila bat izatea. 1931ko Konstituzioak autonomia-estatutuak ahalbidetu zituen: Kataluniakoa 1932an eta Euskal Herrikoa 1936an.
- term: Behin-behineko Gobernua
  def: |-
    Konstituzioa idatzi arte zuzendu zuen trantsizioko gobernua. Donostiako Ituneko sinatzaileek osatu zuten 1931ko apirilean.
- term: CEDA
  def: |-
    Confederación Española de Derechas Autónomas (Gil-Robles). Eskuin katoliko nagusia 1933tik. Errepublikarekiko anbiguotasun nabaria zuen.
- term: Demokrazia
  def: |-
    Herritarren parte-hartze politikoan, hauteskunde libreetan, eskubide zibil eta politikoetan eta boterearen kontrol instituzionalean oinarritzen den sistema politikoa. II. Errepublika Espainiako lehen esperientzia demokratiko modernoetako bat izan zen.
- term: Depresio Handia
  def: |-
    1929an Wall Streeten hasitako krisi ekonomiko mundiala. Langabezia eta miseria zabaldu zituen Europan eta Espainian ere eragin handia izan zuen, nekazari eta langileen egoera okertuz.
- term: Deszentralizazioa
  def: |-
    Botere politiko eta administratiboaren zati bat estatu zentraletik lurralde-erakundeetara eramatea. II. Errepublikan berrikuntza handia izan zen Espainiako tradizio zentralistaren aurrean.
- term: Diktadura
  def: |-
    Armadaren buruzagi batek botere politikoa hartzen duen erregimena, legea alde batera utzita. Primo de Riveraren diktadura 1923-1930 artean iraun zuen.
- term: Donostiako Ituna
  def: |-
    1930eko abuztuan sinatu zen oposizio errepublikano, sozialista eta katalanistaren akordioa monarkia amaitu eta Errepublika ezartzeko.
- term: Erradikalizazioa
  def: |-
    Jarrera politikoak muturrera eramateko prozesua. Ezker iraultzailean grebak eta matxinadak, eta eskuin antierrepublikanoan konspirazio militarra eta autoritarismoaren aldeko diskurtsoak.
- term: Erreforma agrarioa
  def: |-
    Lur-jabetzaren banaketa aldatzeko politika: latifundioak mugatu eta nekazariei lurra ematea. II. Errepublikan funtsezko erreforma izan zen, baina aplikazioa motela eta mugatua.
- term: Erreformismoa
  def: |-
    Aldaketa sozial eta politikoak erakunde demokratikoen eta legeen bidez egitearen aldeko jarrera. Lehen biurteko errepublikano-sozialista erreformismoaren adibide argia.
- term: Errepublika
  def: |-
    Estatu-forma bat non estatuburua ez den erregea eta boterea ez den oinordetzaz transmititzen. II. Errepublikan sistema politiko demokratikoagoa eraiki nahi izan zen.
- term: Eskubide sozialak
  def: |-
    Pertsonen bizi-baldintza duinak bermatzera bideratutako eskubideak: lana, hezkuntza, babes soziala, pentsioak. II. Errepublikak erreformak bultzatu zituen arlo hauetan.
- term: Eskubide zibilak
  def: |-
    Pertsonen oinarrizko askatasunak: adierazpen askatasuna, prentsa askatasuna, elkarteak sortzeko eskubidea, erlijio askatasuna eta legearen aurreko berdintasuna.
- term: Estatu-kolpea
  def: |-
    Boterea legez kanpo eta indarrez eskuratzeko saiakera, normalean armadaren parte-hartzearekin. 1936ko uztaileko altxamendua legezko gobernuaren aurkakoa.
- term: Falange Española
  def: |-
    José Antonio Primo de Riverak 1933an sortutako alderdi faxista. Kale-borroka antolatu zuen eta autoritarismoa aldarrikatu zuen.
- term: Fronte Popularra
  def: |-
    1936ko ezkerreko koalizio zabala: errepublikano aurrerakoiak, sozialistak, komunistak eta ezker nazionalistak. Otsailaren 16an garaipena lortu zuen.
- term: Indarkeria politikoa
  def: |-
    Helburu politikoak lortzeko edo aurkaria beldurtzeko erabiltzen den indarkeria. II. Errepublikaren azken urteetan kale-borroka, atentatuak, greba bortitzak eta konspirazio militarra ugaritu ziren.
- term: Konstituzioa (1931)
  def: |-
    Estatuaren oinarrizko legea; demokratiko, sozial eta laikoa. II. Errepublikaren oinarri juridiko-politikoa, 1931ko abenduaren 9an onartua.
- term: Kontrarreforma
  def: |-
    Aurretik egindako erreforma politiko edo sozialak geldiarazi, mugatu edo desegiteko politika. 1933tik aurrera, biurteko erradikal-cedistan, lehen biurteko erreformak eten edo atzeratu ziren.
- term: Laikotasuna
  def: |-
    Estatuak erlijio jakin batekin identifikatu behar ez duela dioen printzipioa. II. Errepublikan, Eliza eta Estatua bereizi nahi izan ziren eta hezkuntza erlijioaren kontrolpetik atera.
- term: Latifundioa
  def: |-
    Lur-eremu oso handia, jabe gutxi batzuen esku. Espainiako hegoaldean arazo sozial larria sortzen zuen, nekazari asko lur gabe.
- term: Monarkia
  def: |-
    Estatua errege batek zuzentzen duen sistema politikoa, boterea oinordetza bidez transmititzen delarik. II. Errepublikak 1931n ordezkatu zuen.
- term: Polarizazioa
  def: |-
    Gizartean edo sistema politiko batean jarrerak mutur kontrajarrietara urruntzeko prozesua. II. Errepublikaren azken urteetan ezkerra eta eskuina gero eta urrunago kokatu ziren.
- term: Sekularizazioa
  def: |-
    Gizartean eta erakundeetan erlijioaren eragina murrizteko prozesua. II. Errepublikak sekularizazioa bizkortu nahi izan zuen hezkuntzan, legeetan eta bizitza publikoan.
- term: Subiranotasuna
  def: |-
    Botere politikoaren azken iturria nor den adierazten duen kontzeptua. II. Errepublikan boterearen zilegitasuna herritarren borondatetik zetorrela defendatu zen, ez erregearengandik edo Jainkoarengandik.
- term: Sufragio unibertsala
  def: |-
    Herritar heldu guztiek botoa emateko eskubidea izatea, sexua, klase soziala edo aberastasuna kontuan hartu gabe. II. Errepublikan emakumeen boto eskubidea aitortu zen eta 1933ko hauteskundeetan lehen aldiz aplikatu.
- term: Urriko Iraultza (1934)
  def: |-
    CEDA gobernuan sartzearen aurkako altxamendua. Asturiasen meatzariek eta langileek lurraldea hartu zuten bi astez; Francok gogor zapaldu zuen (~1.500 hildako).
