sections:
- id: g9-1
  number: '9.1'
  title: Modernizazio sozioekonomikoaren prozesua
  body: |-
    <h3><span class="h-num">9.1.1</span> Abiapuntua: krisi ekonomikoa eta norabide berria</h3>
    <p>1982an PSOE gobernura iritsi zenean, Espainiak krisi ekonomiko gogorra zuen: inflazio handia, langabeziaren gorakada, defizit publikoa eta industria tradizionalaren lehiakortasun falta. Felipe Gonzálezen gobernuak <span class="term" data-def="Ekonomia, gizartea, administrazioa eta eguneroko bizimodua eraldatzeko prozesua. Espainia Europako demokrazia liberalera hurbildu zen, kostu sozial handiekin.">modernizazioa</span> helburu estrategiko gisa hartu zuen: ez soilik ekonomia haztea, herrialdea Europako kapitalismo aurreratuaren eta demokrazia liberalaren parametroetan kokatzea baizik. Horretarako, politika ekonomiko zorrotzak (inflazioa kontrolatu, defizit mugatu), <span class="term" data-def="Krisian zeuden industria-sektoreak ixteko, murrizteko edo berrantolatzeko politika. Langabezia eta gatazka soziala ekarri zituen.">industria-birmoldaketa</span> eta ekonomia ireki.
    <h3><span class="h-num">9.1.2</span> Ongizate-estatuaren eraikuntza</h3>
    <p>Modernizazio ekonomikoarekin batera, <span class="term" data-def="Herritarrei osasuna, hezkuntza, pentsioak eta gizarte-zerbitzuak bermatzeko estatuaren babes-sistema. 1980ko hamarkadan zabaldu zen.">ongizate-estatua</span> zabaldu zen:</p>
    <ul>
    <li><strong>Osasun Lege Orokorra (1986):</strong> osasun-arreta unibertsala, herritartasunari lotua (ez soilik langileen kotizetara).</li>
    <li><strong>LODE (1985):</strong> hezkuntza-sistemaren antolaketa demokratizatu, ikastetxeen parte-hartze organoak arautu.</li>
    <li><strong>LOGSE (1990):</strong> hezkuntza-sistema sakon berrantolatu; derrigorrezko hezkuntza 16 urtera arte luzatu.</li>
    </ul>
    <p>Pentsio-sistema zabaldu eta sendotu egin zen, langabezia-sariek pisu handiagoa hartu zuten eta gizarte-politikek garrantzia irabazi zuten. Hala ere, babes-sare horrek ez zuen beti langabezia masiboari eta prekarietateari erantzuteko gaitasun nahikorik, batez ere 1990eko hamarkadako krisian.</p>
    <h3><span class="h-num">9.1.3</span> Gizarte-aldaketak: emakumea, sekularizazioa eta kontsumo-kultura</h3>
    <p>Gizarte-aldaketa sakonak ere gertatu ziren. <strong>Emakumeen egoeran</strong> aldaketa esanguratsuak bizi ziren: dibortzioa (1981) gizartean normalizatzen ari zen; <strong>abortuaren despenalizazioa (1985)</strong> frankismoaren moral penalarekin alderatuta aldaketa sakona izan zen. Emakumeen presentzia unibertsitatean, lan-merkatuan eta espazio publikoan handitu zen. Hala ere, <span class="term" data-def="Emakumeen karrera-garapenaren muga ikusezina: lan-munduan goi-karguetarako iristea oztopatzen duen oztopo soziala. Legezko berdintasunak ez zuen desberdintasun soziala desagerrarazi.">kristalezko sabaia</span>, soldata-arrakalak eta zaintza-lanen banaketa desorekatua irauten zuten.</p>
    <p><span class="term" data-def="Elizaren eragina gizartean murriztea. 1980ko hamarkadan familia-ereduak pluralago bihurtu ziren eta herritar askoren eguneroko erabakietan Elizak pisu txikiagoa hartu zuen.">Sekularizazioa</span> nabarmena zen. Baita <strong>kontsumo-kultura eta <em>Movida</em></strong>: klase ertainen bizimodua zabaldu zen, eta 1980ko hamarkadako kultura urbano berria — bereziki Movida madrildarra — askatasun pertsonalaren eta frankismoaren kultura diziplinatuarekiko hausturaren ikur bihurtu zen. Pedro Almodóvarren zinema, musika talde berriak, gau-kultura eta aldizkari alternatiboak belaunaldi berri baten autoirudikapena izan ziren.</p>
    <h3><span class="h-num">9.1.4</span> Gizarte-gatazkak eta garaiaren kontraesanak</h3>
    <p><strong>1985eko greba orokorra</strong> (pentsio-erreformaren aurka) eta batez ere <strong>1988ko abenduaren 14ko (14-D) greba orokorra</strong> (UGT eta CCOO batera) gobernuaren eta langile-mugimenduaren arteko tentsio sakona erakutsi zuten: ezkerreko gobernuak neurri gogorrak hartu zituen langileentzat. Horren ostean gobernuak politika soziala indartu behar izan zuen.</p>
    <p>1992a modernizazioaren erakusleihoa: Bartzelonako Olinpiar Jokoek, Sevillako Expoak eta Madril-Sevilla AVEaren inaugurazioek Espainia moderno eta europar baten irudia proiektatu zuten. Baina 1993ko krisi ekonomikoak (langabezia ~%24) garaiaren itzalak agertu zituen. Arazo larriak: <strong>heroinaren hedapena</strong> (batez ere industria-krisiak kolpatutako auzoetan) eta gizarte-desorekak. PSOEk 1993an gehiengo osoa galdu zuen; CiUren eta EAJren babesa behar zuen gobernatzeko. <strong>Ustelkeria-eskandaluak</strong> (Juan Guerra, Filesa, Roldán) higadura azkartu zuen, eta <strong>1996ko PPren garaipen</strong>ak alternantzia demokratikoa ekarri zuen.</p>
    <div class="callout">Modernizazioaren paradoxa: osasun eta hezkuntza publikoa zabaldu ziren, baina industria-krisiak, langabeziak eta drogarena kontraesaten zuten argazki distiratsuak.</div>

- id: g9-2
  number: '9.2'
  title: Industria-bermoldaketa Euskal Autonomia Erkidegoan
  body: |-
    <h3>Industria astunaren gainbehera: zergatia eta nondik</h3>
    <p>Euskal industriaren oinarri historikoa siderurgia, ontzigintza, meatzaritza eta metalurgia zen, batez ere <strong>Bizkaian eta Ezkerraldean</strong>. Nerbioi itsasadarraren inguruan eraikitako industria-mundua ez zen soilik lantegi multzoa; gizarte oso baten egitura: langile-auzoak, sindikatu-kultura, familia-ereduak eta identitate kolektiboa. 1970eko hamarkadatik krisian sartu zen: petrolio-krisiek, nazioarteko lehiak, teknologia zaharkituak eta produktibitate baxuak eraldaketa eskatzen zuten.</p>
    <p>Horri Espainiaren EEEan sartzeko presioa gehitu zitzaion: merkatu irekian sektore zaharren babesa murriztu behar zen. Industria-birmoldaketaren helburua sektore ez-lehiakorrak ixtea eta berrantolatzea zen. Ekonomikoki, agian beharrezkoa; sozialki, kolpe izugarria.</p>
    <h3>Gatazka sozialaren irudiak</h3>
    <p><strong>Euskalduna ontziolaren gatazka</strong> sinbolo bihurtu zen: langileek ez zuten soilik lanpostua defendatzen, industria-kultura oso bat (auzoak, harrotasun industriala, belaunaldiz belaunaldiko lanaren jarraipena) baizik. <strong>Altos Hornos de Vizcayaren gainbehera</strong> siderurgiaren amaieraren ikur; <span class="term" data-def="Industria-jardueraren pisua galtzea, lantegiak ixtea eta industria-kultura baten gainbehera. Ezkerraldean bereziki gogorra.">desindustrializazioaren</span> paisaia soziala: langabezia, auzoen degradazioa, <strong>heroina</strong> eta gazteen bazterketa.</p>
    <p>ELAk, UGTk, CCOOk eta LABek mobilizazio ugari bultzatu zituzten. Grebak, itxialdiak eta errepide-mozketak ohikoak izan ziren. Gatazka horietan ekonomia, politika eta identitatea nahasten ziren.</p>
    <h3>Eusko Jaurlaritzaren erantzuna eta berroneratzea</h3>
    <p>Eusko Jaurlaritzak, <strong>Kontzertu Ekonomikoaren</strong> ahalmen fiskalarekin, industria-politika aktiboak bultzatu zituen: laguntzak, <span class="term" data-def="Industria zaharren ordez sektore modernoago eta lehiakorragoak garatzea: teknologia-parkeak, makina-erreminta, automozioa, zerbitzu aurreratuak.">berrindustrializazio</span>-programak, teknologia-parkeak, Mondragon Korporazioa. Industria mota berrituago batera egokitzen saiatu zen.</p>
    <div class="callout">«Bilbo efektua» (Guggenheim, 1997ko inaugurazioa) ez zen magiaz agertu: 1980ko hamarkadako industria-krisiak eta berroneratzeko borondateak jarri zituzten oinarriak.</div>
    <p>Hala ere, kostua oso handia zen: prestakuntza gutxiagoko langileek sektore berrietara egokitzeko zailtasun handiagoak izan zituzten. Modernizazioaren prezioa ez zuten guztiek berdin ordaindu.</p>

- id: g9-3
  number: '9.3'
  title: Biolentzia terroristaren jarraipena
  body: |-
    <h3>Zergatik jarraitu zuen ETAk? Testuingurua aldatu zen</h3>
    <p>Demokrazia, autogobernua eta amnistia egonik ere, ETA militarrak ez zuen marko demokratiko-autonomikoa onartu. Bere iritzian, Konstituzioa eta Gernikako Estatutua ez ziren benetako haustura demokratikoa, frankismoaren ondorengo estatuaren moldaketa baizik. Ez zuen independentzia, autodeterminazioa edo proiektu sozialista-iraultzailea bermatzen.</p>
    <p>1980ko hamarkadatik ETAren indarkeria ezin da diktaduraren aurkako borroka gisa azaldu: <span class="term" data-def="Helburu politikoak lortzeko indarkeria sistematikoa eta beldur soziala. ETAren atentatuek, estortsioak eta mehatxuek demokraziaren kalitatea kolpatu zuten.">terrorismoak</span> demokraziaren, autogobernuaren eta herritarren askatasunaren aurka jardun zuen. Estrategia: Estatua presionatu, gizartea beldurtu, negoziazio politikoa behartu.</p>
    <h3>Ekintza nagusiak eta ondorioak</h3>
    <ul>
    <li><strong>1986, Yoyesen hilketa:</strong> ETAko kide ohi baten erailketa — disidentzia zigortzen zuen; mezua: «ez dago irteerarik».</li>
    <li><strong>1987, Hipercor (Bartzelona, 21 hildako):</strong> merkataritza-gune batean bonba-autoa; zibilen aurkako terrorismo masibo bihurtu zen.</li>
    <li><strong>1987, Zaragoza kuartela (11 hildako, haurrak barne):</strong> «helburu militar» gisa aurkeztutakoa baina familiak bertan bizi ziren.</li>
    <li><strong>1989, Aljeriako elkarrizketak:</strong> Gobernua eta ETAren arteko negoziazio-saiakera; porrot egin zuten bi logika kontrajarriengatik (armak uztea vs. helburu politikoak lortzea).</li>
    <li><strong>1995, Gregorio Ordóñez hil:</strong> Donostiako PPko buruzagia; politikarien aurkako jazarpena sistematikoa bihurtzen ari zen.</li>
    </ul>
    <h3>GAL: gerra zikina — Estatuaren kontraesana</h3>
    <div class="callout">1983–1987 artean, <span class="term" data-def="Grupos Antiterroristas de Liberación: talde parapolizial terrorista, segurtasun-aparatuaren sektoreekin lotua. ETAren aurkako gerra zikina, zuzenbide-estatuaren printzipioak urratuz.">GALek</span> 27 pertsona hil zituen, batez ere Ipar Euskal Herrian. Lasa eta Zabalaren bahiketa, tortura eta hilketa; Segundo Mareyren bahiketa. Segurtasun-aparatuaren sektoreekin eta Barne Ministerioaren egitura ilunekin lotuta.</div>
    <p>ETAk <span class="term" data-def="Botere publiko guztiak legearen menpe dauden sistema, eskubideak, epaileen kontrola eta berme juridikoak errespetatuz.">zuzenbide-estatua</span> kanpotik kolpatzen zuen; GALek, berriz, Estatuaren barrutik bertatik urratu zituen haren printzipioak. Terrorismoaren aurkako borrokaren zilegitasun morala kaltetu zuen eta 1990eko hamarkadako gobernu sozialistaren krisi politikoa sakondu. Auzitegiek Rafael Vera eta José Barrionuevo zigortu zituzten.</p>

- id: g9-4
  number: '9.4'
  title: Indar polizialak, erakundeak eta gizartea terrorismoaren aurrean
  body: |-
    <h3>Erantzunaren hiru mailak</h3>
    <p><strong>1. Maila poliziala:</strong> <span class="term" data-def="EAEko polizia autonomikoa. Gernikako Estatutuaren ondoren garatua; autogobernuaren sendotzearen adierazle.">Ertzaintzaren</span> garapena (autogobernuaren adierazle: segurtasun publikoaren ardura euskal erakundeen esku). Espainia-Frantzia arteko polizia-lankidetza gero eta estuagoa 1990eko hamarkadan funtsezkoa: ETAren Ipar Euskal Herriko atzeguardia ahuldu.</p>
    <p><strong>2. Maila instituzionala:</strong> <span class="term" data-def="1988an Euskadiko alderdi demokratiko nagusiek ETAren aurka sinatutako akordioa: ETA politikoki isolatzea eta indarkeriari zilegitasuna kentzea. Herri Batasunak ez zuen sinatu.">Ajuria Eneko Ituna (1988)</span> — EAJ, PSE-PSOE, AP, CDS, EE eta beste indar batzuek sinatu. Helburua: ETA politikoki isolatzea, indarkeriari zilegitasun oro kentzea, alderdi demokratikoen batasuna bermatzea. Herri Batasunak uko egin: euskal politikaren zatiketa sakona agerian.</p>
    <p><strong>3. Maila soziala:</strong> <em>Gesto por la Paz</em> bezalako ekimenen mobilizazioak (atentatu bakoitzaren ondoren isilik kontzentratzea), biktimen aitortza eta beldurraren aurkako kontzientzia zibikoa. 1990eko hamarkadan gero eta handiagoak.</p>
    <h3>Erantzunaren kontraesanak</h3>
    <p>Hiru maila horiek ETAren zilegitasun soziala eta politikoa ahultzen joan ziren. Baina GALen gerra zikinak erakutsi zuen demokraziak ezin dituela bere printzipioak urratu bere burua defendatzeko. Terrorismoaren aurkako benetako froga ez zen soilik ETA ahultzea: indarkeriari aurre egitean <strong>zuzenbide-estatuaren printzipioak mantentzea</strong> baizik.</p>
    <div class="callout">Demokrazia berri bat terrorismoaren aurrean: biktimak, bakearen aldeko mobilizazioa eta Ajuria Eneko Ituna erakutsi zuten ETAk ez zuela euskal herritarren ordez hitz egiteko eskubiderik.</div>

- id: g9-5
  number: '9.5'
  title: Espainia Europa eraikitzeko prozesuan
  body: |-
    <h3>1986ko sarrera EEEan: homologazio demokratikoa</h3>
    <p><strong>1986ko urtarrilaren 1ean Espainia eta Portugal <span class="term" data-def="Europako Ekonomia Erkidegoa, gero Europar Batasunaren oinarria. Espainiaren sarrerak demokraziaren nazioarteko homologazioa eta modernizazio-presioa ekarri zituen.">Europako Ekonomia Erkidegoan</span> sartu ziren.</strong> Felipe Gonzálezen gobernuentzat Europan sartzea helburu estrategikoa zen. Aukera eta presioa batera:</p>
    <ul>
    <li><strong>Aukerak:</strong> Europako merkatu zabalera sarbidea, Europako funtsak azpiegiturak finantzatzeko, nazioarteko legitimitate demokratikoa.</li>
    <li><strong>Presioak:</strong> lehiakortasun handiagoa, industria-birmoldaketa azkartze, politika ekonomikoaren diziplina, nekazaritzaren eta arrantza-sektorearen egokitzapena.</li>
    </ul>
    <p>Sarrerak demokraziaren zilegitasuna indartu zuen barruan eta kanpoan: Espainia ez zen jada Europako periferiako diktadura zahar baten ondorengo; Europako proiektu politiko eta ekonomikoaren parte zen.</p>
    <h3>1992ko ekitaldiak eta 1992ko Maastricht</h3>
    <p><strong>Bartzelonako Olinpiar Jokoek, Sevillako Expoak eta AVEaren inaugurazioak</strong> Espainia moderno eta europar baten irudia proiektatu zuten: komunikazio-sare berriak, hiri berrituak, nazioarteko irudi garbia. 1992ko <strong>Maastrichteko Itunak</strong> integrazio politiko sakonagoa planteatu zuen (herritartasun europarra, txanpon bakarraren bidea); Espainiak politika ekonomikoa diziplinatu behar zuen (defizita kontrolatu, inflazioa mugatu).</p>
    <h3>NATOren auzia (1986) eta nazioarteko kokapena</h3>
    <p>Espainia 1982an sartu zen NATOn UCDren garaian, baina PSOE oposizioan oso kritikoa: «OTAN, de entrada no». Gobernura iritsi ondoren, Felipe Gonzálezek jarrera aldatu zuen: Mendebaldeko blokean fidagarri agertu behar zen. <strong>1986ko NATOren erreferendumean «bai» nagusitu zen</strong> Espainian (baina Euskal Herrian eta Katalunian «ez»): Mendebaldeko aliantzan jarraitzea, baina baldintza batzuekin (ez egitura militar integratuan, ez arma nuklear, AEBen presentzia murriztu).</p>
    <p>Azkenik, <strong>1996ko PPren garaipen</strong>ak <span class="term" data-def="Boterea hauteskundeen bidez alderdi batetik bestera modu baketsuan igarotzea. 1996an PPk irabazi, PSOE oposiziora.">alternantzia demokratikoa</span> ekarri zuen: Aznar, PP. Espainiako monarkia parlamentarioak heldutasun instituzionala erakutsi zuen; sistema gai zen gobernu-aldaketa baketsua onartzeko.</p>
    <div class="callout">Europako integrazioa ez da arrakasta lineal garbi gisa ulertu behar: industria-birmoldaketa azkartze, gizarte-kostua eta politika ekonomikoaren presioa ere ekarri zituen.</div>
glossary:
- term: Alternantzia demokratikoa
  def: |-
    Boterea hauteskundeen bidez alderdi batetik bestera modu baketsuan igarotzea. 1996an PPk irabazi, PSOE oposiziora.
- term: Ajuria Eneko Ituna (1988)
  def: |-
    Euskadiko alderdi demokratikoek ETAren aurka sinatutako akordioa: indarkeria politikoki isolatzea eta erakunde demokratikoen batasuna.
- term: Autogobernua
  def: |-
    Lurralde batek bere erakunde propioen bidez eskumenak kudeatzeko gaitasuna. EAEn Jaurlaritza, Legebiltzarra eta Ertzaintza sendotu ziren.
- term: Berrindustrializazioa
  def: |-
    Industria zaharren ordez sektore modernoago eta lehiakorragoak garatzea: teknologia-parkeak, makina-erreminta, automozioa, zerbitzu aurreratuak.
- term: Biktimen aitortza
  def: |-
    Terrorismoaren biktimei ikusgarritasuna, memoria eta babes instituzionala ematea. 1990eko hamarkadan indartu zen.
- term: Desindustrializazioa
  def: |-
    Industria-jardueraren pisua galtzea, lantegiak ixtea eta industria-kultura baten gainbehera. Bizkaiko Ezkerraldean bereziki gogorra.
- term: Ertzaintza
  def: |-
    EAEko polizia autonomikoa. Gernikako Estatutuaren ondoren garatua; autogobernuaren sendotzearen adierazle.
- term: Europako Ekonomia Erkidegoa (EEE)
  def: |-
    Europako integrazio ekonomikorako erakundea. Espainia 1986an sartu zen: homologazioa eta modernizazio-presioa.
- term: GAL
  def: |-
    Grupos Antiterroristas de Liberación: talde parapolizial terrorista (1983–87), ETAren aurkako gerra zikina; zuzenbide-estatua urratu zuen.
- term: Gizarte zibila
  def: |-
    Estatutik eta alderdietatik kanpoko herritar, elkarte eta mugimenduen espazioa. Gesto por la Paz bezalako ekimenak.
- term: Industria-birmoldaketa
  def: |-
    Krisian zeuden sektoreak ixteko edo berrantolatzeko politika. Ontzigintzan, siderurgian eta meatzaritzan eragin handia EAEn.
- term: Kontzertu Ekonomikoa
  def: |-
    EAEko zerga-sistema propioa, Eusko Jaurlaritzari ahalmen fiskal garrantzitsua ematen diona. Industria-politika aktiboa sustatzeko baliabide nagusia.
- term: Langabezia estrukturala
  def: |-
    Ekonomiaren egitura-aldaketek sortzen duten langabezia iraunkorra. Industria zaharreko langileei bereziki eragin zien.
- term: Lan-prekarietatea
  def: |-
    Lan-baldintza ezegonkorrak, aldi baterako kontratuak eta babes urria. 1994ko lan-erreformarekin lotua.
- term: LOGSE
  def: |-
    1990eko hezkuntzako legea: derrigorrezko hezkuntza 16 urtera arte, hezkuntza unibertsal eta demokratikoagoaren aldeko apustua.
- term: Modernizazio sozioekonomikoa
  def: |-
    Ekonomia, gizartea eta bizimodua eraldatzeko prozesua (1982–1996), kostu sozial handiekin: ongizate-estatua zabaldu, baina industria-krisia eta langabezia ere pairatu.
- term: Monarkia parlamentarioa
  def: |-
    Erregea estatu-buru, baina boterea parlamentuaren eta gobernuaren bidez. 1982–1996 aldian sendotu eta alternantzia demokratikoa lortu zuen.
- term: Movida
  def: |-
    1980ko hamarkadako kultura urbano berria, batez ere Madrilen: askatasun pertsonalaren eta frankismoaren kulturarekin hausturaren ikur.
- term: NATO
  def: |-
    Ipar Atlantikoko Tratatuaren Erakundea. Espainia 1982an sartu zen; 1986ko erreferendumean «bai» (Euskadin eta Katalunian «ez»).
- term: Ongizate-estatua
  def: |-
    Osasuna, hezkuntza, pentsioak eta gizarte-zerbitzuak bermatzeko babes-sistema. 1980ko hamarkadan zabaldua (Osasun Lege Orokorra, LOGSE).
- term: Polizia-lankidetza
  def: |-
    Estatuen segurtasun-indarren arteko koordinazioa. ETAren aurkako borrokan, Espainia-Frantzia lankidetza gakoa.
- term: Sekularizazioa
  def: |-
    Erlijioaren eragina gizartean eta bizitza pribatuan murriztea. Familia-ereduak aldatu eta gizartea pluralagoa bihurtu zen.
- term: Terrorismoa
  def: |-
    Helburu politikoak lortzeko indarkeria sistematikoa eta beldurra. ETAk hildakoak, estortsioa eta kontrol soziala eragin zituen.
- term: Trantsizio ondorengo demokrazia
  def: |-
    Frankismoaren ondorengo sistema demokratikoaren lehen fase egonkortua (1982–1996).
- term: Ustelkeria
  def: |-
    Botere publikoaren erabilera okerra interes pribaturako. Juan Guerra, Filesa, Roldán auzietan agerian geratu zen; PSOEren higadura azkartu zuen.
- term: Zuzenbide-estatua
  def: |-
    Botere publiko guztiak legearen menpe dauden sistema. GALek erakutsi zuen demokraziak ezin dituela bere printzipioak urratu bere burua defendatzeko.
